// ================================================================
//  LOOP
// ================================================================
function loop(timestamp){
  if(!timestamp)timestamp=performance.now();
  const isActive=animPhase!=='idle'||chainOn||pendingColorClear||showModeSelect||celeb;
  const minInterval=isActive?0:32; // ~30fps cap during idle play
  if(timestamp-lastFrameTime<minInterval){requestAnimationFrame(loop);return;}
  lastFrameTime=timestamp;
  glassFrame++;
  time++;if(!gameOver&&!paused&&!showRules&&!tutActive&&!loadoutPopupActive&&!showModeSelect&&!showOculus){tickAnim();tickWobble();tickTimer();tickRealClock();tickColorClear();tickHint();tickSpecialGems();if(tutQueue.length>0&&!chainOn)tryNextTut();}tickCeleb();if(!showModeSelect&&!showOculus)tickP();render();requestAnimationFrame(loop);
}

// ================================================================
//  INPUT
// ================================================================
function pos(e){return e.touches&&e.touches.length?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
function hitBtn(b,p){return b&&p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h;}
function handleDown(e){const p=pos(e);
  // Mode select screen
  if(showModeSelect){
    if(hitBtn(btnColorMode,p)){toggleColorMode();return;}
    if(hitBtn(catBtnModeSelect,p)){showModeSelect=false;showOculus=true;catLoad();tutSeen['oculus_visited']=true;saveTut();return;}
    for(const mb of modeButtons){
      if(p.x>=mb.x&&p.x<=mb.x+mb.w&&p.y>=mb.y&&p.y<=mb.y+mb.h){
        // If oculus is unlocked but no windows are focused (and not all maxed), redirect
        if(hasAllModes()&&catProg.filter(cp=>cp.foc).length===0&&!catProg.every(cp=>cp.tier>=3)){
          showModeSelect=false;showOculus=true;catLoad();catHelpOpen=true;tutSeen['oculus_visited']=true;saveTut();return;
        }
        gameMode=mb.mode;showModeSelect=false;initAudio();initBoard();return;
      }
    }
    return;
  }
  if(showOculus){catHandleTap(p);return;}
  // Loadout recap popup — tap to dismiss
  if(loadoutPopupActive){
    if(performance.now()-loadoutPopupOpenedAt<300)return;
    // "Don't show again" checkbox tap
    if(hitBtn(btnLoadoutDontShow,p)){
      settings.loadoutPopup=false;saveSettings();
      addPanelMsg("Pre-game popup disabled (re-enable in Oculus)",'#aaccee',2500);
    }
    loadoutPopupActive=false;
    if(pauseStartTime>0){resumeAnimAfterPause();totalPausedMs+=performance.now()-pauseStartTime;pauseStartTime=0;}
    const now=performance.now();
    lastTimerTick=now;lastHeatCoolTick=now;lastActionTime=now;
    return;
  }
  // Tutorial popup — only the close button dismisses; body taps are ignored
  if(tutActive){
    if(hitBtn(btnTutClose,p))dismissTut();
    return;
  }
  // Music menu handling — check first so clicks on menu items are caught
  if(musicMenuOpen){
    for(const mb of musicMenuBtns){
      if(p.x>=mb.x&&p.x<=mb.x+mb.w&&p.y>=mb.y&&p.y<=mb.y+mb.h){
        initAudio();startMusic(mb.key);musicMenuOpen=false;return;
      }
    }
    // Clicked outside menu — close it
    musicMenuOpen=false;return;
  }
  // Rules overlay — tap anywhere to close
  if(showRules){
    rulesTouchStartY=p.y;rulesTouchDragged=false;
    return;}
  // Pause toggle
  if(hitBtn(btnPause,p)&&!gameOver){
    paused=!paused;pauseConfirm=null;
    if(paused){pauseStartTime=performance.now();}
    if(!paused){
      if(pauseStartTime>0){resumeAnimAfterPause();totalPausedMs+=performance.now()-pauseStartTime;}pauseStartTime=0;
      const now=performance.now();
      lastTimerTick=now;lastHeatCoolTick=now;lastActionTime=now;
      lastPowerSpawn=now;lastCurseSpawn=now;lastRainbowSpawn=now;lastBlazeSpawn=now;lastHourglassSpawn=now;
      for(const s of slots)if(s.special)s.specialTick=now;
    }
    return;}
  // Mute toggle
  if(hitBtn(btnMute,p)){initAudio();toggleSfxMute();return;}
  // Music menu toggle
  if(hitBtn(btnMusic,p)){musicMenuOpen=!musicMenuOpen;return;}
  // Rules button
  if(hitBtn(btnRules,p)&&!gameOver){showRules=true;rulesScrollY=0;rulesOpenedAt=performance.now();if(!pauseStartTime)pauseStartTime=performance.now();return;}
  // Tutorial toggle (pre-game only)

  // Can't interact when paused — check restart first, then tap to resume
  if(paused){
    // Confirm overlay active — handle confirm/cancel
    if(pauseConfirm){
      if(hitBtn(btnPauseConfirmYes,p)){
        const action=pauseConfirm;pauseConfirm=null;
        if(action==='restart'){
          paused=false;
          if(gameStarted)catTransferFrags();
          if(gameMode==='daily'){
            if(score>dailyBestToday)dailyBestToday=score;
            dailyAttemptsLeft--;saveDailyState();
            if(dailyAttemptsLeft<=0){stopMusic();showModeSelect=true;return;}
          }
          initBoard();return;
        }
        if(action==='quit'){
          paused=false;
          if(gameStarted)catTransferFrags();
          if(gameMode==='daily'&&gameStarted){
            if(score>dailyBestToday)dailyBestToday=score;
            dailyAttemptsLeft--;saveDailyState();
          }
          stopMusic();showModeSelect=true;return;
        }
      }
      if(hitBtn(btnPauseConfirmNo,p)){pauseConfirm=null;return;}
      return; // ignore taps elsewhere while confirming
    }
    if(hitBtn(btnRestart,p)){pauseConfirm='restart';return;}
    if(hitBtn(btnEndSession,p)){
      paused=false;triggerGameOver();return;
    }
    if(hitBtn(btnBackMenu,p)){pauseConfirm='quit';return;}
    paused=false;
    if(pauseStartTime>0){resumeAnimAfterPause();totalPausedMs+=performance.now()-pauseStartTime;}pauseStartTime=0;
    const now=performance.now();
    lastTimerTick=now;lastHeatCoolTick=now;lastActionTime=now;
    lastPowerSpawn=now;lastCurseSpawn=now;lastRainbowSpawn=now;lastBlazeSpawn=now;lastHourglassSpawn=now;
    for(const s of slots)if(s.special)s.specialTick=now;
    return;}
  if(gameOver){
    // Tutorial overlay (e.g. intro_modes) takes priority over game-over taps
    if(tutActive){
      if(hitBtn(btnTutClose,p))dismissTut();
      return;
    }
    if(gameOverDetailsOpen){
      // Tap anywhere closes details, but X button is the obvious target
      gameOverDetailsOpen=false;return;
    }
    if(hitBtn(btnGameOverDetails,p)){gameOverDetailsOpen=true;return;}
    if(hitBtn(btnGameOverReplay,p)){
      // Replay current mode — but if Oculus unlocked and no windows focused, redirect
      if(hasAllModes()&&catProg.filter(cp=>cp.foc).length===0&&!catProg.every(cp=>cp.tier>=3)){
        stopMusic();gameOver=false;showOculus=true;catLoad();catHelpOpen=true;tutSeen['oculus_visited']=true;saveTut();return;
      }
      stopMusic();initAudio();initBoard();return;
    }
    if(hitBtn(btnGameOverMenu,p)){stopMusic();showModeSelect=true;return;}
    return;
  }
  // Repaint: color wheel shown (chain finalized) — check for color pick or cancel
  if(repaintSelected.length>0&&!repaintDragging){
    const lastSi=repaintSelected[repaintSelected.length-1];
    const rawX=slots[lastSi].seedX,rawY=slots[lastSi].seedY;
    const wheelR=cSz*1.6;
    const allColors=[];for(let c=0;c<CFG.NUM_COLORS;c++)allColors.push(c);
    const optR=cSz*0.48;
    const margin=optR+6;
    const rpx=Math.max(wheelR+margin, Math.min(W-wheelR-margin, rawX));
    const rpy=Math.max(wheelR+margin, Math.min(H-wheelR-margin-cSz, rawY));
    let picked=-1;
    for(let i=0;i<allColors.length;i++){
      const ang=-Math.PI/2+i*(Math.PI*2/allColors.length);
      const cx2=rpx+Math.cos(ang)*wheelR, cy2=rpy+Math.sin(ang)*wheelR;
      const dx=p.x-cx2,dy=p.y-cy2;
      if(dx*dx+dy*dy<optR*optR*1.5){picked=allColors[i];break;}
    }
    if(picked>=0){
      for(const si of repaintSelected)slots[si].ci=picked;
      glNeedsBuild=true;
      repaintCharges--;repaintSelected=[];repaintMode=false;
      const now=performance.now();lastTimerTick=now;lastHeatCoolTick=now;lastActionTime=now;
      for(const s of slots)if(s.special)s.specialTick=now;
      gs.repaintsUsed++;gs.frag.palette++;fragState.lastRepaintTime=performance.now();addPanelMsg('🎨 Repainted!','#66ccff',1500);
      setTimeout(checkDeadlock,50);
    } else {
      repaintSelected=[];
      const now=performance.now();lastTimerTick=now;lastHeatCoolTick=now;
      for(const s of slots)if(s.special)s.specialTick=now;
    }
    return;
  }
  // Repaint: start chain drag
  if(repaintMode){
    const si=slotAtPx(p.x,p.y);
    if(si>=0&&!slots[si].isHole&&!slots[si].rainbow){
      repaintSelected=[si];repaintDragging=true;return;
    }
    repaintSelected=[];repaintMode=false;return;
  }
  if(hitBtn(btnShatterHUD,p)&&shatterCharges>0&&animPhase==='idle'&&!shatterMode&&!repaintMode){shatterMode=true;repaintMode=false;if(deadlocked)deadlocked=false;return;}
  if(hitBtn(btnRepaintHUD,p)&&repaintCharges>0&&animPhase==='idle'&&!repaintMode&&!shatterMode){repaintMode=true;shatterMode=false;return;}
  if(deadlocked&&animPhase==='idle'){
    if(hitBtn(btnShuffle,p)){doShuffle();return;}
    if(hitBtn(btnShatter,p)&&shatterCharges>0){shatterMode=true;deadlocked=false;return;}
    return;}
  if(shatterMode){const si=slotAtPx(p.x,p.y);if(si<0){shatterMode=false;return;}}
  // Long-press menu: if shatter or repaint charges available, delay chain start
  if(lpMenuActive){
    // Tap on menu option
    const dx=p.x-lpX,dy=p.y-lpY;
    const hasSh=shatterCharges>0&&animPhase==='idle';
    const hasRp=repaintCharges>0&&animPhase==='idle';
    const opts=[];
    if(hasSh)opts.push('shatter');
    if(hasRp)opts.push('repaint');
    const optR=cSz*0.7,optDist=cSz*1.6;
    let hit=false;
    for(let i=0;i<opts.length;i++){
      const angle=opts.length===1?-Math.PI/2:(i===0?-Math.PI*0.7:-Math.PI*0.3);
      const ox=lpX+Math.cos(angle)*optDist,oy=lpY+Math.sin(angle)*optDist;
      if(Math.hypot(p.x-ox,p.y-oy)<optR*1.5){
        hit=true;
        if(opts[i]==='shatter'){lpMenuActive=false;useShatter(lpSlot);}
        else{lpMenuActive=false;repaintMode=true;shatterMode=false;repaintSelected=[lpSlot];repaintDragging=true;}
        break;
      }
    }
    if(!hit)lpMenuActive=false;
    return;
  }
  if(!shatterMode&&!repaintMode&&animPhase==='idle'&&!gameOver&&!paused&&(shatterCharges>0||repaintCharges>0)){
    const si=slotAtPx(p.x,p.y);
    if(si>=0&&!slots[si].isHole){
      lpStartPos={x:p.x,y:p.y};lpSlot=si;
      lpTimer=setTimeout(()=>{
        lpTimer=null;
        lpX=slots[si].seedX;lpY=slots[si].seedY;
        lpMenuActive=true;
        endC(); // cancel any chain that started
      },400);
    }
  }
  startC(p.x,p.y);}
function closeRules(){
  showRules=false;rulesScrollY=0;
  if(pauseStartTime>0){resumeAnimAfterPause();totalPausedMs+=performance.now()-pauseStartTime;pauseStartTime=0;}
  const now=performance.now();lastTimerTick=now;lastHeatCoolTick=now;lastActionTime=now;
  lastPowerSpawn=now;lastCurseSpawn=now;lastRainbowSpawn=now;lastBlazeSpawn=now;lastHourglassSpawn=now;
  for(const s of slots)if(s.special)s.specialTick=now;
}
function handleMove(px,py){
  // Cancel long-press if finger moved
  if(lpTimer&&lpStartPos&&Math.hypot(px-lpStartPos.x,py-lpStartPos.y)>8){
    clearTimeout(lpTimer);lpTimer=null;lpStartPos=null;
  }
  if(showRules){
    const dy=rulesTouchStartY-py;
    if(Math.abs(dy)>3)rulesTouchDragged=true;
    rulesScrollY=Math.max(0,Math.min(rulesMaxScroll,rulesScrollY+dy));
    rulesTouchStartY=py;
    return;
  }
  // Repaint chain drag
  if(repaintDragging&&repaintSelected.length>0){
    const si=slotAtPx(px,py);
    if(si<0||slots[si].isHole||slots[si].rainbow)return;
    // Already in chain? Allow backtrack (remove last)
    const idx=repaintSelected.indexOf(si);
    if(idx>=0&&idx===repaintSelected.length-2&&repaintSelected.length>1){
      repaintSelected.pop();return;
    }
    if(idx>=0)return; // already in chain, not backtracking
    if(repaintSelected.length>=getRepaintGems())return; // max reached
    // Must be adjacent to last gem in chain
    const last=slots[repaintSelected[repaintSelected.length-1]];
    const cur=slots[si];
    let isAdj=false;
    for(const[dq,dr]of HD){if(last.q+dq===cur.q&&last.r+dr===cur.r){isAdj=true;break;}}
    if(isAdj)repaintSelected.push(si);
    return;
  }
  moveC(px,py);
}
function handleUp(){
  if(lpTimer){clearTimeout(lpTimer);lpTimer=null;lpStartPos=null;}
  if(lpMenuActive)return; // menu stays open after lift
  if(showRules){
    if(!rulesTouchDragged&&performance.now()-rulesOpenedAt>300)closeRules();
    return;
  }
  // Don't end chains when overlays are active — input is being used to dismiss
  if(tutActive||loadoutPopupActive||paused||gameOver||showOculus||showModeSelect)return;
  // Repaint chain finalize
  if(repaintDragging){
    repaintDragging=false;
    if(repaintSelected.length===0)repaintMode=false; // cancelled
    // Otherwise chain stays for wheel display
    return;
  }
  endC();
}
cv.addEventListener('mousedown',handleDown);
cv.addEventListener('mousemove',e=>{const p=pos(e);handleMove(p.x,p.y);});
cv.addEventListener('mouseup',()=>handleUp());cv.addEventListener('mouseleave',()=>{if(repaintDragging){repaintDragging=false;return;}if(!showRules)endC();});
cv.addEventListener('touchstart',e=>{e.preventDefault();handleDown(e);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=pos(e);handleMove(p.x,p.y);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();handleUp();},{passive:false});
cv.addEventListener('touchcancel',()=>{if(repaintDragging){repaintDragging=false;return;}if(!showRules)endC();});
cv.addEventListener('wheel',e=>{if(showRules){rulesScrollY=Math.max(0,Math.min(rulesMaxScroll,rulesScrollY+e.deltaY));e.preventDefault();}},{passive:false});
addEventListener('resize',()=>{resize();genBorder();vorDirty=true;nbrsDirty=true;});
addEventListener('keydown',e=>{
  if(e.key==='s'||e.key==='S'){
    const h=getGameHistory();if(!h.length){console.log('No game history yet');return;}
    const blitz=h.filter(g=>g.mode==='blitz');
    if(blitz.length){
      const scores=blitz.map(g=>g.score);
      const chains=blitz.map(g=>g.chains);
      const bests=blitz.map(g=>g.bestChain);
      const ccs=blitz.map(g=>g.colorClears);
      const avg=a=>Math.round(a.reduce((s,v)=>s+v,0)/a.length);
      const mx=a=>Math.max(...a);
      console.table({
        'Games':blitz.length,'Avg Score':avg(scores).toLocaleString(),'Max Score':mx(scores).toLocaleString(),
        'Avg Chains':avg(chains),'Avg Best Chain':avg(bests),'Max Chain':mx(bests),
        'Avg Max Chain Pts':avg(blitz.map(g=>g.maxChainScore||0)).toLocaleString(),'Best Single Chain Pts':mx(blitz.map(g=>g.maxChainScore||0)).toLocaleString(),
        'Avg Color Clears':avg(ccs),'Max CC':mx(ccs),
        'Avg Shatters Earned':avg(blitz.map(g=>g.shattersEarned)),'Avg Shatters Used':avg(blitz.map(g=>g.shattersUsed)),
        'Avg Repaints Earned':avg(blitz.map(g=>g.repaintsEarned)),'Avg Shuffles':avg(blitz.map(g=>g.shuffles)),
        'Avg Duration':avg(blitz.map(g=>g.duration))+'s',
      });
      console.log('Chain length distribution (all blitz games):');
      const allHist={};blitz.forEach(g=>{for(const[k,v]of Object.entries(g.chainHist||{}))allHist[k]=(allHist[k]||0)+v;});
      console.table(Object.fromEntries(Object.entries(allHist).sort((a,b)=>+a[0]-+b[0])));
      console.log('Last 10 games:');console.table(blitz.slice(-10).map(g=>({score:g.score,chains:g.chains,best:g.bestChain,cc:g.colorClears,sh:g.shattersUsed,rp:g.repaintsUsed,dur:g.duration+'s'})));
      // Fragment summary
      const fKeys=['twilight','ember','storm','aurora','crucible','sanctuary','palette','iron','gilded'];
      const fIcons={'twilight':'⏳','ember':'🔥E','storm':'⚡','aurora':'🌈','crucible':'🔥C','sanctuary':'⏳S','palette':'🎨','iron':'🛡️','gilded':'⭐'};
      const withFrags=blitz.filter(g=>g.frag);
      if(withFrags.length){
        console.log('Fragment earnings (avg per game, '+withFrags.length+' games with tracking):');
        const fragTable={};
        for(const k of fKeys){
          const vals=withFrags.map(g=>g.frag[k]||0);
          fragTable[fIcons[k]+' '+k]='Avg: '+avg(vals)+'  Max: '+mx(vals)+'  Total: '+vals.reduce((a,b)=>a+b,0);
        }
        console.table(fragTable);
        console.log('Last 5 games fragments:');console.table(withFrags.slice(-5).map(g=>{const r={score:g.score};for(const k of fKeys)r[k]=g.frag[k]||0;return r;}));
      }
    }
    console.log('Full history:',h);
  }
});
createNoiseTexture();resize();catLoad();showModeSelect=true;loop();
</script>
