function catSrng(s){return()=>{s=(s*16807)%2147483647;return s/2147483647;};}

function catBuildGeo(){
  const key=W+'x'+H;if(catGeoKey===key)return;catGeoKey=key;
  catPieces=[];catLeads=[];
  const cX=W/2,cY=H/2,R=Math.min(W,H)*0.42,N=8;
  function xy(r,a){return{x:cX+Math.cos(a)*r*R,y:cY+Math.sin(a)*r*R};}
  for(let w=0;w<9;w++){
    const rng=catSrng(w*41+17),aS=-Math.PI/2+w*CAT_PA,aE=aS+CAT_PA,bd=[];
    for(let i=0;i<=N;i++)bd.push(xy(CAT_iR,aS+(aE-aS)*i/N));const ie=bd.length;
    for(let i=1;i<=N;i++)bd.push(xy(CAT_iR+(CAT_oR-CAT_iR)*i/N,aE));
    for(let i=1;i<=N;i++)bd.push(xy(CAT_oR,aE-(aE-aS)*i/N));const oe=bd.length;
    for(let i=1;i<N;i++)bd.push(xy(CAT_oR-(CAT_oR-CAT_iR)*i/N,aS));const tot=bd.length;
    const jR=CAT_iR+(CAT_oR-CAT_iR)*(0.35+rng()*0.3),jA=aS+(aE-aS)*(0.25+rng()*0.5),junc=xy(jR,jA);
    const ci=[Math.floor((0.3+rng()*0.4)*ie),ie+Math.floor((0.3+rng()*0.4)*(oe-ie)),oe+Math.floor((0.2+rng()*0.6)*(tot-oe))];
    function jag(f,t){const p=[f],dx=t.x-f.x,dy=t.y-f.y,l=Math.sqrt(dx*dx+dy*dy),px=-dy/l,py=dx/l;
      for(let i=1;i<=2;i++){const u=i/3,j=(rng()-0.5)*l*0.08;p.push({x:f.x+dx*u+px*j,y:f.y+dy*u+py*j});}p.push(t);return p;}
    const ln=[jag(junc,bd[ci[0]]),jag(junc,bd[ci[1]]),jag(junc,bd[ci[2]])];catLeads.push(ln);
    const pcs=[];
    for(let p=0;p<3;p++){const si=ci[p],ei=ci[(p+1)%3],pl=[];
      let idx=si;for(let s=0;s<=tot+1;s++){pl.push({x:bd[idx].x,y:bd[idx].y});if(idx===ei)break;idx=(idx+1)%tot;}
      const bk=ln[(p+1)%3];for(let i=bk.length-1;i>=0;i--)pl.push({x:bk[i].x,y:bk[i].y});
      for(let i=0;i<ln[p].length;i++)pl.push({x:ln[p][i].x,y:ln[p][i].y});pcs.push(pl);}
    catPieces.push(pcs);
  }
}

  const t=performance.now();

  // Background
  const bg=cx.createRadialGradient(cX,cY*0.8,0,cX,cY,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#1a2048');bg.addColorStop(0.5,'#121838');bg.addColorStop(1,'#0a0f28');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // Title
  cx.font=`${Rn(13)}px ${f}`;cx.textAlign='center';cx.fillStyle='rgba(180,195,230,0.5)';
  cx.letterSpacing='3px';cx.fillText('O C U L U S',cX,Rn(28));cx.letterSpacing='0px';

  // Back button
  const bbW=Rn(70),bbH=Rn(30),bbX=Rn(12),bbY=Rn(12);
  drawGlassPanel(bbX,bbY,bbW,bbH,Rn(8));
  cx.font=`${Rn(12)}px ${f}`;cx.textAlign='center';cx.fillStyle='#8899bb';
  cx.fillText('← Back',bbX+bbW/2,bbY+bbH/2+Rn(4));
  catBtnBack={x:bbX,y:bbY,w:bbW,h:bbH};

  // Help button (top right)
  const hbSz=Rn(30),hbX=W-hbSz-Rn(12),hbY=Rn(12);
  drawGlassPanel(hbX,hbY,hbSz,hbSz,Rn(8));
  cx.font=`bold ${Rn(14)}px ${f}`;cx.textAlign='center';cx.fillStyle='#99aacc';
  cx.fillText('?',hbX+hbSz/2,hbY+hbSz/2+Rn(5));
  catBtnHelp={x:hbX,y:hbY,w:hbSz,h:hbSz};

  // Rings
  cx.beginPath();cx.arc(cX,cY,R*CAT_oR,0,Math.PI*2);cx.strokeStyle='rgba(65,80,130,0.12)';cx.lineWidth=1.5;cx.stroke();
  cx.beginPath();cx.arc(cX,cY,R*CAT_iR,0,Math.PI*2);cx.strokeStyle='rgba(65,80,130,0.1)';cx.lineWidth=1;cx.stroke();

  // Petals
  function tp(pts){cx.beginPath();for(let i=0;i<pts.length;i++){if(i===0)cx.moveTo(pts[i].x,pts[i].y);else cx.lineTo(pts[i].x,pts[i].y);}cx.closePath();}
  const canUpgrade=w=>catProg[w].tier<3&&catProg[w].frags>=CAT_TIERS[catProg[w].tier].c;
  for(let w=0;w<9;w++){
    const wd=CAT_W[w],p=catProg[w],aS=-Math.PI/2+w*CAT_PA,aE=aS+CAT_PA;
    const[r,g,b]=wd.color;
    for(let i=0;i<3;i++){
      const pts=catPieces[w][i],filled=p.tier>i,isNextTier=p.tier===i;
      tp(pts);
      if(filled){
        // Static fill — brighter per tier
        const tierAlpha=[0.25,0.38,0.52][i];
        cx.fillStyle=`rgba(${r},${g},${b},${tierAlpha})`;cx.fill();
        // Specular highlight
        cx.save();tp(pts);cx.clip();const mi=Math.floor(pts.length*0.4);
        const hg=cx.createRadialGradient(pts[mi].x,pts[mi].y,0,pts[mi].x,pts[mi].y,R*0.13);
        hg.addColorStop(0,'rgba(255,255,255,0.15)');hg.addColorStop(1,'rgba(255,255,255,0)');
        cx.fillStyle=hg;cx.fillRect(pts[mi].x-R*0.15,pts[mi].y-R*0.15,R*0.3,R*0.3);cx.restore();
        if(p.eq){tp(pts);cx.fillStyle=`rgba(${r},${g},${b},0.12)`;cx.fill();}
      }else if(isNextTier&&canUpgrade(w)){
        // Ready-to-upgrade: pulse the next piece
        const pu=0.15+0.15*Math.sin(t*0.004+w);
        cx.fillStyle=`rgba(${r},${g},${b},${pu})`;cx.fill();
      }else{cx.fillStyle='rgba(12,16,32,0.45)';cx.fill();}
      tp(pts);cx.strokeStyle=filled?`rgba(${r},${g},${b},0.2)`:'rgba(50,60,90,0.25)';cx.lineWidth=1.5;cx.stroke();
    }
    // Lead lines
    for(const ln of catLeads[w]){cx.beginPath();for(let i=0;i<ln.length;i++){if(i===0)cx.moveTo(ln[i].x,ln[i].y);else cx.lineTo(ln[i].x,ln[i].y);}
      cx.strokeStyle=p.tier>0?`rgba(${r},${g},${b},0.18)`:'rgba(50,60,90,0.2)';cx.lineWidth=1.3;cx.stroke();}
    // Equipped glow (outer arcs) — tall bright band
    if(p.eq){const ga=0.7+0.2*Math.sin(t*0.003+w);
      for(let ps=0;ps<5;ps++){cx.beginPath();cx.arc(cX,cY,R*CAT_oR+4+ps*6,aS+0.015,aE-0.015);
        cx.strokeStyle=`rgba(${r},${g},${b},${ga*(1-ps*0.15)})`;cx.lineWidth=7-ps;cx.stroke();}}
    // Focus indicator (inner arc glow)
    if(p.foc&&p.tier<3){
      cx.beginPath();cx.arc(cX,cY,R*CAT_iR-2,aS+0.04,aE-0.04);
      cx.strokeStyle=`rgba(${r},${g},${b},0.55)`;cx.lineWidth=3;cx.stroke();
      cx.beginPath();cx.arc(cX,cY,R*CAT_iR-5,aS+0.05,aE-0.05);
      cx.strokeStyle=`rgba(${r},${g},${b},0.2)`;cx.lineWidth=2;cx.stroke();
    }
    // Selection highlight — bright border along all petal edges
    if(w===catSel){
      // Draw all 3 piece outlines with bright glow
      for(let i=0;i<3;i++){
        tp(catPieces[w][i]);
        cx.strokeStyle=`rgba(${r},${g},${b},0.6)`;cx.lineWidth=2.5;cx.stroke();
      }
    }
    // Icon
    const ia=-Math.PI/2+w*CAT_PA+CAT_PA/2;
    catDrawIcon(cX+Math.cos(ia)*R*0.18,cY+Math.sin(ia)*R*0.18,R*0.04,w,p.tier>0);
    // Name
    const nS=aS+0.04,nE=aE-0.04;
    const nc=p.tier>0?wd.color:[230,235,245];
    catCurvedText(wd.name,cX,cY,R*1.03,nS,nE,Rn(9),`rgba(${nc[0]},${nc[1]},${nc[2]},${p.tier>0?0.75:0.7})`);
  }
  // Petal divider radial lines (drawn after petals so they sit on top)
  for(let w=0;w<9;w++){
    const a=-Math.PI/2+w*CAT_PA;
    cx.beginPath();
    cx.moveTo(cX+Math.cos(a)*R*CAT_iR,cY+Math.sin(a)*R*CAT_iR);
    cx.lineTo(cX+Math.cos(a)*R*CAT_oR,cY+Math.sin(a)*R*CAT_oR);
    cx.strokeStyle='rgba(90,110,170,0.25)';cx.lineWidth=2.5;cx.stroke();
  }
  // Center
  const tot=catProg.reduce((s,p)=>s+p.tier,0),fr=tot/27;
  cx.beginPath();cx.arc(cX,cY,R*0.27,0,Math.PI*2);
  if(fr>0){const cg=cx.createRadialGradient(cX,cY,0,cX,cY,R*0.27);cg.addColorStop(0,`rgba(200,180,100,${0.1+fr*0.25})`);cg.addColorStop(1,'rgba(10,14,25,0.8)');cx.fillStyle=cg;}else{cx.fillStyle='rgba(10,14,25,0.8)';}
  cx.fill();cx.strokeStyle='rgba(65,80,130,0.15)';cx.lineWidth=1;cx.stroke();
  cx.font=`bold ${Rn(16)}px system-ui`;cx.textAlign='center';cx.textBaseline='middle';
  cx.fillStyle=`rgba(200,190,140,${fr>0?0.4+fr*0.5:0.15})`;cx.fillText('✦',cX,cY-2);
  cx.font=`${Rn(7)}px system-ui`;cx.fillStyle='rgba(150,160,190,0.35)';cx.fillText(tot+'/27',cX,cY+Rn(11));
  cx.font=`${Rn(10)}px system-ui`;cx.fillStyle='rgba(180,170,130,0.4)';
  cx.fillText('Equipped '+catProg.filter(p=>p.eq).length+'/3',cX,cY+R*1.15);

  // Detail panel
  if(catDetail&&catSel>=0){
    catDrawDetail(cX,cY,R,f,Rn);
  }
  // Swap overlay (equip)
  if(catSwap>=0){
    catDrawSwap(f,Rn);
  }
  // Swap overlay (focus)
  if(catFocSwap>=0){
    catDrawFocSwap(f,Rn);
  }
  // Help overlay (draws last = on top)
  if(catHelpOpen){
    catDrawHelp(f,Rn);
  }
}

function catDrawHelp(f,Rn){
  // Full-screen backdrop
  cx.fillStyle='rgba(5,8,18,0.9)';cx.fillRect(0,0,W,H);
  const pw=Math.min(Rn(380),W*0.92),ph=Math.min(Rn(580),H*0.92);
  const px=W/2-pw/2,py=H/2-ph/2;
  cx.fillStyle='rgba(16,22,44,0.98)';cx.beginPath();cx.roundRect(px,py,pw,ph,Rn(16));cx.fill();
  cx.strokeStyle='rgba(180,150,80,0.3)';cx.lineWidth=1;cx.beginPath();cx.roundRect(px,py,pw,ph,Rn(16));cx.stroke();

  // Close button
  const cbSz=Rn(28),cbX=px+pw-cbSz-Rn(10),cbY=py+Rn(10);
  cx.beginPath();cx.arc(cbX+cbSz/2,cbY+cbSz/2,cbSz/2,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,0.06)';cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=1;cx.stroke();
  cx.font=`${Rn(14)}px ${f}`;cx.textAlign='center';cx.textBaseline='middle';cx.fillStyle='#aabbcc';
  cx.fillText('✕',cbX+cbSz/2,cbY+cbSz/2);
  catBtnHelpClose={x:cbX,y:cbY,w:cbSz,h:cbSz};
  cx.textBaseline='alphabetic';

  // Title
  cx.font=`bold ${Rn(18)}px ${f}`;cx.textAlign='center';cx.fillStyle='#ccaa55';
  cx.fillText('✦ Oculus Guide',W/2,py+Rn(36));

  // Body text
  const lineH=Rn(17),bodyX=px+Rn(20),bodyW=pw-Rn(40);
  let y=py+Rn(64);
  const sec=(title,color)=>{
    cx.font=`bold ${Rn(12)}px ${f}`;cx.textAlign='left';cx.fillStyle=color;
    cx.fillText(title,bodyX,y);y+=lineH;
  };
  const line=(text,color)=>{
    cx.font=`${Rn(11)}px ${f}`;cx.textAlign='left';cx.fillStyle=color||'rgba(200,210,225,0.85)';
    // simple word wrap
    const words=text.split(' ');let buf='';
    for(const w of words){
      const t=buf?buf+' '+w:w;
      if(cx.measureText(t).width>bodyW){cx.fillText(buf,bodyX,y);y+=lineH;buf=w;}
      else buf=t;
    }
    if(buf){cx.fillText(buf,bodyX,y);y+=lineH;}
  };
  const gap=()=>{y+=Rn(6);};

  sec('The 9 Windows','#aaccff');
  line('Each window represents a passive upgrade. Unlock them in 3 tiers: Clear → Tinted → Radiant.');
  gap();

  sec('Fragments (✦)','#ddcc66');
  line('Every window earns a specific type of fragment during play. See each window detail for how to earn its fragment.');
  line('Fragments only count for FOCUSED windows — pick where your effort goes.');
  gap();

  sec('Focus (◉)','#aaffcc');
  line('Focus up to '+CAT_MAX_FOCUS+' windows at once. Only focused windows collect fragments. Change focus any time between games.');
  gap();

  sec('Equip (✦)','#ffcc88');
  line('Equip up to 3 unlocked windows. Only equipped windows apply their effects during your next game.');
  gap();

  sec('Getting Started','#ff9999');
  line('1. Tap any window to see details and how to earn its fragments.');
  line('2. Focus the windows you want to progress.');
  line('3. Play blitz/daily games — focused fragments will accumulate.');
  line('4. Once Clear tier is unlocked, equip the window to activate the effect.');
  gap();

  // Settings section with loadout toggle
  sec('Settings','#aaaaff');
  const togW=Math.min(Rn(280),bodyW),togH=Rn(30),togX=bodyX,togY=y+Rn(2);
  cx.fillStyle=settings.loadoutPopup?'rgba(120,200,140,0.15)':'rgba(80,90,110,0.15)';
  cx.beginPath();cx.roundRect(togX,togY,togW,togH,Rn(8));cx.fill();
  cx.strokeStyle=settings.loadoutPopup?'rgba(140,220,160,0.4)':'rgba(120,130,160,0.3)';
  cx.lineWidth=1;cx.beginPath();cx.roundRect(togX,togY,togW,togH,Rn(8));cx.stroke();
  // Indicator dot
  const tdotX=togX+Rn(14),tdotY=togY+togH/2;
  cx.beginPath();cx.arc(tdotX,tdotY,Rn(5),0,Math.PI*2);
  cx.fillStyle=settings.loadoutPopup?'#88dd99':'#664';cx.fill();
  cx.strokeStyle=settings.loadoutPopup?'rgba(120,255,150,0.6)':'rgba(180,170,100,0.4)';
  cx.lineWidth=1;cx.stroke();
  // Label
  cx.font=`${Rn(11)}px ${f}`;cx.textAlign='left';
  cx.fillStyle=settings.loadoutPopup?'#cce':'#889';
  cx.fillText('Pre-game loadout popup: '+(settings.loadoutPopup?'ON':'OFF'),togX+Rn(28),togY+togH/2+Rn(4));
  catBtnLoadoutToggle={x:togX,y:togY,w:togW,h:togH};
  y+=togH+Rn(8);

  // Export / Import save buttons
  const sbW=(togW-Rn(8))/2,sbH=Rn(28);
  const expX=togX,impX=togX+sbW+Rn(8),sbY=y;
  cx.fillStyle='rgba(80,140,200,0.18)';cx.beginPath();cx.roundRect(expX,sbY,sbW,sbH,Rn(7));cx.fill();
  cx.strokeStyle='rgba(120,180,230,0.45)';cx.lineWidth=1;cx.beginPath();cx.roundRect(expX,sbY,sbW,sbH,Rn(7));cx.stroke();
  cx.font=`${Rn(11)}px ${f}`;cx.textAlign='center';cx.fillStyle='#aaccee';
  cx.fillText('Export Save',expX+sbW/2,sbY+sbH/2+Rn(4));
  cx.fillStyle='rgba(200,140,80,0.18)';cx.beginPath();cx.roundRect(impX,sbY,sbW,sbH,Rn(7));cx.fill();
  cx.strokeStyle='rgba(230,180,120,0.45)';cx.lineWidth=1;cx.beginPath();cx.roundRect(impX,sbY,sbW,sbH,Rn(7));cx.stroke();
  cx.fillStyle='#eecc99';cx.fillText('Import Save',impX+sbW/2,sbY+sbH/2+Rn(4));
  catBtnExportSave={x:expX,y:sbY,w:sbW,h:sbH};
  catBtnImportSave={x:impX,y:sbY,w:sbW,h:sbH};
  y+=sbH+Rn(8);

  // Hint bottom
  cx.font=`italic ${Rn(10)}px ${f}`;cx.textAlign='center';cx.fillStyle='rgba(150,160,190,0.5)';
  cx.fillText('Tap outside this panel to close',W/2,py+ph-Rn(16));
}

function catDrawDetail(cX,cY,R,f,Rn){
  const w=CAT_W[catSel],p=catProg[catSel],[r,g,b]=w.color;
  const ec=catProg.filter(p=>p.eq).length;
  const fc=catProg.filter(p=>p.foc).length;
  const canUnlock=p.tier<3&&p.frags>=CAT_TIERS[p.tier].c;
  const showFocus=p.tier<3||p.foc; // show for maxed windows too if focused (to allow unfocus)
  // Panel — height adapts to content
  const pw=Math.min(Rn(320),W*0.85);
  const ph=Rn(showFocus?(canUnlock?320:280):(canUnlock?280:240));
  const px=cX-pw/2,py=cY-ph/2;
  cx.fillStyle='rgba(8,12,28,0.93)';cx.beginPath();cx.roundRect(px,py,pw,ph,Rn(14));cx.fill();
  cx.strokeStyle=`rgba(${r},${g},${b},0.25)`;cx.lineWidth=1;cx.beginPath();cx.roundRect(px,py,pw,ph,Rn(14));cx.stroke();

  // Close button
  const cbSz=Rn(24),cbX=px+pw-cbSz-Rn(8),cbY=py+Rn(8);
  cx.beginPath();cx.arc(cbX+cbSz/2,cbY+cbSz/2,cbSz/2,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,0.05)';cx.fill();cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=1;cx.stroke();
  cx.font=`${Rn(14)}px system-ui`;cx.textAlign='center';cx.textBaseline='middle';cx.fillStyle='#8899aa';
  cx.fillText('✕',cbX+cbSz/2,cbY+cbSz/2);
  catBtnClose={x:cbX,y:cbY,w:cbSz,h:cbSz};

  // Title
  cx.textAlign='left';cx.font=`bold ${Rn(16)}px ${f}`;cx.fillStyle=`rgba(${r},${g},${b},0.9)`;
  cx.fillText(w.name,px+Rn(16),py+Rn(28));

  // Tiers
  let ty=py+Rn(46);
  for(let t=0;t<3;t++){
    const unlocked=p.tier>t,isNext=p.tier===t;
    const alpha=unlocked?1:isNext?0.7:0.25;
    // Pip
    cx.beginPath();cx.roundRect(px+Rn(16),ty,Rn(10),Rn(10),Rn(3));
    if(unlocked){cx.fillStyle=`rgba(${r},${g},${b},0.8)`;cx.fill();}
    else{cx.strokeStyle=`rgba(${r},${g},${b},${isNext?0.4:0.15})`;cx.lineWidth=1;if(isNext)cx.setLineDash([2,2]);cx.stroke();cx.setLineDash([]);}
    // Text
    cx.font=`600 ${Rn(10)}px ${f}`;cx.fillStyle=`rgba(180,190,210,${alpha*0.5})`;
    cx.fillText(CAT_TIERS[t].n+' — '+CAT_TIERS[t].c+' fragments',px+Rn(32),ty+Rn(5));
    cx.font=`${Rn(12)}px ${f}`;cx.fillStyle=`rgba(220,230,245,${alpha*0.8})`;
    cx.fillText(w.t[t],px+Rn(32),ty+Rn(20));
    ty+=Rn(34);
  }

  // Fragment bar
  catBtnUnlock=null;
  if(p.tier<3){
    const nt=p.tier,nc=CAT_TIERS[nt].c,fp=Math.min(p.frags/nc,1);
    const barX=px+Rn(16),barY=ty+Rn(4),barW=pw-Rn(32),barH=Rn(4);
    cx.font=`${Rn(10)}px ${f}`;cx.textAlign='left';cx.fillStyle='rgba(150,160,190,0.4)';
    cx.fillText(p.frags+'/'+nc,barX,barY+Rn(14));
    cx.textAlign='right';cx.fillText(CAT_TIERS[nt].n,barX+barW,barY+Rn(14));
    cx.fillStyle='rgba(255,255,255,0.06)';cx.beginPath();cx.roundRect(barX,barY,barW,barH,2);cx.fill();
    const barCol=canUnlock?1:0.6;
    cx.fillStyle=`rgba(${r},${g},${b},${barCol})`;cx.beginPath();cx.roundRect(barX,barY,barW*fp,barH,2);cx.fill();
    // Earn hint (only when not ready to unlock)
    if(!canUnlock){
      cx.font=`italic ${Rn(9)}px ${f}`;cx.textAlign='left';cx.fillStyle='rgba(140,155,190,0.35)';
      cx.fillText('Earn: '+w.earn,barX,barY+Rn(25));
    }
    ty+=Rn(22);
    // Unlock button
    if(canUnlock){
      const ubW=pw-Rn(32),ubH=Rn(34),ubX=px+Rn(16),ubY=ty+Rn(2);
      const pulse=0.8+0.2*Math.sin(performance.now()*0.005);
      cx.fillStyle=`rgba(${r},${g},${b},${0.25*pulse})`;cx.beginPath();cx.roundRect(ubX,ubY,ubW,ubH,Rn(10));cx.fill();
      cx.strokeStyle=`rgba(${r},${g},${b},${0.5*pulse})`;cx.lineWidth=1.5;cx.beginPath();cx.roundRect(ubX,ubY,ubW,ubH,Rn(10));cx.stroke();
      cx.font=`bold ${Rn(13)}px ${f}`;cx.textAlign='center';
      cx.fillStyle=`rgba(${r},${g},${b},${pulse})`;
      cx.fillText('✦ Unlock '+CAT_TIERS[nt].n+' ('+nc+' frags)',ubX+ubW/2,ubY+ubH/2+Rn(4));
      catBtnUnlock={x:ubX,y:ubY,w:ubW,h:ubH};
    }
  }else{
    // Fully upgraded
    cx.font=`600 ${Rn(10)}px ${f}`;cx.textAlign='center';cx.fillStyle=`rgba(${r},${g},${b},0.5)`;
    cx.fillText('✦ Fully Radiant ✦',px+pw/2,ty+Rn(10));
  }

  // Focus button (only for non-maxed windows)
  catBtnFocus=null;
  if(showFocus){
    const fbW=pw-Rn(32),fbH=Rn(30),fbX=px+Rn(16),fbY=py+ph-Rn(90);
    let fbCol,fbTxt;
    if(p.foc){fbCol=`rgba(${r},${g},${b},0.2)`;fbTxt='◉ Focused — earning fragments';cx.fillStyle=`rgba(${r},${g},${b},0.8)`;}
    else if(fc>=CAT_MAX_FOCUS){fbCol='rgba(50,60,80,0.3)';fbTxt='Focus — choose which to replace';cx.fillStyle='#8899aa';}
    else{fbCol='rgba(50,60,80,0.3)';fbTxt='○ Focus this window';cx.fillStyle='#8899aa';}
    cx.beginPath();cx.roundRect(fbX,fbY,fbW,fbH,Rn(8));cx.fillStyle=fbCol;cx.fill();
    cx.strokeStyle=p.foc?`rgba(${r},${g},${b},0.3)`:'rgba(60,70,90,0.2)';cx.lineWidth=1;
    cx.beginPath();cx.roundRect(fbX,fbY,fbW,fbH,Rn(8));cx.stroke();
    cx.font=`500 ${Rn(11)}px ${f}`;cx.textAlign='center';
    cx.fillStyle=p.foc?`rgba(${r},${g},${b},0.8)`:(fc>=CAT_MAX_FOCUS?'#556':'#8899aa');
    cx.fillText(fbTxt,fbX+fbW/2,fbY+fbH/2+Rn(3));
    catBtnFocus={x:fbX,y:fbY,w:fbW,h:fbH};
  }

  // Equip button
  const ebW=pw-Rn(32),ebH=Rn(36),ebX=px+Rn(16),ebY=py+ph-Rn(50);
  let btnCol,btnTxt;
  if(p.tier===0){btnCol='rgba(40,45,60,0.5)';btnTxt='Unlock first tier to equip';cx.fillStyle='#445';}
  else if(p.eq){btnCol='rgba(200,170,60,0.2)';btnTxt='✦ Equipped — tap to remove';cx.fillStyle='#ddcc88';}
  else if(ec>=3){btnCol='rgba(180,120,50,0.25)';btnTxt='Equip — choose which to replace';cx.fillStyle='#ddaa66';}
  else{btnCol='rgba(80,100,180,0.3)';btnTxt='Equip this window';cx.fillStyle='#aabbee';}
  cx.beginPath();cx.roundRect(ebX,ebY,ebW,ebH,Rn(10));cx.fillStyle=btnCol;cx.fill();
  cx.strokeStyle=p.tier===0?'rgba(60,65,80,0.2)':`rgba(${r},${g},${b},0.25)`;cx.lineWidth=1;

  catBtnEquip={x:ebX,y:ebY,w:ebW,h:ebH};
}

function catHandleTap(p){
  const cX2=W/2,cY2=H/2,R=Math.min(W,H)*0.42;
  // Help overlay — toggle button works, tap outside panel closes
  if(catHelpOpen){
    if(catBtnLoadoutToggle&&hitBtn(catBtnLoadoutToggle,p)){
      settings.loadoutPopup=!settings.loadoutPopup;saveSettings();return true;
    }
    if(catBtnExportSave&&hitBtn(catBtnExportSave,p)){
      const data={};
      for(const k of Object.keys(localStorage)){
        if(k.startsWith('vitralink_v2_'))data[k]=localStorage.getItem(k);
      }
      // Unicode-safe base64: encode UTF-8 first, then base64
      const json=JSON.stringify(data);
      const b64=btoa(unescape(encodeURIComponent(json)));
      const blob='VITRALINK_SAVE_v1:'+b64;
      // Trigger a .txt file download — reliable on mobile, no length limit
      try{
        const fileBlob=new Blob([blob],{type:'text/plain'});
        const url=URL.createObjectURL(fileBlob);
        const a=document.createElement('a');
        const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
        a.href=url;a.download='vitralink-save-'+ts+'.txt';
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(url),1000);
        addPanelMsg('Save downloaded','#aaccee',2500);
      }catch(e){
        // Fallback for environments without Blob/download support
        window.prompt('Copy this save string (download unavailable):',blob);
      }
      return true;
    }
    if(catBtnImportSave&&hitBtn(catBtnImportSave,p)){
      // Prefer file picker (mobile-friendly, no length limit). Fall back to prompt.
      const fileInp=document.createElement('input');
      fileInp.type='file';fileInp.accept='.txt,text/plain';
      fileInp.style.display='none';
      fileInp.onchange=(ev)=>{
        const file=ev.target.files&&ev.target.files[0];
        if(!file){document.body.removeChild(fileInp);return;}
        const reader=new FileReader();
        reader.onload=()=>{
          document.body.removeChild(fileInp);
          processImport(String(reader.result||''));
        };
        reader.onerror=()=>{
          document.body.removeChild(fileInp);
          window.alert('Could not read the file.');
        };
        reader.readAsText(file);
      };
      document.body.appendChild(fileInp);fileInp.click();
      return true;
    }
    if(catBtnHelpClose&&hitBtn(catBtnHelpClose,p)){catHelpOpen=false;return true;}
    // Tap outside the panel area closes; tap inside is ignored (so interactions don't dismiss)
    const s=uiS,Rn=n=>Math.round(n*s);
    const pw=Math.min(Rn(380),W*0.92),ph=Math.min(Rn(580),H*0.92);
    const px=W/2-pw/2,py=H/2-ph/2;
    if(p.x<px||p.x>px+pw||p.y<py||p.y>py+ph){catHelpOpen=false;return true;}
    return true;
  }
  // Help button
  if(catBtnHelp&&hitBtn(catBtnHelp,p)){catHelpOpen=true;return true;}
  // Back button
  if(catBtnBack&&hitBtn(catBtnBack,p)){showOculus=false;showModeSelect=true;catSel=-1;catDetail=false;catSwap=-1;catFocSwap=-1;return true;}
  // Swap overlay (equip)
  if(catSwap>=0){
    for(const sb of catSwapBtns){
      if(hitBtn(sb,p)){
        if(sb.idx===-1){catSwap=-1;}
        else{catProg[sb.idx].eq=false;catProg[catSwap].eq=true;catSwap=-1;catSave();}
        catDetail=true;return true;
      }
    }
    return true;
  }
  // Swap overlay (focus)
  if(catFocSwap>=0){
    for(const sb of catFocSwapBtns){
      if(hitBtn(sb,p)){
        if(sb.idx===-1){catFocSwap=-1;}
        else{catProg[sb.idx].foc=false;catProg[catFocSwap].foc=true;catFocSwap=-1;catSave();}
        catDetail=true;return true;
      }
    }
    return true;
  }
  // Detail panel
  if(catDetail&&catSel>=0){
    // Close button
    if(catBtnClose&&hitBtn(catBtnClose,p)){catDetail=false;catSel=-1;return true;}
    // Unlock button
    if(catBtnUnlock&&hitBtn(catBtnUnlock,p)){
      if(catUnlockTier(catSel)){
        // Stay on detail panel to show updated state
      }
      return true;
    }
    // Focus button
    if(catBtnFocus&&hitBtn(catBtnFocus,p)){
      const pr=catProg[catSel];
      if(pr.foc){pr.foc=false;catSave();return true;}
      const fc=catProg.filter(p=>p.foc).length;
      if(fc<CAT_MAX_FOCUS){pr.foc=true;catSave();return true;}
      catFocSwap=catSel;return true; // full — open swap modal
    }
    // Equip button
    if(catBtnEquip&&hitBtn(catBtnEquip,p)){
      const pr=catProg[catSel];
      if(pr.tier===0)return true;
      if(pr.eq){pr.eq=false;catSave();return true;}
      const ec=catProg.filter(p=>p.eq).length;
      if(ec<3){pr.eq=true;catSave();return true;}
      catSwap=catSel;return true;
    }
    // Tap outside panel = close (dynamic height matches draw)
    const canUL=catProg[catSel].tier<3&&catProg[catSel].frags>=CAT_TIERS[catProg[catSel].tier].c;
    const shFoc=catProg[catSel].tier<3;
    const pw=Math.min(Math.round(320*uiS),W*0.85),ph=Math.round((shFoc?(canUL?320:280):(canUL?280:240))*uiS);
    const px2=cX2-pw/2,py2=cY2-ph/2;
    if(p.x<px2||p.x>px2+pw||p.y<py2||p.y>py2+ph){catDetail=false;catSel=-1;return true;}
    return true;
  }
  // Rose window tap
  const dx=(p.x-cX2)/R,dy=(p.y-cY2)/R,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>CAT_iR-0.03&&dist<CAT_oR+0.08){
    let ang=Math.atan2(dy,dx)+Math.PI/2;if(ang<0)ang+=Math.PI*2;
    const idx=Math.floor(ang/CAT_PA)%9;
    catSel=idx;catDetail=true;return true;
  }
  catSel=-1;catDetail=false;
  return true;
}

var catBtnClose=null;

// ================================================================
//  RENDER
// ================================================================
function render(){
  cx.clearRect(0,0,W,H);

  if(showModeSelect){drawModeSelect();return;}
  if(showOculus){drawOculus();return;}

  // Background — cathedral glow: warm light behind puzzle, deep blue edges
  if(!render._bgGrad||render._bgW!==W||render._bgH!==H){
    const bg=cx.createRadialGradient(W/2,H*.44,0,W/2,H*.44,Math.max(W,H)*.72);
    bg.addColorStop(0,'#1e2550');bg.addColorStop(0.35,'#182044');bg.addColorStop(0.7,'#111838');bg.addColorStop(1,'#0a0f28');
    render._bgGrad=bg;render._bgW=W;render._bgH=H;
  }
  cx.fillStyle=render._bgGrad;cx.fillRect(0,0,W,H);
  // Warm ambient glow behind puzzle area
  cx.save();
  const ambR=cSz*CFG.HEX_GEN_RINGS*1.15;
  const amb=cx.createRadialGradient(bCX,bCY,0,bCX,bCY,ambR);
  amb.addColorStop(0,'rgba(60,50,90,0.18)');amb.addColorStop(0.5,'rgba(40,35,70,0.1)');amb.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=amb;cx.fillRect(0,0,W,H);
  cx.restore();

  // Voronoi: only recompute when seeds have moved
  if(animPhase!=='idle'){vorDirty=true;nbrsDirty=true;} // seeds move during animations
  if(vorDirty){
    const vP2=[],vM2=[];
    for(let i=0;i<slots.length;i++){vP2.push([slots[i].seedX,slots[i].seedY]);vM2.push(i);}
    for(const bs of borderSeeds){vP2.push([bs.x,bs.y]);vM2.push(-1);}
    if(vP2.length<4)return;
    const pad=cSz*(CFG.HEX_GEN_RINGS+4)*2,bn=[bCX-pad,bCY-pad,bCX+pad,bCY+pad];
    try{cachedVor=d3.Delaunay.from(vP2).voronoi(bn);}catch(e){return;}
    cachedVP=vP2;cachedVM=vM2;
    vorDirty=false;
    glNeedsBuild=true;
  }
  if(!cachedVor||cachedVP.length<4)return;
  const vP=cachedVP,vM=cachedVM,vor=cachedVor;

  const lx=CFG.LX,ly=CFG.LY;

  // === WebGL GLASS RENDER (replaces Canvas 2D PASS 0 + glass fills) ===
  if(useGL){
    if(vorDirty||glNeedsBuild||animPhase!=='idle')buildGemVerts(vor,vP,vM);
    renderGL();
    cx.drawImage(glCanvas,0,0,glCanvas.width,glCanvas.height,0,0,W,H);
  } else {
    // Canvas 2D fallback: Backlit glow (PASS 0)
    if(glassFrame%2===0){
      for(let i=0;i<vP.length;i++){
        const si=vM[i];if(si<0)continue;
        const s=slots[si];if(s.isHole||s.flash>0)continue;
        const pal=s.rainbow?CFG.PAL[0]:CFG.PAL[s.ci];
        const[px,py]=vP[i];
        const _r=pal.midR,_g=pal.midG,_b=pal.midB;
        const _dr=pal.darkR,_dg=pal.darkG,_db=pal.darkB;
        cx.save();
        const glR=cSz*0.95;
        const glow=cx.createRadialGradient(px,py,glR*0.2,px,py,glR);
        glow.addColorStop(0,`rgba(${_r},${_g},${_b},0.13)`);
        glow.addColorStop(0.5,`rgba(${_dr},${_dg},${_db},0.06)`);
        glow.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=glow;
        cx.beginPath();cx.arc(px,py,glR,0,Math.PI*2);cx.fill();
        cx.restore();
      }
    }
  }

  // PASS 1: Glass fills
  for(let i=0;i<vP.length;i++){
    const si=vM[i];if(si<0)continue;
    const s=slots[si],cell=vor.cellPolygon(i);if(!cell||cell.length<3)continue;
    const[px,py]=vP[i];
    let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
    for(const[a,b]of cell){if(a<x0)x0=a;if(a>x1)x1=a;if(b<y0)y0=b;if(b>y1)y1=b;}
    const cR=Math.max(x1-x0,y1-y0)/2;

    cx.save();

    cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
    for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();

    if(s.isHole){
      // Dark empty cell
      cx.fillStyle='#060618';cx.fill();
      cx.strokeStyle='rgba(30,30,60,0.5)';cx.lineWidth=1;cx.stroke();
    } else if(s.rainbow&&s.flash<=0){
      // Rainbow gem — dark base with full-color stripes
      cx.fillStyle='#0a0a22';cx.fill();
      cx.save();
      cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
      for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();
      cx.clip();
      const stripeW=cSz*0.3;
      const angle=Math.PI*0.25+Math.sin(time*0.003)*0.08;
      const cosA=Math.cos(angle),sinA=Math.sin(angle);
      for(let si2=-8;si2<=8;si2++){
        const ci2=((si2%CFG.NUM_COLORS)+CFG.NUM_COLORS)%CFG.NUM_COLORS;
        const p=CFG.PAL[ci2];
        const ox=px+cosA*si2*stripeW,oy=py+sinA*si2*stripeW;
        const dx=-sinA*cSz*2,dy=cosA*cSz*2;
        cx.beginPath();
        cx.moveTo(ox-dx,oy-dy);cx.lineTo(ox+cosA*stripeW-dx,oy+sinA*stripeW-dy);
        cx.lineTo(ox+cosA*stripeW+dx,oy+sinA*stripeW+dy);cx.lineTo(ox+dx,oy+dy);
        cx.closePath();
        // Gradient within each stripe for glass-like look
        const sg=cx.createLinearGradient(ox,oy,ox+cosA*stripeW,oy+sinA*stripeW);
        sg.addColorStop(0,p.dark);sg.addColorStop(0.3,p.mid);sg.addColorStop(0.7,p.hi);sg.addColorStop(1,p.mid);
        cx.fillStyle=sg;cx.globalAlpha=0.85;cx.fill();
      }
      // Warm light wash
      cx.globalAlpha=1;
      const wg=cx.createLinearGradient(x0,y0,x1,y1);
      wg.addColorStop(0,'rgba(255,255,230,.12)');wg.addColorStop(.5,'rgba(255,255,255,.02)');wg.addColorStop(1,'rgba(0,0,20,.08)');
      cx.fillStyle=wg;cx.fill();
      cx.restore();
      // Shimmer border
      const shimmer=.5+.3*Math.sin(time*.06);
      cx.save();cx.globalAlpha=shimmer;
      cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
      for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();
      cx.strokeStyle='rgba(255,255,255,0.7)';cx.lineWidth=2.5;
      cx.shadowColor='#ffffff';cx.shadowBlur=10;cx.stroke();
      cx.restore();
    } else {
      const pal=CFG.PAL[s.ci];

      // Flash overlay
      if(s.flash>0){
        cx.fillStyle=pal.dark;cx.fill();
        cx.save();cx.clip();
        const lg=cx.createLinearGradient(px+lx*cR*.8,py+ly*cR*.8,px-lx*cR*.8,py-ly*cR*.8);
        lg.addColorStop(0,pal.hi);lg.addColorStop(.35,pal.mid);lg.addColorStop(1,pal.dark);
        cx.fillStyle=lg;cx.fill();
        const fi=Math.sin(s.flash*Math.PI*3)*.5+.5;
        cx.fillStyle=`rgba(255,255,255,${fi*0.6})`;cx.fill();
        cx.restore();
      } else if(!useGL) {
        // Canvas 2D fallback: Enhanced stained glass rendering
        const phase=si*2.17+si*si*0.31; // unique per-gem animation phase
        const rt=performance.now()*0.001; // real-time seconds (frame-rate independent)

        // Layer 1: Deep saturated base
        cx.fillStyle=pal.dark;cx.fill();
        cx.save();cx.clip();

        // Layer 2: Main directional light gradient (subtly shifting per gem)
        const lightShift=Math.sin(rt*2.4+phase)*0.1;
        const alx=lx+lightShift,aly=ly+lightShift*0.5;
        const lg=cx.createLinearGradient(px+alx*cR*.9,py+aly*cR*.9,px-alx*cR*.9,py-aly*cR*.9);
        lg.addColorStop(0,pal.hi);lg.addColorStop(0.25,pal.mid);lg.addColorStop(0.65,pal.dark);lg.addColorStop(1,'#0a0818');
        cx.fillStyle=lg;cx.fill();

        // Parse palette colors to rgb for alpha compositing
        const hiR=pal.hiR,hiG=pal.hiG,hiB=pal.hiB;
        const midR=pal.midR,midG=pal.midG,midB=pal.midB;
        const dkR=pal.darkR,dkG=pal.darkG,dkB=pal.darkB;

        // Layer 3: Soft light wash (non-circular, toward light)
        const gx=px+alx*cR*.5,gy=py+aly*cR*.5;
        const gx2=px-alx*cR*.5,gy2=py-aly*cR*.5;
        const ig=cx.createLinearGradient(gx,gy,gx2,gy2);
        ig.addColorStop(0,`rgba(${hiR},${hiG},${hiB},0.19)`);ig.addColorStop(.4,`rgba(${midR},${midG},${midB},0.06)`);ig.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=ig;cx.fill();

        // Layer 4: Drifting light blobs (liquid glass) — 2 blobs, quantized timing
        const brt=Math.floor(rt*20)/20; // quantize to ~20Hz for smooth-enough animation
        for(let bi=0;bi<2;bi++){
          const bp=phase+bi*2.09;
          const spd1=1.02+bi*0.36, spd2=0.78-bi*0.18;
          const bx=px+Math.sin(brt*spd1+bp)*cR*0.4+Math.cos(brt*spd2+bp*1.3)*cR*0.2;
          const by=py+Math.cos(brt*spd1*0.8+bp*0.7)*cR*0.35+Math.sin(brt*spd2*1.2+bp)*cR*0.15;
          const bSize=cR*(0.32+0.16*Math.sin(brt*1.2+bp*2));
          const bAlpha=0.14+0.09*Math.sin(brt*1.5+bp*1.5);
          const br=bi===0?hiR:dkR, bg2=bi===0?hiG:dkG, bb=bi===0?hiB:dkB;
          const blob=cx.createRadialGradient(bx,by,0,bx,by,bSize);
          blob.addColorStop(0,`rgba(${br},${bg2},${bb},${bAlpha})`);
          blob.addColorStop(0.6,`rgba(${br},${bg2},${bb},${bAlpha*0.3})`);
          blob.addColorStop(1,'rgba(0,0,0,0)');
          cx.fillStyle=blob;cx.fill();
        }

        // Layer 5: Subtle edge darkening
        const fg=cx.createRadialGradient(px,py,cR*.45,px,py,cR*.95);
        fg.addColorStop(0,'rgba(0,0,0,0)');
        fg.addColorStop(0.7,'rgba(0,0,0,0)');
        fg.addColorStop(1,'rgba(0,0,12,0.18)');
        cx.fillStyle=fg;cx.fill();

        // Layer 6: Warm light wash
        const wg=cx.createLinearGradient(x0,y0,x1,y1);
        wg.addColorStop(0,'rgba(255,240,200,.08)');wg.addColorStop(.3,'rgba(255,255,255,.02)');
        wg.addColorStop(.7,'rgba(0,0,0,0)');wg.addColorStop(1,'rgba(0,0,30,.06)');
        cx.fillStyle=wg;cx.fill();

        // Layer 7: Glass texture (every 3rd frame — composite ops are expensive on mobile)
        if(glassFrame%3===0){
          cx.globalAlpha=0.10;
          cx.globalCompositeOperation='overlay';
          const texOff=(si*37)%128;
          cx.drawImage(noiseCV,texOff,texOff,64,64,x0,y0,x1-x0,y1-y0);
          cx.globalCompositeOperation='source-over';
          cx.globalAlpha=1;
        }

        // Layer 8: Inner shadow (every other frame — subtle static effect)
        if(glassFrame%2===0){
          for(let j=0;j<cell.length-1;j++){
            const[ax,ay]=cell[j],[bx,by]=cell[j+1];
            const enx=-(by-ay),eny=bx-ax,el=Math.sqrt(enx*enx+eny*eny)||1;
            const dot=(enx/el)*lx+(eny/el)*ly;if(Math.abs(dot)<.08)continue;
            if(dot>0){
              cx.strokeStyle=`rgba(255,255,220,${Math.min(.28,dot*.35)})`;cx.lineWidth=2;
            }else{
              cx.strokeStyle=`rgba(0,0,10,${Math.min(.40,-dot*.45)})`;cx.lineWidth=2.8;
            }
            cx.beginPath();cx.moveTo(ax,ay);cx.lineTo(bx,by);cx.stroke();
          }
        }
        cx.restore();
      }

      // Chain highlight — subtle brighten (main trail drawn in separate pass)
      if(s.inChain){
        cx.save();
        cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
        for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();
        cx.globalAlpha=0.25;
        cx.fillStyle='#fff';cx.fill();
        cx.restore();
      }
      // Hint glow (gentle pulse on valid chain after idle)
      if(!s.inChain&&hintSlots.includes(si)){
        const pulse=.25+.2*Math.sin(time*.04);cx.save();cx.globalAlpha=pulse;
        cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
        for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();
        cx.fillStyle='rgba(255,255,255,0.5)';cx.fill();
        cx.strokeStyle='rgba(255,255,200,0.6)';cx.lineWidth=2.5;cx.stroke();
        cx.restore();
      }
      // === SPECIAL GEM OVERLAYS: full-cell tinted overlay + icon + countdown badge ===
      if(s.special){
        const pulse=.5+.5*Math.sin(time*(s.special==='curse'?.12:s.special==='blaze'?.09:.08));
        const pal=CFG.PAL[s.ci]||CFG.PAL[0];
        const urgent=s.specialCD<=3;
        // Config per type
        const cfg={
          power: {icon:'⭐',glowCol:'#ffdd00',borderCol:`rgba(255,230,50,${0.7+pulse*0.3})`,label:null},
          curse: {icon:'💀',glowCol:'#ff2200',borderCol:`rgba(255,50,30,${0.7+pulse*0.3})`,label:null},
          blaze: {icon:null,glowCol:'#ff6600',borderCol:`rgba(255,140,30,${0.7+pulse*0.3})`,label:'×'+s.blazeMult},
          hourglass:{icon:'⏳',glowCol:'#44bbff',borderCol:`rgba(100,200,255,${0.7+pulse*0.3})`,label:null},
        }[s.special];
        if(cfg){
          const f='"SF Pro Display","Segoe UI",system-ui,sans-serif';
          // Clip overlay + icon + badge to the cell polygon so nothing bleeds past
          // the gem's own bounds (fixes badges overflowing on edge cells).
          cx.save();
          cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
          for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();
          cx.clip();
          // 1) Full cell dark overlay in gem's own dark color
          cx.fillStyle=`rgba(${pal.darkR},${pal.darkG},${pal.darkB},0.45)`;cx.fill();
          // 2) Glowing border
          cx.shadowColor=cfg.glowCol;cx.shadowBlur=16+pulse*12;
          cx.strokeStyle=cfg.borderCol;cx.lineWidth=3.5;cx.stroke();
          cx.shadowBlur=0;

          // 3) Icon or label — positioned slightly higher to leave room for the badge
          cx.textAlign='center';cx.textBaseline='middle';
          if(cfg.icon){
            cx.font=`bold ${Math.round(cSz*0.5)}px ${f}`;
            cx.shadowColor=cfg.glowCol;cx.shadowBlur=12;
            cx.fillStyle='#fff';
            cx.fillText(cfg.icon,px,py-cSz*0.16);
            cx.shadowBlur=0;
          } else if(cfg.label){
            cx.font=`bold ${Math.round(cSz*0.52)}px ${f}`;
            cx.shadowColor=cfg.glowCol;cx.shadowBlur=12;
            cx.fillStyle='#fff';
            cx.fillText(cfg.label,px,py-cSz*0.16);
            cx.shadowBlur=0;
          }

          // 4) Countdown badge — pill shape at bottom of cell (clear separation from label)
          const badgeY=py+cSz*0.3;
          const badgeW=cSz*0.42, badgeH=cSz*0.3, badgeR=badgeH*0.45;
          const bx0=px-badgeW/2,by0=badgeY-badgeH/2;
          // Badge background
          cx.beginPath();
          cx.moveTo(bx0+badgeR,by0);cx.lineTo(bx0+badgeW-badgeR,by0);
          cx.arcTo(bx0+badgeW,by0,bx0+badgeW,by0+badgeR,badgeR);
          cx.lineTo(bx0+badgeW,by0+badgeH-badgeR);
          cx.arcTo(bx0+badgeW,by0+badgeH,bx0+badgeW-badgeR,by0+badgeH,badgeR);
          cx.lineTo(bx0+badgeR,by0+badgeH);
          cx.arcTo(bx0,by0+badgeH,bx0,by0+badgeH-badgeR,badgeR);
          cx.lineTo(bx0,by0+badgeR);
          cx.arcTo(bx0,by0,bx0+badgeR,by0,badgeR);
          cx.closePath();
          cx.fillStyle=urgent?'rgba(220,30,20,0.92)':'rgba(0,0,0,0.75)';cx.fill();
          if(urgent){cx.strokeStyle='rgba(255,100,80,0.8)';cx.lineWidth=1.5;cx.stroke();}
          // Badge text
          cx.font=`bold ${Math.round(cSz*0.26)}px ${f}`;
          cx.fillStyle=urgent?'#fff':'#eee';
          cx.fillText(s.specialCD,px,badgeY+1);
          cx.restore();
        }
      }
    }
    cx.restore();
  }

  // PASS 2: Lead came (3D profile)
  // Base: wide dark lead
  cx.save();cx.strokeStyle='rgba(2,1,8,.95)';cx.lineWidth=CFG.LEAD_W+1.2;cx.lineJoin='round';cx.lineCap='round';
  for(let i=0;i<vP.length;i++){const si=vM[i];if(si<0||slots[si].isHole||slots[si].flash>0)continue;
    const cell=vor.cellPolygon(i);if(!cell)continue;
    cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
    for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();cx.stroke();}
  cx.restore();
  // Highlight: thin lighter line offset toward light (top edge of lead)
  cx.save();cx.strokeStyle='rgba(60,55,80,.40)';cx.lineWidth=1;cx.lineJoin='round';cx.lineCap='round';
  for(let i=0;i<vP.length;i++){const si=vM[i];if(si<0||slots[si].isHole||slots[si].flash>0)continue;
    const cell=vor.cellPolygon(i);if(!cell)continue;
    cx.beginPath();cx.moveTo(cell[0][0]+lx*0.8,cell[0][1]+ly*0.8);
    for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0]+lx*0.8,cell[j][1]+ly*0.8);cx.closePath();cx.stroke();}
  cx.restore();

  // CHAIN TRAIL — thick white cell outlines + connecting line ON TOP of lead came
  if(chain.length>=1&&vor){
    const pulse=.75+.25*Math.sin(time*.1);
    const chainPal=slots[chain[0]]?CFG.PAL[slots[chain[0]].ci]:CFG.PAL[0];
    const trailCol=chainPal?chainPal.edge:'#fff';

    // 1) White cell outlines for each chained gem — the main visibility feature
    cx.save();
    for(let ci2=0;ci2<chain.length;ci2++){
      const si=chain[ci2];
      // Find this slot's Voronoi cell index
      let vi=-1;
      for(let k=0;k<vM.length;k++){if(vM[k]===si){vi=k;break;}}
      if(vi<0)continue;
      const cell=vor.cellPolygon(vi);if(!cell||cell.length<3)continue;
      cx.beginPath();cx.moveTo(cell[0][0],cell[0][1]);
      for(let j=1;j<cell.length;j++)cx.lineTo(cell[j][0],cell[j][1]);cx.closePath();
      // Thick white border
      cx.strokeStyle='rgba(255,255,255,0.95)';cx.lineWidth=4.5;cx.lineJoin='round';
      cx.shadowColor='#fff';cx.shadowBlur=10;cx.globalAlpha=pulse;
      cx.stroke();cx.shadowBlur=0;
    }
    cx.restore();

  }

  // Particles
  for(const p of particles){cx.globalAlpha=p.life*p.life;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();}
  cx.globalAlpha=1;

  // UI panels on top
  // Milestone celebration overlay
  drawCeleb();

  drawTopBar();drawMessageTicker();drawBottomPanel();
  // Repaint chain + color wheel overlay
  if(repaintSelected.length>0){
    // Dim the board
    cx.fillStyle='rgba(8,12,30,.45)';cx.fillRect(0,0,W,H);
    // Draw chain connections
    if(repaintSelected.length>1){
      cx.beginPath();
      cx.moveTo(slots[repaintSelected[0]].seedX,slots[repaintSelected[0]].seedY);
      for(let i=1;i<repaintSelected.length;i++)cx.lineTo(slots[repaintSelected[i]].seedX,slots[repaintSelected[i]].seedY);
      cx.strokeStyle='rgba(100,210,255,0.5)';cx.lineWidth=4;cx.lineCap='round';cx.stroke();
    }
    // Highlight all selected gems
    for(const si of repaintSelected){
      const rs=slots[si];
      cx.save();cx.shadowColor='#66ccff';cx.shadowBlur=16;
      cx.strokeStyle='#88ddff';cx.lineWidth=3;
      cx.beginPath();cx.arc(rs.seedX,rs.seedY,cSz*0.6,0,Math.PI*2);cx.stroke();
      cx.restore();
    }
    if(repaintDragging){
      // Still dragging — show count
      const f2='"SF Pro Display","Segoe UI",system-ui,sans-serif';
      const rem=getRepaintGems()-repaintSelected.length;
      cx.font=`bold 14px ${f2}`;cx.textAlign='center';cx.fillStyle='#66ccff';
      cx.fillText(rem>0?'Chain '+(rem)+' more':'Release to pick color',W/2,H*0.92);
    }
    if(!repaintDragging){
      // Chain finalized — show color wheel
      const lastSi=repaintSelected[repaintSelected.length-1];
      const rawX=slots[lastSi].seedX,rawY=slots[lastSi].seedY;
      const wheelR=cSz*1.6;
      const allColors=[];for(let c=0;c<CFG.NUM_COLORS;c++)allColors.push(c);
      const optR=cSz*0.48;
      const margin=optR+6;
      const rpx=Math.max(wheelR+margin, Math.min(W-wheelR-margin, rawX));
      const rpy=Math.max(wheelR+margin, Math.min(H-wheelR-margin-cSz, rawY));
      const f2='"SF Pro Display","Segoe UI",system-ui,sans-serif';
      for(let i=0;i<allColors.length;i++){
        const ang=-Math.PI/2+i*(Math.PI*2/allColors.length);
        const cx2=rpx+Math.cos(ang)*wheelR;
        const cy2=rpy+Math.sin(ang)*wheelR;
        const pal2=CFG.PAL[allColors[i]];
        cx.save();
        cx.shadowColor=pal2.hi;cx.shadowBlur=10;
        const sg=cx.createRadialGradient(cx2-optR*0.2,cy2-optR*0.2,0,cx2,cy2,optR);
        sg.addColorStop(0,pal2.hi);sg.addColorStop(0.5,pal2.mid);sg.addColorStop(1,pal2.dark);
        cx.fillStyle=sg;
        cx.beginPath();cx.arc(cx2,cy2,optR,0,Math.PI*2);cx.fill();
        cx.strokeStyle='rgba(255,255,255,.4)';cx.lineWidth=2;
        cx.beginPath();cx.arc(cx2,cy2,optR,0,Math.PI*2);cx.stroke();
        cx.restore();
      }
      cx.font=`12px ${f2}`;cx.textAlign='center';cx.fillStyle='#6680aa';
      cx.fillText('Tap outside to cancel',rpx,rpy+wheelR+cSz*0.9);
    }
  }

  if(gameOver){
    drawGameOver();
    // Tutorials can still render on top of game-over (e.g. intro_modes when unlocked)
    if(tutActive)drawTutorial();
  }
  else if(loadoutPopupActive)drawLoadoutPopup();
  else if(tutActive)drawTutorial();
  else if(paused)drawPause();
  else if(showRules)drawRules();
  else if(deadlocked&&animPhase==='idle')drawDeadlock();

  // Long-press radial menu
  if(lpMenuActive&&!gameOver&&!paused&&!tutActive){
    const f2='"SF Pro Display","Segoe UI",system-ui,sans-serif';
    const hasSh=shatterCharges>0,hasRp=repaintCharges>0;
    const opts=[];
    if(hasSh)opts.push('shatter');
    if(hasRp)opts.push('repaint');
    if(opts.length===0){lpMenuActive=false;}
    else{
      // Dim background slightly
      cx.fillStyle='rgba(8,12,30,0.35)';cx.fillRect(0,0,W,H);
      const optR=cSz*0.7,optDist=cSz*1.6;
      for(let i=0;i<opts.length;i++){
        const angle=opts.length===1?-Math.PI/2:(i===0?-Math.PI*0.7:-Math.PI*0.3);
        const ox=lpX+Math.cos(angle)*optDist,oy=lpY+Math.sin(angle)*optDist;
        // Circle background
        cx.save();
        cx.shadowColor=opts[i]==='shatter'?'rgba(255,170,40,0.7)':'rgba(100,200,255,0.7)';
        cx.shadowBlur=12;
        const g=cx.createRadialGradient(ox,oy,0,ox,oy,optR);
        if(opts[i]==='shatter'){
          g.addColorStop(0,'rgba(255,200,80,0.9)');g.addColorStop(1,'rgba(200,120,20,0.8)');
        }else{
          g.addColorStop(0,'rgba(100,200,255,0.9)');g.addColorStop(1,'rgba(40,120,200,0.8)');
        }
        cx.fillStyle=g;cx.beginPath();cx.arc(ox,oy,optR,0,Math.PI*2);cx.fill();
        cx.shadowBlur=0;
        cx.strokeStyle='rgba(255,255,255,0.4)';cx.lineWidth=1.5;
        cx.beginPath();cx.arc(ox,oy,optR,0,Math.PI*2);cx.stroke();
        cx.restore();
        // Icon
        cx.fillStyle='rgba(255,255,255,0.95)';
        if(opts[i]==='shatter'){
          // Lightning bolt
          const s=optR*0.55;
          cx.beginPath();cx.moveTo(ox+s*0.1,oy-s*0.8);cx.lineTo(ox+s*0.4,oy-s*0.8);
          cx.lineTo(ox+s*0.05,oy-s*0.05);cx.lineTo(ox+s*0.35,oy-s*0.05);
          cx.lineTo(ox-s*0.2,oy+s*0.8);cx.lineTo(ox+s*0.05,oy+s*0.05);
          cx.lineTo(ox-s*0.25,oy+s*0.05);cx.closePath();cx.fill();
        }else{
          // Paintbrush
          const s=optR*0.45;
          cx.save();cx.translate(ox,oy);cx.rotate(-0.4);
          cx.fillStyle='rgba(255,255,255,0.7)';
          cx.beginPath();cx.roundRect(-s*0.1,-s*0.75,s*0.2,s*0.55,s*0.04);cx.fill();
          cx.fillStyle='rgba(255,255,255,0.95)';
          cx.beginPath();cx.moveTo(-s*0.3,s*0.0);cx.lineTo(s*0.3,s*0.0);
          cx.lineTo(s*0.24,s*0.7);cx.lineTo(-s*0.24,s*0.7);cx.closePath();cx.fill();
          cx.restore();
        }
        // Label
        cx.font=`bold ${Math.round(optR*0.4)}px ${f2}`;cx.textAlign='center';
        cx.fillStyle='rgba(255,255,255,0.9)';
        cx.fillText(opts[i]==='shatter'?'Shatter':'Repaint',ox,oy+optR+Math.round(optR*0.55));
      }
      // Highlight source gem
      cx.strokeStyle='rgba(255,255,255,0.6)';cx.lineWidth=2;
      cx.beginPath();cx.arc(lpX,lpY,cSz*0.5,0,Math.PI*2);cx.stroke();
    }
  }
}

function drawGlassPanel(x,y,w,h,rad){
  const f='"SF Pro Display","Segoe UI",system-ui,sans-serif';
  cx.save();
  // Frosted glass fill — semi-transparent gradient
  const gf=cx.createLinearGradient(x,y,x,y+h);
  gf.addColorStop(0,'rgba(30,35,70,0.82)');
  gf.addColorStop(0.15,'rgba(20,24,55,0.88)');
  gf.addColorStop(0.85,'rgba(14,18,42,0.9)');
  gf.addColorStop(1,'rgba(18,22,52,0.85)');
  cx.fillStyle=gf;cx.beginPath();cx.roundRect(x,y,w,h,rad);cx.fill();
  // Inner highlight at top — light catching the glass edge
  const hi=cx.createLinearGradient(x,y,x,y+8);
  hi.addColorStop(0,'rgba(140,160,220,0.25)');
  hi.addColorStop(1,'rgba(140,160,220,0)');
  cx.fillStyle=hi;cx.beginPath();cx.roundRect(x+1,y+1,w-2,h-2,rad-1);cx.fill();
  // Subtle colored border with glow
  cx.shadowColor='rgba(80,100,180,0.3)';cx.shadowBlur=8;
  cx.strokeStyle='rgba(100,120,180,0.35)';cx.lineWidth=1;
  cx.beginPath();cx.roundRect(x,y,w,h,rad);cx.stroke();
  cx.shadowBlur=0;
  cx.restore();
}
function drawGlassBtn(x,y,sz,rad,active){
  cx.save();
  const gf=cx.createLinearGradient(x,y,x,y+sz);
  gf.addColorStop(0,active?'rgba(40,50,90,0.85)':'rgba(25,30,60,0.8)');
  gf.addColorStop(1,active?'rgba(25,35,70,0.88)':'rgba(16,20,45,0.85)');
  cx.fillStyle=gf;cx.beginPath();cx.roundRect(x,y,sz,sz,rad);cx.fill();
  // Top edge highlight
  const hi=cx.createLinearGradient(x,y,x,y+5);
  hi.addColorStop(0,'rgba(130,150,210,0.2)');
  hi.addColorStop(1,'rgba(130,150,210,0)');
  cx.fillStyle=hi;cx.beginPath();cx.roundRect(x+1,y+1,sz-2,sz-2,rad-1);cx.fill();
  cx.strokeStyle=active?'rgba(120,150,220,0.45)':'rgba(90,110,160,0.3)';

  cx.restore();
}

function drawTopBar(){
  const f='"SF Pro Display","Segoe UI",system-ui,sans-serif';
  const s=uiS,R=n=>Math.round(n*s);
  const panelW=Math.min(R(420),W-R(24)),panelH=R(52),rad=R(14);
  const mx=Math.floor((W-panelW)/2),panelY=R(6);
  // Frosted strip
  cx.save();
  const gf=cx.createLinearGradient(mx,panelY,mx,panelY+panelH);
  gf.addColorStop(0,'rgba(20,25,55,0.72)');gf.addColorStop(0.5,'rgba(16,20,48,0.78)');gf.addColorStop(1,'rgba(14,18,42,0.68)');
  cx.fillStyle=gf;cx.beginPath();cx.roundRect(mx,panelY,panelW,panelH,rad);cx.fill();
  const hi=cx.createLinearGradient(mx,panelY,mx,panelY+4);
  hi.addColorStop(0,'rgba(120,140,200,0.15)');hi.addColorStop(1,'rgba(120,140,200,0)');
  cx.fillStyle=hi;cx.beginPath();cx.roundRect(mx+2,panelY,panelW-4,panelH,rad);cx.fill();
  cx.strokeStyle='rgba(80,100,160,0.12)';cx.lineWidth=0.5;cx.beginPath();cx.roundRect(mx,panelY,panelW,panelH,rad);cx.stroke();
  cx.restore();

  const left=mx+R(12),right=mx+panelW-R(12);
  // Score
  cx.textAlign='left';cx.font=`bold ${R(20)}px ${f}`;cx.fillStyle='#e8ecff';
  cx.fillText(score.toLocaleString(),left,panelY+R(30));
  cx.font=`${R(8)}px ${f}`;cx.fillStyle='rgba(160,175,210,0.55)';cx.fillText('SCORE',left,panelY+R(13));

  // Timer — thin bar + text
  const barW=Math.min(R(70),panelW*.18),barX=W/2-barW/2,tBarY=panelY+R(10),tBarH=R(3);
  if(MODES[gameMode].timed){
    cx.fillStyle='rgba(255,255,255,.08)';cx.beginPath();cx.roundRect(barX,tBarY,barW,tBarH,1.5);cx.fill();
    const frac=timerSec/CFG.TIMER_CAP,urgent=timerSec<=CFG.LOW_TIME;
    let barCol;if(urgent){const fl=.6+.4*Math.sin(time*.1);barCol=`rgba(255,${Math.floor(60*fl)},${Math.floor(40*fl)},.9)`;}
    else if(hourglassFreeze>0)barCol='rgba(80,200,255,.85)';
    else if(timerFrozen)barCol='rgba(110,190,255,.85)';else barCol='rgba(90,210,160,.85)';
    cx.fillStyle=barCol;cx.beginPath();cx.roundRect(barX,tBarY,barW*Math.max(0,frac),tBarH,1.5);cx.fill();
    cx.font=`bold ${R(15)}px ${f}`;cx.textAlign='center';cx.fillStyle=urgent?'#ff6644':'#d0d8f0';
    const timerPrefix=hourglassFreeze>0?'⏳'+hourglassFreeze+' ':timerFrozen?'❄ ':'';
    cx.fillText(timerPrefix+timerSec+'s',W/2,tBarY+tBarH+R(16));
  }else{
    const mins=Math.floor(elapsedPlaySec/60),secs=elapsedPlaySec%60;
    cx.font=`bold ${R(15)}px ${f}`;cx.textAlign='center';cx.fillStyle='#88eebb';
    cx.fillText('🧘 '+mins+':'+(secs<10?'0':'')+secs,W/2,tBarY+R(16));
  }

  // Heat pips
  if(MODES[gameMode].timed&&hasHeatMech()){
    cx.textAlign='right';cx.font=`${R(8)}px ${f}`;cx.fillStyle='rgba(160,175,210,0.5)';cx.fillText('HEAT',right,panelY+R(13));
    const pipW=R(7),pipH=R(13),pipGap=R(3),totalPipW=CFG.HEAT_MAX*(pipW+pipGap)-pipGap;
    const heatStartX=right-totalPipW,pipY=panelY+R(17);
    for(let i=0;i<CFG.HEAT_MAX;i++){const px=heatStartX+i*(pipW+pipGap),active=i<heat;
      if(active){const int=(i+1)/CFG.HEAT_MAX,fl=.85+.15*Math.sin(time*.08+i*1.3);cx.save();
        cx.shadowColor=int>.6?'#ff5500':'#ffaa00';cx.shadowBlur=5*fl;
        cx.fillStyle=`rgb(${Math.min(255,235+int*20)},${Math.max(50,Math.floor(220-int*160))},${Math.max(20,Math.floor(55-int*45))})`;
        cx.beginPath();cx.roundRect(px,pipY,pipW,pipH*fl,2);cx.fill();cx.restore();
      }else{cx.fillStyle='rgba(255,255,255,.07)';cx.beginPath();cx.roundRect(px,pipY,pipW,pipH*.6,2);cx.fill();}}
    if(heat>0){cx.font=`bold ${R(10)}px ${f}`;cx.textAlign='right';cx.fillStyle=heat>=4?'#ff8855':heat>=2?'#ffcc66':'#eebb77';cx.fillText('×'+heat,right,pipY+pipH+R(10));}
    if(heat>=CFG.HEAT_MAX&&heatStreakMs>0&&shatterCharges<getShatterMax()){
      const sustained=(realElapsedMs()-heatStreakMs)/1000;
      const nextThresh=heatStreakAwards<2?CFG.SHATTER_SUSTAIN_2:CFG.SHATTER_SUSTAIN_3;
      const prog=Math.min(1,sustained/nextThresh);
      cx.fillStyle=`rgba(255,200,50,${0.3+0.4*prog})`;cx.font=`bold ${R(11)}px ${f}`;
      cx.fillText(Math.floor(sustained)+'s → ⚡',right,pipY+pipH+R(19));
    }
  }

  // High score + elapsed time
  if(highScores[gameMode]>0){
    cx.font=`${R(11)}px ${f}`;cx.textAlign='center';cx.fillStyle='rgba(180,195,225,0.75)';
    cx.fillText('HI '+highScores[gameMode].toLocaleString(),W/2,panelY+panelH-R(3));
  }
  // Elapsed real time — runs during gameplay, pauses only for pause/rules/tutorials
  if(gameStarted&&MODES[gameMode].timed){
    const rSec=Math.floor(realElapsedMs()/1000);
    const em=Math.floor(rSec/60),es=rSec%60;
    cx.font=`${R(11)}px ${f}`;cx.textAlign='left';cx.fillStyle='rgba(180,195,225,0.75)';
    cx.fillText(em+':'+(es<10?'0':'')+es,left,panelY+panelH-R(3));
  }

  // --- Uniform button row below panel ---
  btnTutToggle=null;
  const btnSz=R(26),btnGap=R(8);
  const totalBtnW=btnSz*4+btnGap*3;
  const btnStartX=Math.floor((W-totalBtnW)/2);
  const btnY=panelY+panelH+R(4);
  topButtonsBottomY=btnY+btnSz;

  const btns=[
    {ref:'rules',dim:false},
    {ref:'pause',dim:false},
    {ref:'mute',dim:sfxMuted},
    {ref:'music',dim:musicMood==='off'}
  ];
  for(let i=0;i<btns.length;i++){
    const bx=btnStartX+i*(btnSz+btnGap),b=btns[i];
    const bcx=bx+btnSz/2,bcy=btnY+btnSz/2;
    // Identical background for all buttons
    cx.save();
    const bg=cx.createLinearGradient(bx,btnY,bx,btnY+btnSz);
    bg.addColorStop(0,'rgba(28,34,65,0.72)');bg.addColorStop(1,'rgba(18,22,50,0.75)');
    cx.fillStyle=bg;cx.beginPath();cx.roundRect(bx,btnY,btnSz,btnSz,8);cx.fill();
    const th=cx.createLinearGradient(bx,btnY,bx,btnY+3);
    th.addColorStop(0,'rgba(120,140,200,0.12)');th.addColorStop(1,'rgba(120,140,200,0)');
    cx.fillStyle=th;cx.beginPath();cx.roundRect(bx+1,btnY+1,btnSz-2,btnSz-2,7);cx.fill();
    cx.strokeStyle='rgba(90,110,170,0.2)';cx.lineWidth=0.7;
    cx.beginPath();cx.roundRect(bx,btnY,btnSz,btnSz,8);cx.stroke();
    cx.restore();
    // Canvas-drawn icons — no emoji
    const ic=b.dim?'rgba(90,100,130,0.4)':'rgba(180,195,225,0.85)';
    cx.fillStyle=ic;cx.strokeStyle=ic;
    if(b.ref==='rules'){
      cx.font=`bold ${R(16)}px ${f}`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText('?',bcx,bcy);cx.textBaseline='alphabetic';
    }else if(b.ref==='pause'){
      if(paused){
        // Play triangle
        cx.beginPath();cx.moveTo(bcx-R(3),bcy-R(5));cx.lineTo(bcx-R(3),bcy+R(5));cx.lineTo(bcx+R(5),bcy);cx.closePath();cx.fill();
      }else{
        // Pause bars
        cx.fillRect(bcx-R(4),bcy-R(5),R(3),R(10));cx.fillRect(bcx+R(1),bcy-R(5),R(3),R(10));
      }
    }else if(b.ref==='mute'){
      // Speaker body — compact
      cx.beginPath();cx.moveTo(bcx-R(4),bcy-R(2));cx.lineTo(bcx-R(2),bcy-R(2));cx.lineTo(bcx+R(1),bcy-R(4.5));
      cx.lineTo(bcx+R(1),bcy+R(4.5));cx.lineTo(bcx-R(2),bcy+R(2));cx.lineTo(bcx-R(4),bcy+R(2));cx.closePath();cx.fill();
      if(!sfxMuted){
        // Sound waves — smaller
        cx.lineWidth=1;cx.lineCap='round';
        cx.beginPath();cx.arc(bcx+R(2),bcy,R(3.5),-.55,.55);cx.stroke();
        cx.beginPath();cx.arc(bcx+R(2),bcy,R(6),-.45,.45);cx.stroke();
      }else{
        // X mark — compact
        cx.lineWidth=1.3;cx.lineCap='round';
        cx.beginPath();cx.moveTo(bcx+R(3),bcy-R(3));cx.lineTo(bcx+R(7),bcy+R(3));cx.stroke();
        cx.beginPath();cx.moveTo(bcx+R(7),bcy-R(3));cx.lineTo(bcx+R(3),bcy+R(3));cx.stroke();
      }
    }else if(b.ref==='music'){
      // Music note
      cx.font=`bold ${R(18)}px ${f}`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText('♫',bcx,bcy+R(1));cx.textBaseline='alphabetic';
    }
    // Hit areas
    if(b.ref==='rules')btnRules={x:bx,y:btnY,w:btnSz,h:btnSz};
    if(b.ref==='pause')btnPause={x:bx,y:btnY,w:btnSz,h:btnSz};
    if(b.ref==='mute')btnMute={x:bx,y:btnY,w:btnSz,h:btnSz};
    if(b.ref==='music')btnMusic={x:bx,y:btnY,w:btnSz,h:btnSz};
  }

  // Music menu popup
  musicMenuBtns=[];
  if(musicMenuOpen){
    const moods=[{key:'off',label:'Silent'},{key:'cathedral',label:'Cathedral'},{key:'rain',label:'Rain Garden'},{key:'twilight',label:'Twilight'},{key:'aurora',label:'Aurora'}];
    const mw=120,mh=moods.length*28+8,mmx=Math.min(Math.max(4,btnStartX+3*(btnSz+btnGap)-mw/2+btnSz/2),W-mw-4);
    const mmy=btnY+btnSz+6;

      cx.font=`${sel?'bold ':''}12px ${f}`;cx.textAlign='center';
      cx.fillStyle=sel?'#b0c8f0':'rgba(170,185,215,0.7)';
      cx.fillText(moods[i].label,mmx+mw/2,my+17);
      musicMenuBtns.push({x:mmx+3,y:my,w:mw-6,h:26,key:moods[i].key});
    }
  }
}

function drawMessageTicker(){
  // Slim 2-line ticker between the top bar and the board, fade-in/fade-out in place.
  // Always shows up to 2 most recent messages; nothing rendered if no messages.
  if(panelMsgs.length===0)return;
  const f='"SF Pro Display","Segoe UI",system-ui,sans-serif';
  const s=uiS,R=n=>Math.round(n*s);
  const tW=Math.min(R(380),W-R(40)),tH=R(40),rad=R(10);
  const tx=Math.floor((W-tW)/2),ty=topButtonsBottomY+R(8); // sits cleanly below the top button row
  const now=performance.now();
  // Determine which messages to show — last 2 that are still alive
  const live=[];
  for(let i=panelMsgs.length-1;i>=0&&live.length<2;i--){
    const m=panelMsgs[i];
    const age=(now-m.addedAt)/m.duration;
    if(age<=1)live.unshift({m,age});
  }
  if(live.length===0)return;
  // Compute fade alpha for the panel itself based on the freshest message
  const newest=live[live.length-1];
  const panelAlpha=newest.age<.7?1:Math.max(0,(1-newest.age)/.3);
  cx.save();
  cx.globalAlpha=panelAlpha*0.92;
  // Frosted glass background
  const gf=cx.createLinearGradient(tx,ty,tx,ty+tH);
  gf.addColorStop(0,'rgba(16,20,48,0.7)');gf.addColorStop(1,'rgba(18,22,52,0.75)');
  cx.fillStyle=gf;cx.beginPath();cx.roundRect(tx,ty,tW,tH,rad);cx.fill();
  cx.strokeStyle='rgba(120,140,200,0.25)';cx.lineWidth=0.7;
  cx.beginPath();cx.roundRect(tx,ty,tW,tH,rad);cx.stroke();
  cx.restore();
  // Draw up to 2 lines, top = older, bottom = newer
  cx.textAlign='center';
  for(let i=0;i<live.length;i++){
    const{m,age}=live[i];
    const lineAlpha=age<.7?1:Math.max(0,(1-age)/.3);
    const lineY=live.length===1?ty+tH/2+R(4):(i===0?ty+R(15):ty+R(30));
    const fontSize=live.length===1?R(14):R(12);
    cx.globalAlpha=lineAlpha;
    cx.font=`bold ${fontSize}px ${f}`;cx.fillStyle=m.color;
    cx.fillText(m.text,W/2,lineY);
  }
  cx.globalAlpha=1;
}

function drawBottomPanel(){
  const f='"SF Pro Display","Segoe UI",system-ui,sans-serif';
  const s=uiS,R=n=>Math.round(n*s);
  const panelW=Math.min(R(440),W-R(20)),panelH=R(108),rad=R(16);
  const mx=Math.floor((W-panelW)/2),panelY=H-panelH-R(8);
  const now=performance.now();

  // Frosted panel
  cx.save();
  const gf=cx.createLinearGradient(mx,panelY,mx,panelY+panelH);
  gf.addColorStop(0,'rgba(16,20,48,0.65)');gf.addColorStop(0.5,'rgba(14,18,44,0.72)');gf.addColorStop(1,'rgba(18,22,52,0.68)');
  cx.fillStyle=gf;cx.beginPath();cx.roundRect(mx,panelY,panelW,panelH,rad);cx.fill();
  const hi=cx.createLinearGradient(mx,panelY,mx,panelY+4);
  hi.addColorStop(0,'rgba(120,140,200,0.15)');hi.addColorStop(1,'rgba(120,140,200,0)');
  cx.fillStyle=hi;cx.beginPath();cx.roundRect(mx+2,panelY,panelW-4,panelH,rad);cx.fill();
  cx.strokeStyle='rgba(80,100,160,0.12)';cx.lineWidth=0.5;cx.beginPath();cx.roundRect(mx,panelY,panelW,panelH,rad);cx.stroke();
  cx.restore();

  // (Messages now render in drawMessageTicker above the board, leaving the bottom panel symmetric.)

  // --- LEFT ZONE: CHAIN CLEAR @ N (always visible, matched to right-side fragment badges) ---
  const cct=colorClearThreshold();
  const leftZoneX=mx+R(12),leftZoneCY=panelY+R(20);
  cx.textAlign='left';
  cx.font=`bold ${R(12)}px ${f}`;cx.fillStyle='rgba(180,200,235,0.85)';
  cx.fillText('CHAIN CLEAR @ '+cct,leftZoneX,leftZoneCY+R(4));

  // --- RIGHT ZONE: focused fragment indicators (max 3) ---
  // Only show after oculus has been visited at least once and player has focused windows
  const focused=[];
  for(let i=0;i<9;i++)if(catProg[i]&&catProg[i].foc)focused.push(i);
  if(tutSeen['oculus_visited']&&focused.length>0){
    const badgeR=R(11),badgeGap=R(20);
    const badgeCount=Math.min(3,focused.length);
    const totalBadgeW=badgeCount*(badgeR*2)+(badgeCount-1)*badgeGap;
    const rightZoneRight=mx+panelW-R(10);
    const startBX=rightZoneRight-totalBadgeW+badgeR;
    const badgeCY=panelY+R(18);
    for(let i=0;i<badgeCount;i++){
      const wIdx=focused[i],w=CAT_W[wIdx],p=catProg[wIdx];
      const [r,g,b]=w.color;
      const bx=startBX+i*(badgeR*2+badgeGap);
      const key=CAT_FRAG_KEYS[wIdx];
      const liveFrags=p.frags+(gs&&gs.frag?(gs.frag[key]||0):0);
      // Detect increment → trigger flash
      const prev=fragPrevCount[key];
      if(prev!==undefined&&liveFrags>prev){
        fragFlashAt[key]=now;
        fragFlashAmount[key]=liveFrags-prev;
      }
      fragPrevCount[key]=liveFrags;
      // Flash progress: 0→1 over 700ms
      const flashAge=(now-(fragFlashAt[key]||-99999))/700;
      const flashActive=flashAge>=0&&flashAge<=1;
      const scale=flashActive?1+0.35*Math.sin(flashAge*Math.PI):1;
      const ringAlpha=flashActive?(1-flashAge)*0.9:0;
      cx.save();
      cx.translate(bx,badgeCY);cx.scale(scale,scale);cx.translate(-bx,-badgeCY);
      cx.shadowColor=`rgba(${r},${g},${b},${0.6+ringAlpha*0.4})`;cx.shadowBlur=6+ringAlpha*10;
      const grd=cx.createRadialGradient(bx,badgeCY,0,bx,badgeCY,badgeR);
      grd.addColorStop(0,`rgba(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)},${0.7+ringAlpha*0.3})`);
      grd.addColorStop(1,`rgba(${r},${g},${b},${0.55+ringAlpha*0.3})`);
      cx.fillStyle=grd;cx.beginPath();cx.arc(bx,badgeCY,badgeR,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;
      cx.strokeStyle=`rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},${0.85+ringAlpha*0.15})`;cx.lineWidth=1.2;
      cx.beginPath();cx.arc(bx,badgeCY,badgeR,0,Math.PI*2);cx.stroke();
      // Expanding outer ring
      if(flashActive){
        cx.strokeStyle=`rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)},${ringAlpha})`;
        cx.lineWidth=2;
        cx.beginPath();cx.arc(bx,badgeCY,badgeR+flashAge*R(8),0,Math.PI*2);cx.stroke();
      }
      cx.restore();
      // Glyph
      cx.save();
      cx.translate(bx,badgeCY);cx.scale(scale,scale);cx.translate(-bx,-badgeCY);
      catDrawIcon(bx,badgeCY,badgeR*0.85,wIdx,true);
      cx.restore();
      // "+N" floater
      if(flashActive&&fragFlashAmount[key]){
        const floatY=badgeCY-badgeR-R(6)-flashAge*R(12);
        cx.font=`bold ${R(10)}px ${f}`;cx.textAlign='center';
        cx.fillStyle=`rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)},${1-flashAge})`;
        cx.fillText('+'+fragFlashAmount[key],bx,floatY);
      }
      cx.textAlign='center';
      if(p.tier>=3){
        cx.font=`bold ${R(8)}px ${f}`;cx.fillStyle='rgba(255,220,120,0.85)';
        cx.fillText('MAX',bx,badgeCY+badgeR+R(10));
      }else{
        const cost=CAT_TIERS[p.tier].c;
        cx.font=`${R(8)}px ${f}`;cx.fillStyle=liveFrags>=cost?'#ffdd66':'rgba(180,195,225,0.85)';
        cx.fillText(liveFrags+'/'+cost,bx,badgeCY+badgeR+R(10));
      }
    }
  }

  // --- CENTERED POWER ORBs ---
  btnRepaintHUD=null;
  btnShatterHUD=null;
  if(hasShatterMech()||hasRepaintMech()){
  const orbR=R(14),orbGap=R(9);
  const rpW=hasRepaintMech()?CFG.REPAINT_MAX*(orbR*2+orbGap)-orbGap:0;
  const shW=hasShatterMech()?getShatterMax()*(orbR*2+orbGap)-orbGap:0;
  const sepGap=hasRepaintMech()&&hasShatterMech()?R(20):0;
  const totalOrbW=rpW+sepGap+shW;
  const orbStartX=Math.floor((W-totalOrbW)/2);
  const orbCY=panelY+panelH-R(22);

  // Icon functions
  function drawBrush(cx2,px,py,s){
    cx2.save();cx2.translate(px,py);cx2.rotate(-0.4);
    cx2.fillStyle='rgba(255,255,255,0.6)';
    cx2.beginPath();cx2.roundRect(-s*0.1,-s*0.72,s*0.2,s*0.65,s*0.04);cx2.fill();
    cx2.fillStyle='rgba(255,255,255,0.45)';
    cx2.fillRect(-s*0.22,-s*0.1,s*0.44,s*0.12);
    cx2.fillStyle='rgba(255,255,255,0.9)';
    cx2.beginPath();
    cx2.moveTo(-s*0.32,s*0.02);cx2.lineTo(s*0.32,s*0.02);
    cx2.lineTo(s*0.26,s*0.7);cx2.lineTo(-s*0.26,s*0.7);

    cx2.strokeStyle='rgba(255,255,255,0.3)';cx2.lineWidth=0.6;
    for(let i=-1;i<=1;i++){
      cx2.beginPath();cx2.moveTo(s*0.12*i,s*0.08);cx2.lineTo(s*0.1*i,s*0.65);cx2.stroke();
    }
    cx2.restore();
  }
  function drawLightning(cx2,px,py,s){
    cx2.beginPath();cx2.moveTo(px+s*0.1,py-s*0.7);cx2.lineTo(px+s*0.35,py-s*0.7);
    cx2.lineTo(px+s*0.05,py-s*0.05);cx2.lineTo(px+s*0.3,py-s*0.05);
    cx2.lineTo(px-s*0.15,py+s*0.7);cx2.lineTo(px+s*0.05,py+s*0.05);
    cx2.lineTo(px-s*0.2,py+s*0.05);cx2.closePath();cx2.fill();
  }

  // Repaint orbs (left group)
  if(hasRepaintMech()){
  const rpOrbX=orbStartX;
  // Earn flash: pulsing glow ring on the latest filled orb for 3s after earning
  const rpFlashAge=(performance.now()-repaintEarnedFlashAt)/1000;
  const rpFlashing=repaintCharges>0&&repaintEarnedFlashAt>0&&rpFlashAge<3;
  for(let i=0;i<CFG.REPAINT_MAX;i++){
    const ox=rpOrbX+i*(orbR*2+orbGap)+orbR,filled=i<repaintCharges;
    cx.save();
    // Earn flash on the most recently filled orb — pulses both the orb body and an outer glow ring
    const isFlash=filled&&rpFlashing&&i===repaintCharges-1;
    let flashPulse=0,flashIntensity=0;
    if(isFlash){
      flashIntensity=(1-rpFlashAge/3);
      flashPulse=0.5+0.5*Math.sin(performance.now()*0.012);
      // Outer pulsing ring
      cx.shadowColor='#66ddff';cx.shadowBlur=24*flashIntensity*flashPulse+12;
      cx.strokeStyle=`rgba(150,240,255,${flashIntensity*0.95})`;
      cx.lineWidth=3;
      cx.beginPath();cx.arc(ox,orbCY,orbR+5+flashPulse*4,0,Math.PI*2);cx.stroke();
      cx.shadowBlur=0;
    }
    if(filled){
      // Scale up the orb itself during flash
      const scale=isFlash?(1+0.15*flashIntensity*flashPulse):1;
      const r2=orbR*scale;
      cx.shadowColor='#44ccee';cx.shadowBlur=repaintMode?14:(isFlash?16+8*flashPulse:8);
      const og=cx.createRadialGradient(ox,orbCY,0,ox,orbCY,r2);
      og.addColorStop(0,repaintMode?'#55eeff':(isFlash?'#88eeff':'#2299bb'));
      og.addColorStop(0.7,repaintMode?'#2288aa':(isFlash?'#3399cc':'#186688'));
      og.addColorStop(1,'rgba(20,80,100,0.6)');
      cx.fillStyle=og;cx.beginPath();cx.arc(ox,orbCY,r2,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='rgba(255,255,255,0.95)';drawBrush(cx,ox,orbCY,r2*0.6);
    }else{
      cx.strokeStyle='rgba(70,200,230,0.2)';cx.lineWidth=1.5;

  }
  if(repaintCharges>0)btnRepaintHUD={x:rpOrbX,y:orbCY-orbR,w:rpW,h:orbR*2};

  // Combo meter below repaint orbs

    const arcCX=rpOrbX+rpW/2,arcY=orbCY+orbR+R(5);

  // Shatter orbs (right group)
  if(hasShatterMech()){
  const shOrbX=orbStartX+(hasRepaintMech()?rpW+sepGap:0);
  // Earn flash: pulsing glow ring on the latest filled orb for 3s after earning
  const shFlashAge=(performance.now()-shatterEarnedFlashAt)/1000;
  const shFlashing=shatterCharges>0&&shatterEarnedFlashAt>0&&shFlashAge<3;

      cx.beginPath();cx.arc(ox,orbCY,orbR+5+flashPulse*4,0,Math.PI*2);cx.stroke();

      const scale=isFlash?(1+0.15*flashIntensity*flashPulse):1;

      const og=cx.createRadialGradient(ox,orbCY,0,ox,orbCY,r2);
      og.addColorStop(0,shatterMode?'#ffee55':(isFlash?'#ffee66':'#ddaa22'));
      og.addColorStop(0.7,shatterMode?'#cc8811':(isFlash?'#dd9911':'#996611'));
      og.addColorStop(1,'rgba(100,70,10,0.6)');
      cx.fillStyle=og;cx.beginPath();cx.arc(ox,orbCY,r2,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='rgba(255,255,255,0.95)';drawLightning(cx,ox,orbCY,r2*0.6);
    }else{
      cx.strokeStyle='rgba(255,210,70,0.2)';cx.lineWidth=1.5;
      cx.beginPath();cx.arc(ox,orbCY,orbR-1,0,Math.PI*2);cx.stroke();
      cx.fillStyle='rgba(255,210,70,0.06)';cx.beginPath();cx.arc(ox,orbCY,orbR-1,0,Math.PI*2);cx.fill();
    }
    cx.restore();
  }
  if(shatterCharges>0)btnShatterHUD={x:shOrbX,y:orbCY-orbR,w:shW,h:orbR*2};

  // Sustained heat progress / cooldown indicator below shatter orbs
  if(MODES[gameMode].timed&&shatterCharges<getShatterMax()){
    const arcCX2=shOrbX+shW/2,arcY2=orbCY+orbR+R(5);
    const cdRemaining=10-(realElapsedMs()-lastShatterEarnedMs)/1000;
    // Cooldown takes priority if active and we have 0 charges
    if(shatterCharges===0&&cdRemaining>0&&cdRemaining<=10){
      const cdProg=1-(cdRemaining/10);
      cx.fillStyle='rgba(255,255,255,0.08)';cx.beginPath();cx.roundRect(arcCX2-shW/2,arcY2,shW,2.5,1);cx.fill();
      cx.fillStyle='rgba(150,170,200,0.5)';cx.beginPath();cx.roundRect(arcCX2-shW/2,arcY2,shW*cdProg,2.5,1);cx.fill();
      // Tiny "CD" text
      cx.font=`${R(8)}px ${f}`;cx.textAlign='center';cx.fillStyle='rgba(150,170,200,0.55)';
      cx.fillText(Math.ceil(cdRemaining)+'s',arcCX2,arcY2+R(11));
    }else if(heat>=CFG.HEAT_MAX&&heatStreakMs>0){
      const sustained=(realElapsedMs()-heatStreakMs)/1000;
      const nextThresh=heatStreakAwards<2?CFG.SHATTER_SUSTAIN_2:CFG.SHATTER_SUSTAIN_3;
      const prog=Math.min(1,sustained/nextThresh);
      cx.fillStyle='rgba(255,255,255,0.08)';cx.beginPath();cx.roundRect(arcCX2-shW/2,arcY2,shW,2.5,1);cx.fill();
      cx.fillStyle='rgba(255,200,50,0.7)';cx.beginPath();cx.roundRect(arcCX2-shW/2,arcY2,shW*prog,2.5,1);cx.fill();
    }else{
      cx.fillStyle='rgba(255,255,255,0.08)';cx.beginPath();cx.roundRect(arcCX2-shW/2,arcY2,shW,2.5,1);cx.fill();
    }
  }
  }
  } // end orbs gate

  // Mode prompts
  if(shatterMode){cx.font=`bold ${R(12)}px ${f}`;cx.textAlign='center';cx.fillStyle='#ffee55';cx.fillText('TAP A COLOR TO SHATTER',W/2,panelY+panelH-R(4));}
  if(repaintMode&&repaintSelected.length===0&&!repaintDragging){const rg=getRepaintGems();cx.font=`bold ${R(12)}px ${f}`;cx.textAlign='center';cx.fillStyle='#66ccff';cx.fillText(rg>1?'DRAG '+rg+' GEMS TO REPAINT':'TAP A GEM TO REPAINT',W/2,panelY+panelH-R(4));}
}

function drawGameOverDetails(){

  // === STATS GRID (trimmed to 9 entries) ===
  let y=84;
  cx.font=`bold 12px ${f}`;cx.textAlign='center';cx.fillStyle='rgba(180,195,230,0.6)';
  cx.fillText('— GAME STATS —',W/2,y);y+=22;
  const durMin=Math.floor(finalRealDur/60),durSec=finalRealDur%60;
  const statsL=[
    ['Duration',durMin+':'+(durSec<10?'0':'')+durSec],
    ['Best chain',gs.bestChain],
    ['Max chain pts',gs.maxChainScore.toLocaleString()],
    ['Color clears',gs.colorClears],
    ['Shatters used',gs.shattersUsed],
    ['Repaints used',gs.repaintsUsed],
    ['Power gems',gs.powerGems],
    ['Curses defused',gs.cursesDefused+'/'+(gs.cursesDefused+gs.cursesExpired)],
    ['Blazes',gs.blazesUsed],
    ['Hourglasses',gs.hourglasses],
  ];
  const cols=2,cw=170,lh=22;
  cx.font=`12px ${f}`;
  for(let i=0;i<statsL.length;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const x=W/2+(col-cols/2)*cw+cw/2,ly=y+row*lh;
    cx.textAlign='left';cx.fillStyle='#667';cx.fillText(statsL[i][0],x-cw/2+8,ly);
    cx.textAlign='right';cx.fillStyle='#aabbcc';cx.fillText(''+statsL[i][1],x+cw/2-8,ly);
  }
  y+=Math.ceil(statsL.length/cols)*lh+18;

  // === SCORE BREAKDOWN ===
  const breakdown=[
    ['Base chains',gs.scoreFromChains,'#88aacc'],
    ['Color clears',gs.scoreFromColorClear,'#aaccee'],
    ['Power gems',gs.scoreFromPowerGems,'#ffdd66'],
    ['Blaze multipliers',gs.scoreFromBlazeBonus,'#ff9955'],
    ['Shatter destruction',gs.scoreFromShatter,'#ffaa44'],
  ];
  const totalBreakdown=breakdown.reduce((s,b)=>s+b[1],0);
  if(totalBreakdown>0){
    cx.font=`bold 12px ${f}`;cx.textAlign='center';cx.fillStyle='rgba(180,195,230,0.6)';
    cx.fillText('— SCORE BREAKDOWN —',W/2,y);y+=22;
    const bw=Math.min(W*0.85,360),bx=W/2-bw/2;
    cx.font=`12px ${f}`;
    for(const[label,val,col] of breakdown){
      if(val<=0)continue;
      const pct=val/totalBreakdown;
      // Bar background
      cx.fillStyle='rgba(255,255,255,0.04)';cx.beginPath();cx.roundRect(bx,y+4,bw,16,3);cx.fill();
      // Bar fill
      cx.fillStyle=col+'55';cx.beginPath();cx.roundRect(bx,y+4,bw*pct,16,3);cx.fill();

      cx.textAlign='left';cx.fillStyle='#aabbcc';cx.fillText(label,bx+8,y+16);
      cx.textAlign='right';cx.fillStyle='#ccd';cx.fillText(val.toLocaleString()+'  ('+Math.round(pct*100)+'%)',bx+bw-8,y+16);
      y+=24;
    }
    y+=12;
  }

  // === FRAGMENT PROGRESS (focused windows only) ===
  if(gameMode!=='zen'&&hasAllModes()){
    const focused=catProg.map((p,i)=>({p,i})).filter(x=>x.p.foc&&x.p.tier<3);
    if(focused.length>0){
      cx.font=`bold 12px ${f}`;cx.textAlign='center';cx.fillStyle='rgba(180,195,230,0.6)';
      cx.fillText('— OCULUS PROGRESS —',W/2,y);y+=22;
      const bw=Math.min(W*0.85,380),bx=W/2-bw/2;
      for(const{p,i} of focused){
        const w=CAT_W[i],[r,g,b]=w.color;
        const earned=gs.frag[CAT_FRAG_KEYS[i]]||0;
        const before=gs.fragBefore[CAT_FRAG_KEYS[i]]||0;
        const after=p.frags;
        const cost=CAT_TIERS[p.tier].c;
        const pctBefore=Math.min(1,before/cost),pctAfter=Math.min(1,after/cost);
        // Window name + earned
        cx.font=`bold 12px ${f}`;cx.textAlign='left';cx.fillStyle=`rgb(${r},${g},${b})`;

function drawLoadoutPopup(){
  cx.fillStyle='rgba(8,12,30,.85)';cx.fillRect(0,0,W,H);
  const f='"SF Pro Display","Segoe UI",system-ui,sans-serif';
  const equipped=catProg.map((p,i)=>({p,i})).filter(x=>x.p.eq);
  const focused=catProg.map((p,i)=>({p,i})).filter(x=>x.p.foc);
  const pw=Math.min(360,W*0.92);
  // Compute height: header + equipped header + N rows + focus header + N rows + footer
  const rowH=44,headerH=24,sectionGap=14,padTop=24,padBot=44;
  const ph=padTop+headerH+sectionGap
    +(equipped.length>0?headerH+equipped.length*rowH+sectionGap:0)
    +(focused.length>0?headerH+focused.length*rowH+sectionGap:0)
    +padBot;
  const px=W/2-pw/2,py=H/2-ph/2;
  // Panel
  cx.fillStyle='rgba(14,18,38,0.97)';cx.beginPath();cx.roundRect(px,py,pw,ph,16);cx.fill();
  cx.strokeStyle='rgba(180,150,80,0.3)';cx.lineWidth=1;cx.beginPath();cx.roundRect(px,py,pw,ph,16);cx.stroke();
  // Title
  cx.font=`bold 18px ${f}`;cx.textAlign='center';cx.fillStyle='#ccaa55';
  cx.fillText('✦ Oculus Loadout',W/2,py+padTop);
  let y=py+padTop+headerH+sectionGap;
  // Equipped section
  if(equipped.length>0){
    cx.font=`bold 12px ${f}`;cx.textAlign='left';cx.fillStyle='rgba(220,180,80,0.7)';
    cx.fillText('EQUIPPED ('+equipped.length+'/3)',px+18,y+4);
    y+=headerH;
    for(const{p,i}of equipped){
      const w=CAT_W[i],[r,g,b]=w.color;

      cx.fillStyle=`rgba(${r},${g},${b},0.7)`;cx.fillRect(px+18,y+6,3,32);

      cx.font=`bold 13px ${f}`;cx.textAlign='left';cx.fillStyle=`rgba(${r},${g},${b},1)`;
      cx.fillText(w.name,px+30,y+16);
      cx.font=`10px ${f}`;cx.fillStyle='rgba(150,170,200,0.6)';
      cx.fillText(['Clear','Tinted','Radiant'][p.tier-1],px+30,y+30);
      // Effect text (current tier)
      cx.font=`11px ${f}`;cx.fillStyle='rgba(220,225,240,0.85)';
      const effect=w.t[p.tier-1];
      const maxW=pw-130;
      let txt=effect;
      if(cx.measureText(txt).width>maxW){
        while(cx.measureText(txt+'…').width>maxW&&txt.length>0)txt=txt.slice(0,-1);
        txt+='…';
      }
      cx.textAlign='right';cx.fillText(txt,px+pw-18,y+24);
      y+=rowH;

  // Focused section
  if(focused.length>0){

    cx.fillText('FOCUSED ('+focused.length+'/'+CAT_MAX_FOCUS+') — earning fragments',px+18,y+4);
    y+=headerH;
    for(const{p,i}of focused){
      const w=CAT_W[i],[r,g,b]=w.color;
      cx.fillStyle=`rgba(${r},${g},${b},0.7)`;cx.fillRect(px+18,y+6,3,32);
      cx.font=`bold 13px ${f}`;cx.textAlign='left';cx.fillStyle=`rgba(${r},${g},${b},1)`;
