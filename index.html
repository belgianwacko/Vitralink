    {dark:'#0c2058',mid:'#2860c8',hi:'#4890ee',edge:'#78bbff'},  // Navy Blue (darker)

// Color mode setting
let colorMode='colorblind'; // 'standard'|'colorblind'
try{const cm=localStorage.getItem('vitralink_v2_colormode');if(cm)colorMode=cm;}catch(e){}
function applyColorMode(){CFG.PAL=colorMode==='standard'?CFG.PAL_STD:CFG.PAL_CB;}
function toggleColorMode(){colorMode=colorMode==='standard'?'colorblind':'standard';applyColorMode();try{localStorage.setItem('vitralink_v2_colormode',colorMode);}catch(e){}}
applyColorMode();

// Pre-parse hex palette colors to RGB (eliminates ~1155 parseInt/frame)
function preParseRGB(pal){
  for(const p of pal){
    p.darkR=parseInt(p.dark.slice(1,3),16);p.darkG=parseInt(p.dark.slice(3,5),16);p.darkB=parseInt(p.dark.slice(5,7),16);
    p.midR=parseInt(p.mid.slice(1,3),16);p.midG=parseInt(p.mid.slice(3,5),16);p.midB=parseInt(p.mid.slice(5,7),16);
    p.hiR=parseInt(p.hi.slice(1,3),16);p.hiG=parseInt(p.hi.slice(3,5),16);p.hiB=parseInt(p.hi.slice(5,7),16);
  }
}
preParseRGB(CFG.PAL_STD);preParseRGB(CFG.PAL_CB);

// ================================================================
//  GLOBALS
// ================================================================
//  SEEDED RNG (Mulberry32)
// ================================================================
function mulberry32(seed){
  return function(){seed|=0;seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;};
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h;}
let rng=Math.random; // replaced per game

// ================================================================
//  GAME MODES
// ================================================================
const MODES={
  blitz:{name:'Blitz',desc:'Race the clock!',icon:'⚡',timed:true},
  daily:{name:'Daily',desc:'Same board for everyone',icon:'📅',timed:true},
  zen:{name:'Zen',desc:'No timer, just chill',icon:'🧘',timed:false},
};
let gameMode='blitz'; // 'blitz'|'daily'|'zen'
let showModeSelect=true;
let showOculus=false;
let dailyAttemptsLeft=3;
let dailySeed=0;
let dailyBestToday=0;
let dailyDateKey='';
let dailyStreak=0; // consecutive days played
let dailyLastPlayedKey=''; // last date key where player played daily

// Per-mode high scores
let highScores={blitz:0,daily:0,zen:0};
try{const hs=localStorage.getItem('vitralink_v2_hs');if(hs)highScores=JSON.parse(hs);}catch(e){}
// Migrate old high score
try{const old=localStorage.getItem('vitralink_v2_hs_legacy');if(old&&parseInt(old)>highScores.blitz){highScores.blitz=parseInt(old);}}catch(e){}
function saveHighScores(){try{localStorage.setItem('vitralink_v2_hs',JSON.stringify(highScores));}catch(e){}}

// ================================================================
//  ONBOARDING — progressive mechanic unlock
// ================================================================
// Stage 0: core chaining + heat/shatter + repaint (everything basic at once)
// Stage 1: + power gem, rainbow gem, curse gem
// Stage 2: + blaze gem, hourglass gem (full blitz)
// Stage 3: daily, zen, oculus unlocked
let onboardingStage=0;
try{
  const os=localStorage.getItem('vitralink_v2_onboarding');
  if(os!==null){
    onboardingStage=Math.max(0,Math.min(3,parseInt(os)||0));
  }
}catch(e){}
function saveOnboarding(){try{localStorage.setItem('vitralink_v2_onboarding',''+onboardingStage);}catch(e){}}
function advanceOnboarding(){if(onboardingStage<3){onboardingStage++;saveOnboarding();}}
// Mechanic gates
function hasHeatMech(){return true;}
function hasShatterMech(){return true;}
function hasRepaintMech(){return true;}
function hasPowerMech(){return onboardingStage>=1;}
function hasCurseMech(){return onboardingStage>=1;}
function hasRainbowMech(){return onboardingStage>=1;}
function hasBlazeMech(){return onboardingStage>=2;}
function hasHourglassMech(){return onboardingStage>=2;}
function hasAllModes(){return onboardingStage>=3;}

// Daily state persistence
function getDailyKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function loadDailyState(){
  const key=getDailyKey();dailyDateKey=key;
  dailySeed=hashStr('shatterchain-daily-'+key);
  try{
    const ds=localStorage.getItem('vitralink_v2_daily');
    if(ds){const d=JSON.parse(ds);
      if(d.key===key){dailyAttemptsLeft=d.left;dailyBestToday=d.best;}
      else{dailyAttemptsLeft=3;dailyBestToday=0;}
    }
  }catch(e){dailyAttemptsLeft=3;dailyBestToday=0;}
  // Load streak
  try{
    const ss=localStorage.getItem('vitralink_v2_dailystreak');
    if(ss){const s=JSON.parse(ss);dailyStreak=s.streak||0;dailyLastPlayedKey=s.last||'';}
  }catch(e){}
}
function saveDailyState(){
  try{localStorage.setItem('vitralink_v2_daily',JSON.stringify({key:dailyDateKey,left:dailyAttemptsLeft,best:dailyBestToday}));}catch(e){}
}
function saveDailyStreak(){
  try{localStorage.setItem('vitralink_v2_dailystreak',JSON.stringify({streak:dailyStreak,last:dailyLastPlayedKey}));}catch(e){}
}
function updateDailyStreak(){
  // Called when a daily game completes
  const today=getDailyKey();
  if(dailyLastPlayedKey===today)return; // already counted today
  if(!dailyLastPlayedKey){dailyStreak=1;}
  else{
    // Was yesterday?
    const d=new Date(),y=new Date(d.getFullYear(),d.getMonth(),d.getDate()-1);
    const yesterday=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
    if(dailyLastPlayedKey===yesterday)dailyStreak++;
    else dailyStreak=1; // streak broken
  }
  dailyLastPlayedKey=today;saveDailyStreak();
}
loadDailyState();

function resumeAnimAfterPause(){
  // When resuming after any pause-like state (popup, manual pause, tutorial),
  // shift animStart and per-slot drop timestamps forward by the paused duration
  // so animations continue from where they left off, not from wall-clock elapsed.
  if(pauseStartTime>0&&animPhase!=='idle'){
    const pausedDur=performance.now()-pauseStartTime;
    animStart+=pausedDur;
    if(droppingSlots&&droppingSlots.length){
      for(const d of droppingSlots){if(d.startTime!==undefined)d.startTime+=pausedDur;}
    }
  }
}
function realElapsedMs(){
  if(!gameStarted)return 0;
  let ms=performance.now()-gameStartTime-totalPausedMs;
  if(pauseStartTime>0)ms-=(performance.now()-pauseStartTime); // subtract ongoing pause
  return Math.max(0,ms);
}

function showTut(key){
  if(tutSeen[key])return;
  if(!TUT[key])return;
  // Mark seen IMMEDIATELY on enqueue, not on activation. Otherwise repeated callers
  // (like tickRealClock running every frame while animations block tryNextTut) will
  // queue hundreds of duplicates before the first one ever activates.
  tutSeen[key]=true;saveTut();
  tutQueue.push({key,title:TUT[key].title,text:TUT[key].text,midGame:!!TUT[key].midGame,customDraw:TUT[key].customDraw||null});
  if(!tutActive)tryNextTut();
}
function tryNextTut(){
  // Allow activation during game-over even if animPhase isn't idle
  // (game loop is stopped, so we're not waiting for anything)
  if(tutActive||(!gameOver&&(chainOn||animPhase!=='idle'))){
    return;
  }
  if(tutQueue.length===0){tutActive=null;return;}
  if(!pauseStartTime)pauseStartTime=performance.now(); // pause starts when first tut opens
  tutActive=tutQueue.shift();
  tutOpenedAt=performance.now();
}
function nextTut(){tryNextTut();}
function dismissTut(){
  if(!tutActive||performance.now()-tutOpenedAt<150)return;
  tutActive=null;
  if(tutQueue.length>0){nextTut();}
  else{
    if(pauseStartTime>0){resumeAnimAfterPause();totalPausedMs+=performance.now()-pauseStartTime;pauseStartTime=0;}
    const now=performance.now();
    lastTimerTick=now;lastHeatCoolTick=now;lastActionTime=now;
    lastPowerSpawn=now;lastCurseSpawn=now;lastRainbowSpawn=now;lastBlazeSpawn=now;lastHourglassSpawn=now;
    for(const s of slots)if(s.special)s.specialTick=now;
  }
}

// ================================================================
//  WEBGL STAINED GLASS RENDERER
// ================================================================
const glCanvas=document.createElement('canvas');
const gl=glCanvas.getContext('webgl',{alpha:true,premultipliedAlpha:false,antialias:true});
let useGL=!!gl;
let glProg=null,glVBO=null,glVertCount=0,glNeedsBuild=true;

const VERT_SRC=`
attribute vec2 aPos;
attribute vec2 aLocal;
attribute vec3 aMid;
attribute vec3 aHi;
attribute vec3 aDark;
attribute float aFlags;
varying vec2 vL;
varying vec3 vM,vH,vD;
varying float vF;
uniform vec2 uRes;
void main(){
  vec2 c=(aPos/uRes)*2.0-1.0;c.y=-c.y;
  gl_Position=vec4(c,0.0,1.0);
  vL=aLocal;vM=aMid;vH=aHi;vD=aDark;vF=aFlags;
}`;

const FRAG_SRC=`
precision mediump float;
varying vec2 vL;
varying vec3 vM,vH,vD;
varying float vF;
uniform float uTime;
uniform vec2 uLight;

vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}
vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865,0.366025403,-0.577350269,0.024390243);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m;m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0;
  vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5);
  vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g;
  g.x=a0.x*x0.x+h.x*x0.y;
  g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}

void main(){
  if(vF>0.5){discard;}
  vec2 d=vL;
  float dist=length(d);
  float ph=dot(vM,vec3(17.3,23.7,31.1));

  // Per-gem pseudo-random values for unique highlights
  float r1=fract(sin(ph*12.9898)*43758.5453);
  float r2=fract(sin(ph*78.233+r1*5.7)*23421.631);
  float r3=fract(cos(ph*45.164+r2*3.1)*18765.432);

  // Glass thickness — more variation from center to edge
  float thick=0.12+0.4*dist;
  thick+=snoise(d*3.2+ph)*0.05;
  thick+=snoise(d*7.5-ph*1.7)*0.025;
  thick=clamp(thick,0.05,0.75);

  // Transmission factor — thin center = high, thick edge = low
  float trans=1.0-thick*0.3;

  // Directional backlight
  float lDot=dot(normalize(d+0.0001),uLight)*0.5+0.5;
  float dir=mix(0.7,1.35,lDot);

  // --- TRANSLUCENCY COLOR MODEL ---
  // Deep saturated color for edges (thick glass)
  vec3 deepCol=vD*0.3+vM*0.7;
  // Light-through color for center (thin glass lets light through)
  vec3 lightCol=mix(vH,vec3(1.0,0.98,0.93),0.4);
  // Center transparency: cubic falloff for tight bright core
  float cFade=(1.0-dist*0.85);
  cFade=cFade*cFade*cFade;
  // Blend: saturated edges, bright washy center
  vec3 col=mix(deepCol,lightCol,cFade*trans*0.7);
  // Directional light influence
  col=mix(col,mix(vM,vH,0.5),lDot*0.15*(1.0-dist*0.6));
  // Edge saturation reinforcement
  float edgeSat=smoothstep(0.35,0.85,dist);
  col=mix(col,vM*0.9+vD*0.1,edgeSat*0.2);

  // Subtle vibrancy
  col*=1.0+trans*0.08;

  // Gentle bubbles — per-gem varied
  float bub=smoothstep(0.67,0.77,snoise(d*18.0+vec2(ph,-ph)));
  bub+=smoothstep(0.77,0.85,snoise(d*28.0-vec2(r1*10.0,r2*10.0)))*0.3;
  col+=bub*vec3(1.0,1.0,0.95)*0.035;

  // Subtle streaks — per-gem angle
  float stAng=r1*3.14159;
  vec2 stD=vec2(cos(stAng),sin(stAng));
  float streak=snoise(vec2(dot(d,stD)*2.0,dot(d,vec2(-stD.y,stD.x))*7.0)+ph*0.5);
  col+=streak*0.01*vH;

  // Animated caustics
  float t=uTime*0.25;
  float c1=snoise(d*3.5+vec2(sin(t+ph),cos(t*0.7+ph)));
  float c2=snoise(d*5.5-vec2(cos(t*0.55-ph),sin(t*0.8+ph)));
  col+=(c1*0.025+c2*0.018)*vH;

  // --- PER-GEM UNIQUE SPECULAR ---
  // Position offset unique to each gem
  vec2 spOff=vec2(r1-0.5,r2-0.5)*0.3;
  vec2 spPos=uLight*0.22+spOff;
  // Elliptical distortion unique to each gem
  float spAng=r3*3.14159;
  vec2 spRot=vec2(cos(spAng),sin(spAng));
  vec2 dSp=d-spPos;
  vec2 dSpR=vec2(dot(dSp,spRot),dot(dSp,vec2(-spRot.y,spRot.x)));
  float spStr=0.7+r1*0.6;
  float spD=length(vec2(dSpR.x*spStr,dSpR.y));
  // Brightness unique to each gem
  float spB=0.3+r2*0.3;
  float sp=smoothstep(0.22,0.0,spD)*spB;
  sp+=smoothstep(0.35,0.08,spD)*0.07;
  // Hot core
  float hc=smoothstep(0.055,0.0,spD)*0.3;
  col+=vec3(1.0,0.99,0.94)*(sp+hc);

  // Secondary spec — different offset per gem
  vec2 sp2Off=vec2(r3-0.5,r1-0.5)*0.22;
  vec2 sp2Pos=uLight*0.06+sp2Off+vec2(0.15,-0.1);
  float sp2D=length(d-sp2Pos);
  float sp2=smoothstep(0.13,0.0,sp2D)*(0.08+r3*0.1);
  col+=vec3(1.0,1.0,0.97)*sp2;

  // Color-tinted internal reflection — opposite side
  vec2 aOff=vec2(r2-0.5,r3-0.5)*0.2;
  vec2 aPos=-uLight*0.2+aOff;
  float aSp=smoothstep(0.26,0.04,length(d-aPos))*0.08;
  col+=vH*aSp*0.5;

  // Fresnel edge glow
  float edge=smoothstep(0.7,0.98,dist);
  float fresnel=edge*edge;
  col+=vH*fresnel*0.18;
  col*=1.0-edge*0.2;

  // Warm wash
  col+=vec3(0.012,0.008,0.003)*(1.0-dist)*trans;

  // Edge AA
  float alpha=1.0-smoothstep(0.9,1.0,dist)*0.25;

  gl_FragColor=vec4(col,alpha);
}`;

function initGL(){
  if(!gl)return;
  function compile(type,src){
    const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error('Shader:',gl.getShaderInfoLog(s));return null;}
    return s;
  }
  const vs=compile(gl.VERTEX_SHADER,VERT_SRC);
  const fs=compile(gl.FRAGMENT_SHADER,FRAG_SRC);
  if(!vs||!fs){useGL=false;return;}
  glProg=gl.createProgram();gl.attachShader(glProg,vs);gl.attachShader(glProg,fs);gl.linkProgram(glProg);
  if(!gl.getProgramParameter(glProg,gl.LINK_STATUS)){console.error('Link:',gl.getProgramInfoLog(glProg));useGL=false;return;}
  glLocs.aPos=gl.getAttribLocation(glProg,'aPos');
  glLocs.aLocal=gl.getAttribLocation(glProg,'aLocal');
  glLocs.aMid=gl.getAttribLocation(glProg,'aMid');
  glLocs.aHi=gl.getAttribLocation(glProg,'aHi');
  glLocs.aDark=gl.getAttribLocation(glProg,'aDark');
  glLocs.aFlags=gl.getAttribLocation(glProg,'aFlags');
  glLocs.uRes=gl.getUniformLocation(glProg,'uRes');
  glLocs.uTime=gl.getUniformLocation(glProg,'uTime');
  glLocs.uLight=gl.getUniformLocation(glProg,'uLight');
  glVBO=gl.createBuffer();
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
}
initGL();

function resizeGL(){

}

// Build vertex buffer from Voronoi cells
// 14 floats per vertex: pos(2), local(2), mid(3), hi(3), dark(3), flags(1)
const GL_STRIDE=14*4;
function buildGemVerts(vor,vP,vM2){
  if(!useGL||!vor)return;
  const verts=[];
  for(let i=0;i<vP.length;i++){
    const si=vM2[i];if(si<0)continue;
    const s=slots[si];
    const cell=vor.cellPolygon(i);if(!cell||cell.length<3)continue;
    const skip=(s.isHole||s.flash>0||s.rainbow)?1.0:0.0;
    const pal=CFG.PAL[s.ci]||CFG.PAL[0];
    const mr=pal.midR/255,mg=pal.midG/255,mb=pal.midB/255;
    const hr=pal.hiR/255,hg=pal.hiG/255,hb=pal.hiB/255;
    const dr=pal.darkR/255,dg=pal.darkG/255,db=pal.darkB/255;
    const cx2=vP[i][0]*dpr,cy2=vP[i][1]*dpr;
    // Compute approximate cell radius for normalizing local coords
    let maxR=0;
    for(let j=0;j<cell.length-1;j++){
      const dx=cell[j][0]-vP[i][0],dy=cell[j][1]-vP[i][1];
      const r2=dx*dx+dy*dy;if(r2>maxR)maxR=r2;
    }
    const rad=Math.sqrt(maxR)||1;
    // Fan triangulation from center
    for(let j=0;j<cell.length-1;j++){
      const j2=(j+1)%(cell.length-1);
      // Center vertex
      verts.push(cx2,cy2, 0,0, mr,mg,mb, hr,hg,hb, dr,dg,db, skip);
      // Edge vertex 1
      const e1x=cell[j][0]*dpr,e1y=cell[j][1]*dpr;
      const l1x=(cell[j][0]-vP[i][0])/rad,l1y=(cell[j][1]-vP[i][1])/rad;
      verts.push(e1x,e1y, l1x,l1y, mr,mg,mb, hr,hg,hb, dr,dg,db, skip);
      // Edge vertex 2
      const e2x=cell[j2][0]*dpr,e2y=cell[j2][1]*dpr;
      const l2x=(cell[j2][0]-vP[i][0])/rad,l2y=(cell[j2][1]-vP[i][1])/rad;
      verts.push(e2x,e2y, l2x,l2y, mr,mg,mb, hr,hg,hb, dr,dg,db, skip);
    }
  }
  const data=new Float32Array(verts);
  gl.bindBuffer(gl.ARRAY_BUFFER,glVBO);
  gl.bufferData(gl.ARRAY_BUFFER,data,gl.DYNAMIC_DRAW);
  glVertCount=verts.length/14;
  glNeedsBuild=false;
}

function renderGL(){
  if(!useGL||glVertCount===0)return;
  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(glProg);
  gl.uniform2f(glLocs.uRes,W*dpr,H*dpr);
  gl.uniform1f(glLocs.uTime,performance.now()*0.001);
  gl.uniform2f(glLocs.uLight,CFG.LX,CFG.LY);
  gl.bindBuffer(gl.ARRAY_BUFFER,glVBO);
  gl.enableVertexAttribArray(glLocs.aPos);
  gl.enableVertexAttribArray(glLocs.aLocal);
  gl.enableVertexAttribArray(glLocs.aMid);
  gl.enableVertexAttribArray(glLocs.aHi);
  gl.enableVertexAttribArray(glLocs.aDark);
  gl.enableVertexAttribArray(glLocs.aFlags);
  gl.vertexAttribPointer(glLocs.aPos,2,gl.FLOAT,false,GL_STRIDE,0);
  gl.vertexAttribPointer(glLocs.aLocal,2,gl.FLOAT,false,GL_STRIDE,8);
  gl.vertexAttribPointer(glLocs.aMid,3,gl.FLOAT,false,GL_STRIDE,16);
  gl.vertexAttribPointer(glLocs.aHi,3,gl.FLOAT,false,GL_STRIDE,28);
  gl.vertexAttribPointer(glLocs.aDark,3,gl.FLOAT,false,GL_STRIDE,40);
  gl.vertexAttribPointer(glLocs.aFlags,1,gl.FLOAT,false,GL_STRIDE,52);
  gl.drawArrays(gl.TRIANGLES,0,glVertCount);
}

let audioCtx=null, audioMaster=null, sfxBus=null, musicBus=null, audioReady=false;
let sfxMuted=false, musicMuted=false;
try{sfxMuted=localStorage.getItem('vitralink_v2_mute_sfx')==='1';}catch(e){}
try{musicMuted=localStorage.getItem('vitralink_v2_mute_music')==='1';}catch(e){}

function initAudio(){
  if(audioCtx){if(audioCtx.state==='suspended')audioCtx.resume();return;}
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    audioMaster=audioCtx.createGain();
    audioMaster.gain.value=1.0;
    audioMaster.connect(audioCtx.destination);
    sfxBus=audioCtx.createGain();
    sfxBus.gain.value=sfxMuted?0:0.5;
    sfxBus.connect(audioMaster);
    musicBus=audioCtx.createGain();
    musicBus.gain.value=musicMuted?0:0.5;
    musicBus.connect(audioMaster);
    audioReady=true;
    if(musicMood&&musicMood!=='off')startMusic(musicMood);
  }catch(e){audioReady=false;}
}
function toggleSfxMute(){
  sfxMuted=!sfxMuted;
  if(sfxBus)sfxBus.gain.value=sfxMuted?0:0.5;
  try{localStorage.setItem('vitralink_v2_mute_sfx',sfxMuted?'1':'0');}catch(e){}
}
function toggleMusicMute(){
  musicMuted=!musicMuted;
  if(musicBus)musicBus.gain.value=musicMuted?0:0.5;
  try{localStorage.setItem('vitralink_v2_mute_music',musicMuted?'1':'0');}catch(e){}
}

const SFX={
  // Glass chime — each gem plays next note up, voice rotates per chain
  chainAdd(idx){
    if(!audioReady||sfxMuted)return;
    const t=audioCtx.currentTime;
    const v=CHAIN_VOICES[chainVoiceIdx%CHAIN_VOICES.length];
    const freq=v.notes[Math.min(idx,v.notes.length-1)];
    // Two detuned oscillators for shimmer
    for(let d=-v.detune;d<=v.detune;d+=(v.detune*2)||1){
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.type=v.wave;
      osc.frequency.value=freq;
      osc.detune.value=d;
      gain.gain.setValueAtTime(v.vol,t);
      gain.gain.exponentialRampToValueAtTime(0.001,t+v.decay);
      osc.connect(gain);gain.connect(sfxBus);
      osc.start(t);osc.stop(t+v.decay+0.05);
    }
    // Harmonic overtone
    const osc2=audioCtx.createOscillator();
    const g2=audioCtx.createGain();
    osc2.type='sine';osc2.frequency.value=freq*v.harm;
    g2.gain.setValueAtTime(v.harmVol,t);g2.gain.exponentialRampToValueAtTime(0.001,t+v.decay*0.5);
    osc2.connect(g2);g2.connect(sfxBus);
    osc2.start(t);osc2.stop(t+v.decay*0.5+0.05);
  },

  // Backtrack — soft descending blip using current voice
  chainRemove(idx){
    if(!audioReady||sfxMuted)return;
    const t=audioCtx.currentTime;
    const v=CHAIN_VOICES[chainVoiceIdx%CHAIN_VOICES.length];
    const freq=v.notes[Math.min(idx,v.notes.length-1)];
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=v.wave;osc.frequency.value=freq*0.8;
    gain.gain.setValueAtTime(0.08,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);

  // Valid chain scored — resonant crystal chord, tuned to current voice
  chainScore(len){
    if(!audioReady||sfxMuted)return;
    const t=audioCtx.currentTime;
    const v=CHAIN_VOICES[chainVoiceIdx%CHAIN_VOICES.length];
    // Use voice's root note, shifted down for bigger chains

    const base=len>=8?root*0.5:len>=6?root*0.75:root;

// Play a single note — lighter, less bassy
function mNote(freq,t,dur,vol,wave){
  if(!audioCtx||!musicGain)return;
  // Clamp very low frequencies to reduce bass
  if(freq<180)freq=180;
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=wave||'sine';
  osc.frequency.value=freq;
  const v=vol||0.04;
  // Gentle attack, smooth decay
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(v,t+0.06);
  g.gain.exponentialRampToValueAtTime(v*0.35,t+dur*0.5);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  osc.connect(g);g.connect(musicGain);
  osc.start(t);osc.stop(t+dur+0.05);
  // Lighter shimmer companion — higher, quieter
  if(Math.random()>0.4){
    const osc2=audioCtx.createOscillator();
    const g2=audioCtx.createGain();
    osc2.type='sine';
    osc2.frequency.value=freq*2.002; // octave up + slight detune
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(v*0.15,t+0.1);
    g2.gain.exponentialRampToValueAtTime(0.001,t+dur*0.5);
    osc2.connect(g2);g2.connect(musicGain);
    osc2.start(t);osc2.stop(t+dur*0.6);
  }
}

// Soft chord
function mChord(freqs,t,dur,vol){
  for(const f of freqs)mNote(f,t,dur,(vol||0.03)/Math.sqrt(freqs.length));
}

// Transpose frequency by semitones
function semiT(freq,semi){return freq*Math.pow(2,semi/12);}

function startMusic(mood){
  if(!audioCtx||!audioReady)return;
  stopMusic();
  if(mood==='off'){musicMood='off';try{localStorage.setItem('vitralink_v2_music','off');}catch(e){}return;}
  const m=MUSIC_MOODS[mood];
  if(!m)return;
  musicMood=mood;
  try{localStorage.setItem('vitralink_v2_music',mood);}catch(e){}

  musicGain=audioCtx.createGain();
  musicGain.gain.value=0.55;
  musicGain.connect(musicBus);
  musicPlaying=true;
  musicPhraseCount=0;
  musicKeyShift=0;

  function playPhrase(){
    if(!musicPlaying)return;
    musicPhraseCount++;

    // Every 6-10 phrases, shift key by random interval for variety
    if(musicPhraseCount%Math.floor(6+Math.random()*5)===0){
      const shifts=[-2,-1,1,2,3,5,7];
      musicKeyShift=shifts[Math.floor(Math.random()*shifts.length)];
    }
    // Occasionally return to home key
    if(musicPhraseCount%Math.floor(12+Math.random()*8)===0)musicKeyShift=0;

    // Pick random root and scale (not sequential!)
    const root=semiT(m.roots[Math.floor(Math.random()*m.roots.length)],musicKeyShift);
    const scale=m.scales[Math.floor(Math.random()*m.scales.length)];

    // Build note pool from scale intervals across 2 octaves (no sub-bass)
    const pool=[];
    for(const s of scale){
      const f=semiT(root,s);
      pool.push(f);
      if(f*2<2400)pool.push(f*2); // octave up if not too shrill
    }
    pool.sort((a,b)=>a-b);

    // Randomize phrase parameters within ranges
    const len=m.phraseLen[0]+Math.floor(Math.random()*(m.phraseLen[1]-m.phraseLen[0]+1));
    const arpRate=m.arpRate[0]+Math.random()*(m.arpRate[1]-m.arpRate[0]);
    const noteDur=m.noteDur[0]+Math.random()*(m.noteDur[1]-m.noteDur[0]);
    const pattern=m.patterns[Math.floor(Math.random()*m.patterns.length)];
    const t=audioCtx.currentTime+0.1;

    // Generate note indices based on pattern
    const indices=[];
    if(pattern==='up'){
      let idx=Math.floor(Math.random()*Math.max(1,pool.length-len));
      for(let i=0;i<len;i++){indices.push(idx%pool.length);idx++;}
    }else if(pattern==='down'){
      let idx=pool.length-1-Math.floor(Math.random()*Math.max(1,pool.length-len));
      for(let i=0;i<len;i++){indices.push(Math.max(0,idx%pool.length));idx--;}
    }else if(pattern==='wave'){
      let idx=Math.floor(Math.random()*pool.length),dir=1;
      for(let i=0;i<len;i++){
        indices.push(Math.abs(idx)%pool.length);
        idx+=dir;
        if(idx>=pool.length-1||idx<=0)dir=-dir;
        if(Math.random()>0.8)dir=-dir; // occasional direction change
      }
    }else if(pattern==='trill'){
      const a=Math.floor(Math.random()*pool.length);
      const b=Math.min(pool.length-1,a+1+Math.floor(Math.random()*2));
      for(let i=0;i<len;i++)indices.push(i%2===0?a:b);
    }else{ // scatter
      for(let i=0;i<len;i++)indices.push(Math.floor(Math.random()*pool.length));
    }

    // Play notes with slight timing humanization
    let noteTime=0;
    for(let i=0;i<indices.length;i++){
      const freq=pool[indices[i]];
      const humanize=(Math.random()-0.5)*arpRate*0.15;
      const noteT=t+noteTime+humanize;
      const dynVol=m.noteVol*(0.7+Math.random()*0.3); // velocity variation

      mNote(freq,noteT,noteDur,dynVol);

      // Shimmer: random octave ghost at lower volume
      if(m.shimmer&&Math.random()>0.6){
        mNote(freq*2,noteT+0.04,noteDur*0.4,dynVol*0.2);
      }

      // Vary spacing — occasional pause/breath
      noteTime+=arpRate*(Math.random()>0.85?1.8:1.0);
    }

    // Occasional soft chord at phrase end (not every time)
    if(Math.random()>0.7){
      const chordFreqs=scale.slice(0,3).map(s=>semiT(root,s));
      const chordT=t+noteTime+0.4;
      mChord(chordFreqs,chordT,noteDur*0.8,m.noteVol*0.5);
    }

    // Schedule next phrase after silence
    const pause=m.phrasePause[0]+Math.random()*(m.phrasePause[1]-m.phrasePause[0]);
    const phraseTime=noteTime*1000;
    const tid=setTimeout(playPhrase,phraseTime+pause);
    musicTimers.push(tid);
  }

  // Start first phrase after brief silence
  const tid=setTimeout(playPhrase,800+Math.random()*1500);
  musicTimers.push(tid);
}

function stopMusic(){
  musicPlaying=false;
  for(const tid of musicTimers)clearTimeout(tid);
  musicTimers=[];
  if(musicGain){try{musicGain.disconnect();}catch(e){}musicGain=null;}
}

function cycleMusicMood(){
  const moods=['off','cathedral','rain','twilight','aurora'];
  const idx=moods.indexOf(musicMood);
  const next=moods[(idx+1)%moods.length];

function addPanelMsg(t,c,d){
  // Stagger messages added in rapid succession so they don't flash by faster than readable.
  // Each message gets at least 800ms of "fresh" time on screen before the next can take over.
  const STAGGER=800;
  const MIN_DUR=2000;
  let addedAt=performance.now();
  if(panelMsgs.length>0){
    const last=panelMsgs[panelMsgs.length-1];
    const lastFresh=last.addedAt+STAGGER;
    if(addedAt<lastFresh)addedAt=lastFresh;
  }
  panelMsgs.push({text:t,color:c,addedAt,duration:Math.max(MIN_DUR,d||2000)});
  if(panelMsgs.length>6)panelMsgs.shift();
  // Auto-trigger sounds from message content
  if(t.includes('POWER GEM'))SFX.powerGem();
  else if(t.includes('CURSED'))SFX.curseHit();
  else if(t.includes('FROZEN'))SFX.hourglass();
  else if(t.includes('SHATTER EARNED')||t.includes('REPAINT EARNED'))SFX.earned();
  else if(t.includes('COLOR CLEAR'))SFX.colorClear();
}

function calcScore(n){return Math.round(10*n*(CFG.MULT[n]||CFG.MULT_MAX));}
// Adds time to the timer; any seconds that would exceed TIMER_CAP convert to score
// at 1000 pts/sec, ensuring time grants are never wasted when the player is at cap.
function grantTime(amt){
  if(amt<=0||!MODES[gameMode].timed)return;
  const room=Math.max(0,CFG.TIMER_CAP-timerSec);
  const used=Math.min(amt,room);
  const overflow=amt-used;
  if(used>0)timerSec+=used;
  if(overflow>0){
    const bonus=overflow*1000;
    score+=bonus;
    addPanelMsg('+'+bonus.toLocaleString()+' (time overflow)','#ffcc66',1800);
  }
}
function calcTimeBonus(n){
  let b=0;for(const[t,s]of Object.entries(CFG.TIME_BASE))if(n>=parseInt(t))b=s;
  if(b<=0)return 0;
  b+=Math.floor(heat/2);
  // Linear decay based on real elapsed time (pauses/rules/tutorials excluded)
  const windowBonus=getDecayBonus(); // Twilight Glass: slows time bonus decay
  const effectiveElapsed=Math.max(0,realElapsedMs()/1000-windowBonus);
  const decay=Math.max(0,1-effectiveElapsed/CFG.BONUS_DECAY_SECS);
  // Exceptional chains always earn something — floor scales with length
  const floor=n>=12?Math.floor((n-10)/3):0;
  return Math.max(floor,Math.round(b*decay));
}
function calcHeatGain(n){return n>=9?3:n>=7?2:n>=5?1:0;}
function colorClearThreshold(){
  if(!gameStarted)return CFG.COLOR_CLEAR_MIN;
  const sec=Math.floor(realElapsedMs()/1000);
  // 5 at start, +1 every 60s until 7, then +1 every 90s until 10 max
  let t=CFG.COLOR_CLEAR_MIN;
  if(sec>=60)t++;  // 6 at 60s
  if(sec>=120)t++; // 7 at 120s
  if(sec>=210)t++; // 8 at 210s
  if(sec>=300)t++; // 9 at 300s
  if(sec>=390)t++; // 10 at 390s
  return Math.min(10,t);
}

// Random color, optionally excluding one
function randColor(slotIdx){
  if(excludedColor>=0){
    const pool=[];for(let i=0;i<CFG.NUM_COLORS;i++)if(i!==excludedColor)pool.push(i);
    if(slotIdx!==undefined&&rng()<CFG.CLUSTER_BIAS){
      const nc=neighborColors(slotIdx);
      const valid=nc.filter(c=>c!==excludedColor);
      if(valid.length)return valid[Math.floor(rng()*valid.length)];
    }
    return pool[Math.floor(rng()*pool.length)];
  }
  // Cluster bias: chance to match a filled neighbor's color
  if(slotIdx!==undefined&&rng()<CFG.CLUSTER_BIAS){
    const nc=neighborColors(slotIdx);
    if(nc.length)return nc[Math.floor(rng()*nc.length)];
  }
  return Math.floor(rng()*CFG.NUM_COLORS);
}
function neighborColors(si){
  const s=slots[si],colors=[];
  for(const[dq,dr]of HD){
    const nk=gk(s.q+dq,s.r+dr);
    const ni=slotLookup[nk];
    if(ni!==undefined&&!slots[ni].isHole&&slots[ni].ci>=0)colors.push(slots[ni].ci);
  }
  return colors;
}

function findSpecialSlot(type){
  for(let i=0;i<slots.length;i++)if(!slots[i].isHole&&slots[i].special===type)return i;
  return-1;
}
function hasSpecial(type){return findSpecialSlot(type)>=0;}

function pickRandomGemSlot(){
  const valid=[];
  for(let i=0;i<slots.length;i++){
    const s=slots[i];
    if(!s.isHole&&!s.special&&!s.rainbow)valid.push(i);
  }
  return valid.length>0?valid[Math.floor(rng()*valid.length)]:-1;
}

function clearSpecial(si){

function tickSpecialGems(){
  if(animPhase!=='idle'||gameOver||!gameStarted||repaintSelected.length>0||pendingColorClear||celeb)return;
  const now=performance.now();

  // Power gem spawn — timer counts from last disappearance
  if(hasPowerMech()&&!hasSpecial('power')&&(now-lastPowerSpawn)/1000>=getPowerInterval()+elapsedPlaySec*CFG.SPAWN_STRETCH){
    const si=pickRandomGemSlot();
    if(si>=0){
      slots[si].special='power';slots[si].specialCD=CFG.POWER_DURATION;slots[si].specialTick=now;showTut('power');
    }
  }
  const pi=findSpecialSlot('power');
  if(pi>=0){
    const s=slots[pi];
    if(now-s.specialTick>=1000){
      s.specialTick=now;s.specialCD--;
      if(s.specialCD<=0){addPanelMsg('⭐ Power gem expired','#666',1500);clearSpecial(pi);}
    }
  }

  // Curse gem spawn — only in timed modes
  if(hasCurseMech()&&MODES[gameMode].timed&&!hasSpecial('curse')&&realElapsedMs()/1000>=CFG.CURSE_FIRST_DELAY&&(now-lastCurseSpawn)/1000>=CFG.CURSE_INTERVAL){
    const si=pickRandomGemSlot();
    if(si>=0){
      slots[si].special='curse';slots[si].specialCD=getCurseDuration();slots[si].specialTick=now;showTut('curse');
    }
  }
  const ci=findSpecialSlot('curse');
  if(ci>=0){
    const s=slots[ci];
    if(now-s.specialTick>=1000){
      s.specialTick=now;s.specialCD--;
      if(s.specialCD<=0){
        const cp=getCursePenalty();
        gs.cursesExpired++;
        if(cp>0){timerSec=Math.max(0,timerSec-cp);addPanelMsg('💀 CURSED! −'+cp+'s','#ff4444',2500);}
        else if(cp<0){grantTime(Math.abs(cp));addPanelMsg('✦ Curse absorbed! +'+Math.abs(cp)+'s','#66ff88',2500);}
        else{addPanelMsg('💀 Curse nullified!','#aabbcc',2000);}
        if(timerSec<=0&&!chainOn){triggerGameOver();}
        clearSpecial(ci);
      }
    }
  }

  // Rainbow gem spawn
  const hasRainbow=slots.some(s=>s.rainbow);
  if(hasRainbowMech()&&!hasRainbow&&(now-lastRainbowSpawn)/1000>=getRainbowInterval()){
    const si=pickRandomGemSlot();
    if(si>=0){slots[si].rainbow=true;showTut('rainbow');}
  }

  // Blaze gem spawn
  if(hasBlazeMech()&&!hasSpecial('blaze')&&(now-lastBlazeSpawn)/1000>=getBlazeInterval()){
    const si=pickRandomGemSlot();
    if(si>=0){
      slots[si].special='blaze';slots[si].specialCD=CFG.BLAZE_DURATION;slots[si].specialTick=now;
      showTut('blaze');const bm=getBlazeMults();slots[si].blazeMult=bm[Math.floor(rng()*bm.length)];
    }
  }
  const bi=findSpecialSlot('blaze');
  if(bi>=0){
    const s=slots[bi];
    if(now-s.specialTick>=1000){
      s.specialTick=now;s.specialCD--;
      if(s.specialCD<=0){addPanelMsg('🔥 Blaze expired','#666',1500);clearSpecial(bi);s.blazeMult=1;}
    }
  }

  // Hourglass gem spawn — only in timed modes
  if(hasHourglassMech()&&MODES[gameMode].timed&&!hasSpecial('hourglass')&&(now-lastHourglassSpawn)/1000>=getHourglassInterval()+elapsedPlaySec*CFG.SPAWN_STRETCH){
    const si=pickRandomGemSlot();
    if(si>=0){
      slots[si].special='hourglass';slots[si].specialCD=CFG.HOURGLASS_DURATION;slots[si].specialTick=now;showTut('hourglass');
    }
  }
  const hi=findSpecialSlot('hourglass');
  if(hi>=0){
    const s=slots[hi];
    if(now-s.specialTick>=1000){
      s.specialTick=now;s.specialCD--;
      if(s.specialCD<=0){addPanelMsg('⏳ Hourglass expired','#666',1500);clearSpecial(hi);}
    }
  }

  // Hourglass active freeze countdown
  if(hourglassFreeze>0){
    if(now-hourglassFreezeStart>=1000){
      hourglassFreezeStart=now;hourglassFreeze--;
      if(hourglassFreeze<=0)addPanelMsg('⏳ Time resumes','#8899bb',1500);
    }
  }
}

// ================================================================
const S3=Math.sqrt(3);
const HD=[[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
function h2p(q,r){return{x:bCX+cSz*1.5*q,y:bCY+cSz*S3*(r+q/2)};}
function hexBoard(){
  const rad=CFG.HEX_GEN_RINGS,all=[];let mx=0;
  for(let q=-rad;q<=rad;q++)for(let r=Math.max(-rad,-q-rad);r<=Math.min(rad,-q+rad);r++){
    const px=1.5*q,py=S3*(r+q/2),d=Math.sqrt(px*px+py*py);all.push({q,r,d});if(d>mx)mx=d;}
  return all.filter(c=>c.d<=mx*CFG.BOARD_PIX_FRAC).map(({q,r})=>({q,r}));
}
function fullHexRing(rad){const o=[];for(let q=-rad;q<=rad;q++)for(let r=Math.max(-rad,-q-rad);r<=Math.min(rad,-q+rad);r++)o.push({q,r});return o;}
function gk(q,r){return q+','+r;}

function buildGravCols(){
  gravCols={};
  for(let i=0;i<slots.length;i++){
    const s=slots[i];
    if(!gravCols[s.q])gravCols[s.q]=[];
    gravCols[s.q].push(i);
  }
  for(const col of Object.values(gravCols))col.sort((a,b)=>slots[a].r-slots[b].r);
}

// ================================================================
//  SLOT CREATION
// ================================================================
function mkScatter(){
  const a=rng()*Math.PI*2,d=(0.15+rng()*0.85)*cSz*CFG.SCATTER;
  return{sx:Math.cos(a)*d,sy:Math.sin(a)*d};
}

// Morph scatter: completely fresh random scatter (same as board init)
// The smooth morph animation handles the visual transition
function morphScatter(){return mkScatter();}

function createSlot(q,r,ci){
  const{x:px,y:py}=h2p(q,r);
  const{sx,sy}=mkScatter();
  return{
    q,r, sx,sy,
    seedX:px+sx, seedY:py+sy,  // current Voronoi seed position
    baseX:px+sx, baseY:py+sy,  // rest position (for wobble)
    ci:ci,                       // color index (-1 = hole)
    isHole:false,
    flash:-1,       // -1=inactive, 0-1=flashing
    holeFade:0,    // 0-1, hole darkness
    dropAnim:0,    // 0-1, color dropping animation progress
    dropFromX:0, dropFromY:0,   // where color is dropping from
    wp1:rng()*Math.PI*2,
    wp2:rng()*Math.PI*2,
    morphFromX:0, morphFromY:0, morphToX:0, morphToY:0, morphProgress:1,
    special:null,     // null|'power'|'curse'|'blaze'|'hourglass'
    specialCD:0,      // countdown seconds
    specialTick:0,    // last tick timestamp
    blazeMult:1,      // multiplier value for blaze gems
    rainbow:false,    // joker gem — matches any color
  };
}

// ================================================================
//  BORDER
// ================================================================
function genBorder(){
  borderSeeds=[];
  const outerRad=CFG.HEX_GEN_RINGS+1;
  for(const{q,r}of fullHexRing(outerRad)){
    if(boardSet.has(gk(q,r)))continue;
    const{x:px,y:py}=h2p(q,r),a=rng()*Math.PI*2,d=rng()*cSz*CFG.BORDER_SCATTER;
    borderSeeds.push({x:px+Math.cos(a)*d,y:py+Math.sin(a)*d,bq:q,br:r});
  }
}
function regenBorderNear(aff){
  for(let i=0;i<borderSeeds.length;i++){
    const bs=borderSeeds[i];let hit=false;
    for(const[dq,dr]of HD)if(aff.has(gk(bs.bq+dq,bs.br+dr))){hit=true;break;}
    if(hit){const{x:px,y:py}=h2p(bs.bq,bs.br),a=rng()*Math.PI*2,d=rng()*cSz*CFG.BORDER_SCATTER;
      bs.x=px+Math.cos(a)*d;bs.y=py+Math.sin(a)*d;}
  }
}

function resize(){

  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);

  bCX=W/2;
  const topPH=Math.round(116*uiS),botPH=Math.round(120*uiS);
  bCY=topPH+(H-topPH-botPH)/2;
  const effRad=CFG.HEX_GEN_RINGS*CFG.BOARD_PIX_FRAC,diam=effRad*2+1;
  cSz=Math.min((W*0.92)/(1.5*diam+0.5),(H-topPH-botPH-8)/(S3*diam));
  // Recalc slot positions
  for(const s of slots){
    const{x:px,y:py}=h2p(s.q,s.r);

}

function boardQuality(){
  // Count chain groups of 3+ and 4+ using hex neighbors
  const byPos={};
  for(let i=0;i<slots.length;i++){const s=slots[i];if(!s.isHole)byPos[gk(s.q,s.r)]=s;}
  let chains3=0,chains4=0;
  const counted=new Set();
  for(const s of slots){
    if(s.isHole||counted.has(gk(s.q,s.r)))continue;
    const ci=s.ci,vis=new Set(),stk=[s];vis.add(gk(s.q,s.r));
    while(stk.length){const cur=stk.pop();
      for(const[dq,dr]of HD){const nk=gk(cur.q+dq,cur.r+dr);if(vis.has(nk))continue;
        const nb=byPos[nk];if(nb&&nb.ci===ci){vis.add(nk);stk.push(nb);}}}
    for(const k of vis)counted.add(k);
    if(vis.size>=3)chains3++;
    if(vis.size>=4)chains4++;
  }
  return{chains3,chains4};
}

function initBoard(){
  musicMenuOpen=false;

  }else{
    rng=mulberry32((Date.now()^(Math.random()*0xFFFFFFFF))>>>0);
  }

  let bestSlots=null,bestLookup=null,bestQ=null,bestRng=null;

  for(let attempt=0;attempt<20;attempt++){
    // For daily: use same base seed + attempt offset so all players get same board
    if(gameMode==='daily'&&attempt>0)rng=mulberry32(dailySeed+attempt*7919);
    else if(gameMode!=='daily'&&attempt>0)rng=mulberry32((Date.now()^(Math.random()*0xFFFFFFFF)+attempt)>>>0);

    const tmpSlots=[],tmpLookup={};
    boardHexes=hexBoard();boardSet=new Set(boardHexes.map(h=>gk(h.q,h.r)));
    const lu={};
    for(const{q,r}of boardHexes){
      let ci,t=0;
      do{ci=Math.floor(rng()*CFG.NUM_COLORS);t++;}
      while(t<40&&wouldMatch(q,r,ci,lu));
      lu[gk(q,r)]=ci;
      const s=createSlot(q,r,ci);
      tmpLookup[gk(q,r)]=tmpSlots.length;
      tmpSlots.push(s);

    // Save rng state for this board

function wouldMatch(q,r,ci,lu){
  for(const[dq,dr]of HD)if(lu[gk(q+dq,r+dr)]===ci&&lu[gk(q+dq*2,r+dr*2)]===ci)return true;
  return false;
}

//  ADJACENCY / DEADLOCK / SHUFFLE / SHATTER
// ================================================================
// Compute shared Voronoi edge length between two cells
function sharedEdgeLen(vor,i,j){
  if(!vor)return 0;
  const ci=vor.cellPolygon(i),cj=vor.cellPolygon(j);
  if(!ci||!cj)return 0;
  // Find vertices shared between both polygons (within epsilon)
  const eps=0.5;
  const shared=[];
  for(let a=0;a<ci.length-1;a++){
    for(let b=0;b<cj.length-1;b++){
      if(Math.abs(ci[a][0]-cj[b][0])<eps&&Math.abs(ci[a][1]-cj[b][1])<eps){
        shared.push(ci[a]);break;
      }
    }
  }
  if(shared.length<2)return 0;
  // Return longest distance between any pair of shared vertices
  let maxD=0;
  for(let a=0;a<shared.length;a++){
    for(let b=a+1;b<shared.length;b++){
      const dx=shared[a][0]-shared[b][0],dy=shared[a][1]-shared[b][1];
      maxD=Math.max(maxD,Math.sqrt(dx*dx+dy*dy));
    }
  }
  return maxD;
}
// Minimum shared edge length to count as "touching" (fraction of cell size)
const MIN_SHARED_EDGE=0.15; // × cSz

function adjacent(a,b){
  // Hex grid neighbors (always valid)
  for(const[dq,dr]of HD)if(a.q+dq===b.q&&a.r+dr===b.r)return true;
  // Voronoi neighbors — only if they share a real visible edge
  if(cachedVor){
    const ai=slotLookup[gk(a.q,a.r)],bi=slotLookup[gk(b.q,b.r)];
    if(ai!==undefined&&bi!==undefined){
      let isNeighbor=false;
      for(const ni of cachedVor.delaunay.neighbors(ai)){
        if(ni===bi){isNeighbor=true;break;}
      }
      if(isNeighbor){
        return sharedEdgeLen(cachedVor,ai,bi)>=cSz*MIN_SHARED_EDGE;
      }
    }
  }
  return false;
}
// Precomputed neighbor list with edge length filtering
let cachedNbrs=null, nbrsDirty=true;
function getNeighborList(){
  if(cachedNbrs&&!nbrsDirty)return cachedNbrs;
  const nbrs=new Array(slots.length);
  for(let i=0;i<slots.length;i++)nbrs[i]=new Set();
  const minEdge=cSz*MIN_SHARED_EDGE;
  // Hex neighbors
  for(let i=0;i<slots.length;i++){
    const s=slots[i];if(s.isHole)continue;
    for(const[dq,dr]of HD){
      const nk=gk(s.q+dq,s.r+dr);
      const ni=slotLookup[nk];
      if(ni!==undefined&&!slots[ni].isHole)nbrs[i].add(ni);
    }
  }
  // Voronoi neighbors — edge-length gated
  if(cachedVor){
    for(let i=0;i<slots.length;i++){
      if(slots[i].isHole)continue;
      for(const ni of cachedVor.delaunay.neighbors(i)){
        if(ni<slots.length&&!slots[ni].isHole){
          if(sharedEdgeLen(cachedVor,i,ni)>=minEdge)nbrs[i].add(ni);
        }
      }
    }
  }
  cachedNbrs=nbrs;nbrsDirty=false;
  return nbrs;
}

function hasAnyValidChain(){
  const nbrs=getNeighborList();
  for(let i=0;i<slots.length;i++){
    const s=slots[i];if(s.isHole||s.rainbow)continue;
    const ci=s.ci;
    const vis=new Set([i]),stk=[i];
    while(stk.length){
      const cur=stk.pop();
      if(vis.size>=CFG.MIN_CHAIN)return true;
      for(const ni of nbrs[cur]){
        if(vis.has(ni))continue;
        const ns=slots[ni];
        if(ns.ci===ci||ns.rainbow){vis.add(ni);stk.push(ni);}
      }
    }
  }
  return false;
}
function checkDeadlock(){if(animPhase!=='idle'||gameOver||pendingColorClear)return;deadlocked=!hasAnyValidChain();if(!deadlocked){hintSlots=[];}else{showTut('deadlock');}}

function findValidChain(){
  const nbrs=getNeighborList();
  let best=[];
  for(let i=0;i<slots.length;i++){
    const s=slots[i];if(s.isHole||s.rainbow)continue;
    const ci=s.ci;
    const vis=new Set([i]),stk=[i];
    while(stk.length){
      const cur=stk.pop();
      for(const ni of nbrs[cur]){
        if(vis.has(ni))continue;
        const ns=slots[ni];
        if(ns.ci===ci||ns.rainbow){vis.add(ni);stk.push(ni);}
      }
    }
    if(vis.size>best.length&&vis.size>=CFG.MIN_CHAIN)best=[...vis];
  }
  return best.length>=CFG.MIN_CHAIN?best:[];
}

function tickHint(){
  if(animPhase!=='idle'||gameOver||chainOn||!gameStarted)return;

function useShatter(si){

    if(s.rainbow)lastRainbowSpawn=performance.now();
    if(s.special==='power')lastPowerSpawn=performance.now();
    if(s.special==='curse')lastCurseSpawn=performance.now();

    s.isHole=true;s.ci=-1;s.holeFade=1;s.special=null;s.specialCD=0;s.specialTick=0;s.rainbow=false;
  }
  if(extraPts>0){const os=score;score+=extraPts;gs.scoreFromShatter+=extraPts;checkScoreMile(os,score);}
  if(extraTime>0)grantTime(extraTime);
  addPanelMsg('⚡ SHATTER ×'+cnt,'#ffaa44',2000);deadlocked=false;

  // Storm Forge: +1 fragment per 10 total gems shattered (cumulative across all shatters)
  const prevStorm=Math.floor(fragState.stormShatteredTotal/10);

  const newStorm=Math.floor(fragState.stormShatteredTotal/10);
  if(newStorm>prevStorm)gs.frag.storm+=(newStorm-prevStorm);
  excludedColor=tc;
  startGravityDrop();
}

function slotAtPx(px,py){
  if(!cachedVor)return-1;
  const vi=cachedVor.delaunay.find(px,py);
  if(vi<0||vi>=cachedVM.length)return-1;
  const si=cachedVM[vi];
  if(si<0||slots[si].isHole)return-1;
  return si;
}
function startC(px,py){
  if(paused||showRules||tutActive||repaintMode||repaintSelected.length>0||celeb)return;
  if(animPhase!=='idle'||gameOver||pendingColorClear)return;
  initAudio(); // lazy init on first user interaction
  if(shatterMode){const si=slotAtPx(px,py);if(si>=0)useShatter(si);return;}
  if(deadlocked)return;
  const i=slotAtPx(px,py);if(i<0)return;
  // First chain starts the game clock
  if(!gameStarted){
    gameStarted=true;gameStartTime=performance.now();totalPausedMs=0;pauseStartTime=0;
    lastTimerTick=performance.now();lastHeatCoolTick=performance.now();
    lastActionTime=performance.now();
    lastPowerSpawn=performance.now();lastCurseSpawn=performance.now();lastRainbowSpawn=performance.now();lastBlazeSpawn=performance.now();lastHourglassSpawn=performance.now();
  }
  chainOn=true;chain=[i];slots[i].inChain=true;
  chainVoiceIdx=(chainVoiceIdx+1)%CHAIN_VOICES.length;
  SFX.chainAdd(0);
  hintSlots=[];lastActionTime=performance.now();
}
// Get the effective chain color (first non-rainbow gem, or -1 if all rainbow)
function getChainColor(){
  for(const si of chain){if(!slots[si].rainbow)return slots[si].ci;}
  return-1; // all rainbow so far — any color matches
}
function colorMatches(si){
  if(slots[si].rainbow)return true; // rainbow matches anything
  const cc=getChainColor();
  return cc<0||slots[si].ci===cc; // -1 means all rainbow, any color fits
}
function moveC(px,py){
  if(!chainOn)return;
  const lastSi=chain[chain.length-1];

  // Primary: Voronoi lookup
  let i=slotAtPx(px,py);

  // If Voronoi missed, find nearest valid candidate gem
  if(i<0){
    let bestD=cSz*2.6*cSz*2.6,bestI=-1;
    for(let j=0;j<slots.length;j++){
      if(slots[j].isHole)continue;
      const dx=slots[j].seedX-px,dy=slots[j].seedY-py,d2=dx*dx+dy*dy;
      if(d2<bestD){bestD=d2;bestI=j;}
    }
    i=bestI;
  }

  if(i<0||slots[i].isHole)return;
  if(i===lastSi)return;

  // Backtrack
  if(chain.length>=2&&chain[chain.length-2]===i){
    slots[chain.pop()].inChain=false;SFX.chainRemove(chain.length);return;
  }

  // Forward: must be adjacent, color match, not in chain
  if(!colorMatches(i))return;
  if(!adjacent(slots[i],slots[lastSi]))return;
  if(chain.includes(i))return;
  chain.push(i);slots[i].inChain=true;
  SFX.chainAdd(chain.length-1);
}

function endC(){
  if(!chainOn){clrC();return;}chainOn=false;
  // Grace period: only chains of 5+ (heat-earning) reset the heat decay clock.
  // Chains of 3-4 don't extend max-heat sustain, preventing trivial sustain farming.
  if(chain.length>=5)lastHeatCoolTick=performance.now()+200;
  if(chain.length>=CFG.MIN_CHAIN){
    const len=chain.length;
    SFX.chainScore(len);
    let pts=calcScore(len), bonusTime=0;
    let powerPtsThisChain=0; // track power gem contribution

    // Check for special gems in chain
    let blazeMultiplier=1;
    for(const si of chain){
      const s=slots[si];
      if(s.special==='power'){
        if(len>=CFG.POWER_MIN_CHAIN){
          const pp=getPowerPoints(),pt=getPowerTime();
          pts+=pp;powerPtsThisChain+=pp;gs.powerGems++;if(len>=5)gs.frag.gilded++;
          if(MODES[gameMode].timed){bonusTime+=pt;addPanelMsg('⭐ POWER GEM! +'+pp.toLocaleString()+' +'+pt+'s','#ffdd44',3000);}
          else{addPanelMsg('⭐ POWER GEM! +'+pp.toLocaleString(),'#ffdd44',3000);}
        }else{showTut('err_power_short');}
        clearSpecial(si);
      }
      if(s.special==='curse'){
        const cmc=getCurseMinChain(),cp=getCursePenalty();
        if(len>=cmc){
          addPanelMsg('💀 Curse defused!','#66ff66',2000);gs.cursesDefused++;gs.frag.iron++;
        }else{
          gs.cursesExpired++;
          if(cp>0){timerSec=Math.max(0,timerSec-cp);addPanelMsg('💀 CURSED! −'+cp+'s (need '+cmc+')','#ff4444',2500);}
          else if(cp<0){grantTime(Math.abs(cp));addPanelMsg('✦ Curse absorbed! +'+Math.abs(cp)+'s','#66ff88',2500);}
          else{addPanelMsg('💀 Curse nullified!','#aabbcc',2000);}
          showTut('err_curse_short');
        }
        clearSpecial(si);
      }
      if(s.special==='blaze'){
        if(len>=CFG.BLAZE_MIN_CHAIN){
          gs.blazesUsed++;blazeMultiplier=Math.max(blazeMultiplier,s.blazeMult);
          addPanelMsg('🔥 BLAZE ×'+s.blazeMult+'!','#ff8844',2500);
        }
        clearSpecial(si);
      }
      if(s.special==='hourglass'){
        if(len>=CFG.HOURGLASS_MIN_CHAIN){
          gs.hourglasses++;const ft=getFreezeTime();hourglassFreeze=ft;hourglassFreezeStart=performance.now();
          addPanelMsg('⏳ TIME FROZEN '+ft+'s!','#88ddff',3000);
        }
        clearSpecial(si);
      }
    }

    // Apply blaze multiplier
    const ptsBeforeBlaze=pts;
    pts=Math.round(pts*blazeMultiplier);
    if(pts>gs.maxChainScore)gs.maxChainScore=pts;

    // Attribute scoring sources
    const blazeBonus=pts-ptsBeforeBlaze; // pts added by blaze multiplier
    const baseChainPts=ptsBeforeBlaze-powerPtsThisChain;
    gs.scoreFromChains+=baseChainPts;
    gs.scoreFromPowerGems+=powerPtsThisChain;
    gs.scoreFromBlazeBonus+=blazeBonus;

    const oldScore=score;
    score+=pts;
    if(len>bestChainLen)bestChainLen=len;
    recordChain(len);

    // --- FRAGMENT EARNING (chain-based) ---
    // Aurora: rainbow in chain of 6+
    if(len>=6){for(const si of chain)if(slots[si].rainbow){gs.frag.aurora++;break;}}
    // Crucible: blaze activated (bonus for ×5+)
    if(blazeMultiplier>=3)gs.frag.crucible++; // only ×3+ blazes earn fragments
    // Sanctuary: chain during hourglass freeze
    if(hourglassFreeze>0&&len>=5){
      gs.frag.sanctuary++;
      fragState.hgChainCount++;
      if(fragState.hgChainCount===3)gs.frag.sanctuary++; // bonus: 3 chains in one freeze
    }else if(hourglassFreeze<=0){fragState.hgChainCount=0;}
    // Palette: chain of 6+ within 5s of using repaint
    if(len>=6&&fragState.lastRepaintTime>0&&(performance.now()-fragState.lastRepaintTime)/1000<=5){
    // Palette chain bonus removed — base earning is per repaint used
    if(len>=6&&fragState.lastRepaintTime>0)fragState.lastRepaintTime=0; // just clear the timer
    }
    // --- END FRAGMENTS ---
    checkChainMile(len);
    checkScoreMile(oldScore,score);
    if(MODES[gameMode].timed){
      if(hasHeatMech()){
      const hGain=calcHeatGain(len);
      if(hGain>0){
        const wasZero=heat===0;
        const wasMax=heat>=CFG.HEAT_MAX;
        heat=Math.min(CFG.HEAT_MAX,heat+hGain);if(heat>gs.peakHeat)gs.peakHeat=heat;
        if(heat>=CFG.HEAT_MAX&&!wasMax)fragState.heatMaxSince=performance.now();
        if(wasZero)showTut('intro_heat');
        // Shatter: 1st charge earned instantly when heat reaches max — only if empty AND off cooldown
        if(heat>=CFG.HEAT_MAX&&!wasMax){
          heatStreakMs=realElapsedMs();heatStreakAwards=0; // start sustained clock
          // Cooldown scales with run length: +5s per 120s survived (base 10s)
          const dynCooldown=10000+Math.floor(realElapsedMs()/120000)*5000;
          const cooldownOk=(realElapsedMs()-lastShatterEarnedMs)>=dynCooldown;
          if(shatterCharges===0&&cooldownOk){
            shatterCharges++;heatStreakAwards=1;gs.shattersEarned++;lastShatterEarnedMs=realElapsedMs();
            shatterEarnedFlashAt=performance.now();
            addPanelMsg('⚡ SHATTER EARNED!','#ffaa44',2500);
            showTut('shatter_use'); // first time only — how to use a shatter charge
          }else if(shatterCharges>0){
            // Player already has a charge and reached max again — explain sustained req
            showTut('shatter_sustain');
          }
        }
      }
      }
    }else{
      // Zen mode: shatter earned by long chains (no heat system)
      if(hasShatterMech()&&len>=8&&shatterCharges<getShatterMax()){
        shatterCharges++;gs.shattersEarned++;shatterEarnedFlashAt=performance.now();addPanelMsg('⚡ SHATTER EARNED!','#ffaa44',2500);showTut('shatter_use');
      }
    }
    // Combo meter for repaint: 4+ chain = +1, shorter valid chain = decay
    if(hasRepaintMech()){
    if(len>=CFG.COMBO_MIN_CHAIN){
      const ct=getComboTarget();
      comboMeter=Math.min(ct,comboMeter+1);
      if(comboMeter>=ct&&repaintCharges<CFG.REPAINT_MAX){
        repaintCharges++;comboMeter=0;gs.repaintsEarned++;
        repaintEarnedFlashAt=performance.now();
        addPanelMsg('🎨 REPAINT EARNED!','#66ccff',2500);showTut('intro_repaint');
      }
    }else{
      comboMeter=Math.max(0,comboMeter-CFG.COMBO_DECAY);
    }
    }
    if(MODES[gameMode].timed){
      const bonus=calcTimeBonus(len)+bonusTime;
      if(bonus>0)grantTime(bonus);
      let msg='+'+pts;if(bonus>0)msg+='   +'+bonus+'s';
      if(hasHeatMech()){const hGain2=calcHeatGain(len);if(hGain2>0)msg+='   🔥+'+hGain2;}
      addPanelMsg(msg,'#ffffff',2500);
    }else{
      addPanelMsg('+'+pts,'#ffffff',2500);
    }

    const cc=getChainColor(); // -1 if all rainbow
    const willCC=cc>=0&&len>=colorClearThreshold();
    if(willCC) excludedColor=cc;

    // Deferred game-over check: curse penalty was deducted above, but bonuses were added after.
    // Only trigger game over if net result is still <= 0.
    if(MODES[gameMode].timed&&timerSec<=0){triggerGameOver();}

    timerFrozen=true;
    animPhase='flash';animStart=performance.now();
    matchedSlots=new Set(chain);
    for(const si of chain){slots[si].flash=1;slots[si].inChain=false;}

    onAnimDone=()=>{
      lastActionTime=performance.now();
      if(willCC){
        gs.colorClears++;pendingColorClear={color:cc,done:false,settledAt:null};
      } else {
        excludedColor=-1;
      }
    };
  } else if(chain.length>0&&chain.length<CFG.MIN_CHAIN){
    showTut('err_chain_short');
    SFX.chainFail();
  }
  clrC();
  // Deferred game-over: timer may have hit 0 during chain building
  if(MODES[gameMode].timed&&timerSec<=0&&!gameOver)triggerGameOver();
}

function tickAnim(){
  if(animPhase==='idle')return;
  const now=performance.now(),elapsed=now-animStart;

  if(animPhase==='flash'){
    const frac=elapsed/CFG.FLASH_MS;
    for(const s of slots)if(s.flash>0)s.flash=Math.max(0,1-frac);
    if(elapsed>=CFG.FLASH_MS){
      // Flash done → matched slots become holes
      for(const si of matchedSlots){
        const s=slots[si];
        spawnP(s.seedX,s.seedY,s.ci,10);
        if(s.rainbow)lastRainbowSpawn=performance.now();
        s.isHole=true;s.ci=-1;s.holeFade=1;s.flash=-1;
        s.special=null;s.specialCD=0;s.specialTick=0;s.blazeMult=1;s.rainbow=false;
      }
      matchedSlots.clear();
      animPhase='hole';animStart=now;
    }
  }
  else if(animPhase==='hole'){
    // Pause to show gaps
    if(elapsed>=CFG.HOLE_PAUSE_MS){
      startGravityDrop();
    }
  }
  else if(animPhase==='dropping'){
    // Time-based animation (frame-rate independent)
    const dropElapsed=now-animStart;
    let allDone=true;
    for(const d of droppingSlots){
      // Stagger: gems that travel further start slightly later
      const delay=d.delay||0;
      const t0=Math.max(0,dropElapsed-delay)/CFG.DROP_MS;
      d.progress=Math.min(1,t0);
      if(d.progress<1)allDone=false;
      // Ease-out cubic for smooth deceleration
      const t=1-Math.pow(1-d.progress,3);
      const to=slots[d.toIdx];
      to.seedX=d.startX+(to.baseX-d.startX)*t;
      to.seedY=d.startY+(to.baseY-d.startY)*t;
    }
    if(allDone){
      // Snap all to final positions
      for(const d of droppingSlots){
        slots[d.toIdx].seedX=slots[d.toIdx].baseX;
        slots[d.toIdx].seedY=slots[d.toIdx].baseY;
      }
      pendingNewColors=[];
      droppingSlots=[];
      glNeedsBuild=true;
      SFX.gemSettle();

      excludedColor=-1;
      animPhase='idle';
      timerFrozen=false;
      const now2=performance.now();
      lastTimerTick=now2;lastHeatCoolTick=now2;
      lastActionTime=now2;hintSlots=[];
      for(const s of slots)if(s.special)s.specialTick=now2;

      const cb=onAnimDone;onAnimDone=null;
      if(cb)cb();

      const aff=new Set();
      for(const s of slots)if(s.isHole)aff.add(gk(s.q,s.r));
      regenBorderNear(aff);

      setTimeout(checkDeadlock,50);
    }
  }
  else if(animPhase==='morphing'){
    // Smoothly lerp seeds from old scatter to new scatter
    let allDone=true;
    for(const si of morphingSlots){
      const s=slots[si];
      s.morphProgress=Math.min(1,s.morphProgress+CFG.MORPH_SPEED);
      if(s.morphProgress<1)allDone=false;
      // Smooth ease-in-out
      const t=s.morphProgress<0.5
        ? 2*s.morphProgress*s.morphProgress
        : 1-Math.pow(-2*s.morphProgress+2,2)/2;
      s.baseX=s.morphFromX+(s.morphToX-s.morphFromX)*t;
      s.baseY=s.morphFromY+(s.morphToY-s.morphFromY)*t;
      s.seedX=s.baseX; s.seedY=s.baseY;
      s.sx=s.baseX-h2p(s.q,s.r).x;
      s.sy=s.baseY-h2p(s.q,s.r).y;
    }
    if(allDone){
      morphingSlots=[];
      excludedColor=-1; // clear color exclusion after settle
      animPhase='idle';
      timerFrozen=false;
      const now2=performance.now();
      lastTimerTick=now2;lastHeatCoolTick=now2;
      lastActionTime=now2;hintSlots=[];
      // Reset special gem ticks so they don't lose countdown during animations
      for(const s of slots)if(s.special)s.specialTick=now2;

      const cb=onAnimDone;onAnimDone=null;
      if(cb)cb();

      const aff=new Set();
      for(const s of slots)if(s.isHole)aff.add(gk(s.q,s.r));
      regenBorderNear(aff);

      setTimeout(checkDeadlock,50);
    }
  }
  else if(animPhase==='settling'){
    // Initial board drop-in
    let allDone=true;
    for(const s of slots){
      if(s.dropAnim<1){
        s.dropAnim=Math.min(1,s.dropAnim+0.04);
        // Ease-out
        const t=1-Math.pow(1-s.dropAnim,2.5);
        s.seedX=s.dropFromX+(s.baseX-s.dropFromX)*t;
        s.seedY=s.dropFromY+(s.baseY-s.dropFromY)*t;
        allDone=false;
      }else{
        s.seedX=s.baseX;s.seedY=s.baseY;
      }
    }
    if(allDone){
      animPhase='idle';timerFrozen=false;
      lastTimerTick=performance.now();lastHeatCoolTick=performance.now();
      lastActionTime=performance.now();
      setTimeout(checkDeadlock,50);
    }
  }
  else if(animPhase==='shuffling'){
    const dur=1200, elapsed=now-animStart, frac=Math.min(1,elapsed/dur);
    if(frac<1){
      const cycleInterval=40+frac*frac*160;
      const cycleFrame=Math.floor(elapsed/cycleInterval);
      const maxDist=cSz*CFG.HEX_GEN_RINGS*1.5;
      for(let i=0;i<slots.length;i++){
        const s=slots[i];if(s.isHole)continue;
        const dx=s.baseX-bCX,dy=s.baseY-bCY;
        const lockFrac=0.4+0.6*(Math.sqrt(dx*dx+dy*dy)/maxDist);
        if(frac>=lockFrac){
          if(shuffleFinalColors){const fc=shuffleFinalColors[i];if(fc!==undefined)s.ci=fc;}
        }else{
          s.ci=(cycleFrame+i*3)%CFG.NUM_COLORS;
        }
      }
    }else{
      if(shuffleFinalColors){for(let i=0;i<slots.length;i++)if(shuffleFinalColors[i]!==undefined)slots[i].ci=shuffleFinalColors[i];}
      shuffleFinalColors=null;
      animPhase='idle';timerFrozen=false;
      const now3=performance.now();
      lastTimerTick=now3;lastHeatCoolTick=now3;
      lastActionTime=now3;
      for(const s of slots)if(s.special)s.specialTick=now3;
      setTimeout(checkDeadlock,100);
    }
  }
}

// ================================================================
//  GRAVITY DROP — swap colors downward, holes float up
// ================================================================
function startGravityDrop(){
  droppingSlots=[];
  pendingNewColors=[];

  function slotY(si){return h2p(slots[si].q,slots[si].r).y;}

  // Snapshot original positions FIRST: gid -> {slotIdx, baseX, baseY}
  let nextGid=1;
  const gidOrigin={};
  for(let i=0;i<slots.length;i++){
    if(!slots[i].isHole){
      const gid=nextGid++;
      slots[i]._gid=gid;
      gidOrigin[gid]={si:i,bx:slots[i].baseX,by:slots[i].baseY};
    }else{
      slots[i]._gid=0;
    }
  }

  // Pre-Phase: Support propagation — detect floating gems and settle them
  // A gem is "grounded" if it can trace a path of non-hole gems down to the board bottom.
  const DOWN_HEX=[[1,0],[-1,1],[0,1]]; // hex dirs that increase Y
  const UP_HEX=[[-1,0],[1,-1],[0,-1]];  // hex dirs that decrease Y

  function computeGrounded(){
    const g=new Uint8Array(slots.length);
    const queue=[];
    // Seed: bottom-edge gems (no downward on-board neighbors)
    for(let i=0;i<slots.length;i++){
      if(slots[i].isHole)continue;
      let hasDown=false;
      for(const[dq,dr]of DOWN_HEX){
        if(slotLookup[gk(slots[i].q+dq,slots[i].r+dr)]!==undefined){hasDown=true;break;}
      }
      if(!hasDown){g[i]=1;queue.push(i);}
    }
    // BFS upward
    let h=0;
    while(h<queue.length){
      const gi=queue[h++];
      for(const[dq,dr]of UP_HEX){
        const ni=slotLookup[gk(slots[gi].q+dq,slots[gi].r+dr)];
        if(ni===undefined||slots[ni].isHole||g[ni])continue;
        g[ni]=1;queue.push(ni);
      }
    }
    return g;
  }

  // Iteratively settle floating gems into adjacent holes below them
  for(let outerPass=0;outerPass<30;outerPass++){
    const grounded=computeGrounded();
    // Collect floating gems (non-hole, not grounded), sorted bottom-first
    const floating=[];
    for(let i=0;i<slots.length;i++){
      if(!slots[i].isHole&&!grounded[i])floating.push(i);
    }
    if(floating.length===0)break; // all gems are grounded, done

    floating.sort((a,b)=>slotY(b)-slotY(a)); // process lowest floating gems first

    let anyMoved=false;
    for(const fi of floating){
      if(slots[fi].isHole)continue; // already moved by earlier iteration
      // Find best adjacent hole BELOW this gem
      let bestHole=-1,bestDy=-1;
      for(const[dq,dr]of HD){
        const ni=slotLookup[gk(slots[fi].q+dq,slots[fi].r+dr)];
        if(ni===undefined||!slots[ni].isHole)continue;
        const dy=slotY(ni)-slotY(fi);
        if(dy>0.1&&dy>bestDy){bestHole=ni;bestDy=dy;}
      }
      if(bestHole>=0){
        // Swap: move gem into hole, old position becomes hole
        const s=slots[fi],d=slots[bestHole];
        d.ci=s.ci;d.isHole=false;d.holeFade=0;
        d.special=s.special;d.specialCD=s.specialCD;
        d.specialTick=s.specialTick;d.blazeMult=s.blazeMult;
        d.rainbow=s.rainbow;d._gid=s._gid;
        s.isHole=true;s.ci=-1;s.holeFade=1;s._gid=0;
        s.special=null;s.specialCD=0;s.specialTick=0;s.blazeMult=1;s.rainbow=false;
        anyMoved=true;
      }
    }

    // If no floating gem could move (no adjacent hole below), mark remaining as holes (fallback)
    if(!anyMoved){
      for(const fi of floating){
        if(!slots[fi].isHole){
          slots[fi].isHole=true;slots[fi].ci=-1;slots[fi].holeFade=1;slots[fi]._gid=0;
          slots[fi].special=null;slots[fi].specialCD=0;slots[fi].specialTick=0;
          slots[fi].blazeMult=1;slots[fi].rainbow=false;
        }
      }
      break;
    }
  }

  // Phase 1: Column drops (gems fall straight down within q-column)
  for(const[qStr,colIndices]of Object.entries(gravCols)){
    const gemEntries=[];
    let hasHoles=false;
    for(const si of colIndices){
      if(slots[si].isHole) hasHoles=true;
      else gemEntries.push({
        ci:slots[si].ci,special:slots[si].special,specialCD:slots[si].specialCD,
        specialTick:slots[si].specialTick,blazeMult:slots[si].blazeMult,rainbow:slots[si].rainbow,
        _gid:slots[si]._gid
      });
    }
    if(!hasHoles)continue;
    const numSlots=colIndices.length,numHoles=numSlots-gemEntries.length;
    for(const si of colIndices){
      slots[si].special=null;slots[si].specialCD=0;slots[si].specialTick=0;
      slots[si].blazeMult=1;slots[si].rainbow=false;slots[si]._gid=0;
    }
    for(let i=0;i<numSlots;i++){
      const si=colIndices[i];
      if(i<numHoles){slots[si].isHole=true;slots[si].ci=-1;slots[si].holeFade=1;slots[si]._gid=0;}
      else{
        const e=gemEntries[i-numHoles];
        slots[si].ci=e.ci;slots[si].isHole=false;slots[si].holeFade=0;
        slots[si].special=e.special;slots[si].specialCD=e.specialCD;
        slots[si].specialTick=e.specialTick;slots[si].blazeMult=e.blazeMult;
        slots[si].rainbow=e.rainbow;slots[si]._gid=e._gid;
      }
    }
  }

  // Phase 2: Diagonal settling — only unsupported gems slide into holes
  function isUnsupported(si){
    const myY=slotY(si);
    for(const[dq,dr]of HD){
      const nk=gk(slots[si].q+dq,slots[si].r+dr);
      const ni=slotLookup[nk];
      if(ni===undefined)continue;
      if(!slots[ni].isHole&&slotY(ni)>myY+0.1)return false;
    }
    return true;
  }
  let settled=false;
  for(let pass=0;pass<20&&!settled;pass++){
    settled=true;
    const holes=[];
    for(let i=0;i<slots.length;i++)if(slots[i].isHole)holes.push(i);
    holes.sort((a,b)=>slotY(b)-slotY(a));
    for(const hi of holes){
      const holeY=slotY(hi);
      let bestSrc=-1,bestDy=Infinity;
      for(const[dq,dr]of HD){
        const nk=gk(slots[hi].q+dq,slots[hi].r+dr);
        const ni=slotLookup[nk];
        if(ni===undefined||slots[ni].isHole)continue;
        const dy=holeY-slotY(ni);
        if(dy>0.1&&dy<bestDy&&isUnsupported(ni)){bestDy=dy;bestSrc=ni;}
      }
      if(bestSrc>=0){
        const src=slots[bestSrc];
        slots[hi].ci=src.ci;slots[hi].isHole=false;slots[hi].holeFade=0;
        slots[hi].special=src.special;slots[hi].specialCD=src.specialCD;
        slots[hi].specialTick=src.specialTick;slots[hi].blazeMult=src.blazeMult;
        slots[hi].rainbow=src.rainbow;slots[hi]._gid=src._gid;
        src.isHole=true;src.ci=-1;src.holeFade=1;src._gid=0;
        src.special=null;src.specialCD=0;src.specialTick=0;
        src.blazeMult=1;src.rainbow=false;
        settled=false;
      }
    }
  }

  // Phase 3: Build drop animations using gid tracking
  droppingSlots=[];
  for(let i=0;i<slots.length;i++){
    if(slots[i].isHole||!slots[i]._gid)continue;
    const gid=slots[i]._gid;
    const orig=gidOrigin[gid];
    if(orig&&orig.si!==i){
      droppingSlots.push({toIdx:i,startX:orig.bx,startY:orig.by,progress:0,delay:0});
      slots[i].seedX=orig.bx;
      slots[i].seedY=orig.by;
    }
  }

  // Phase 4: New colors for remaining holes — animate in from above
  pendingNewColors=[];
  for(let i=0;i<slots.length;i++){
    if(slots[i].isHole){
      slots[i].ci=randColor(i);
      slots[i].isHole=false;
      slots[i].holeFade=0;
      // Start position: directly above board top edge
      const targetY=slots[i].baseY;
      const startY=bCY-cSz*CFG.HEX_GEN_RINGS*S3*0.8;
      const dropDist=targetY-startY;
      droppingSlots.push({toIdx:i,startX:slots[i].baseX,startY:startY,progress:0,delay:50+dropDist*0.15});
      slots[i].seedX=slots[i].baseX;
      slots[i].seedY=startY;
    }
  }

  if(droppingSlots.length>0){
    animPhase='dropping';animStart=performance.now();timerFrozen=true;
  }else{
    glNeedsBuild=true;
    const now4=performance.now();
    animPhase='idle';timerFrozen=false;lastTimerTick=now4;lastHeatCoolTick=now4;
    lastActionTime=now4;hintSlots=[];
    for(const s of slots)if(s.special)s.specialTick=now4;
    const cb=onAnimDone;onAnimDone=null;if(cb)cb();
    setTimeout(checkDeadlock,50);
  }
}


// ================================================================
//  COLOR CLEAR
// ================================================================
function tickColorClear(){
  if(!pendingColorClear||pendingColorClear.done)return;
  if(animPhase!=='idle')return;
  if(!pendingColorClear.settledAt){
    pendingColorClear.settledAt=performance.now();
    addPanelMsg('✦ COLOR CLEAR ✦','#aaddff',2500);showTut('color_clear');return;
  }
  if(performance.now()-pendingColorClear.settledAt<CFG.COLOR_CLEAR_DELAY)return;

  const cc=pendingColorClear;
  const toMark=[];
  for(let i=0;i<slots.length;i++){const s=slots[i];if(!s.isHole&&!s.rainbow&&s.ci===cc.color){
    const dx=s.seedX-bCX,dy=s.seedY-bCY;toMark.push({idx:i,dist:Math.sqrt(dx*dx+dy*dy)});}}
  toMark.sort((a,b)=>a.dist-b.dist);
  if(toMark.length===0){pendingColorClear=null;return;}
  addPanelMsg('×'+toMark.length+' cleared','#88bbff',2000);

  let batch=0;const total=Math.ceil(toMark.length/CFG.CC_WAVE_BATCH);
  cc.done=true;timerFrozen=true;
  let ccExtraPts=0,ccExtraTime=0;

  function nextBatch(){
    const s=batch*CFG.CC_WAVE_BATCH,e=Math.min(s+CFG.CC_WAVE_BATCH,toMark.length);
    for(let i=s;i<e;i++){
      const idx=toMark[i].idx;
      const sl=slots[idx];sl.isHole=true;
      const dx=sl.seedX-bCX,dy=sl.seedY-bCY,d=Math.sqrt(dx*dx+dy*dy)||1;
      for(let p=0;p<5;p++)particles.push({x:sl.seedX,y:sl.seedY,
        vx:dx/d*(1.5+Math.random()*2.5)+(Math.random()-.5)*2,
        vy:dy/d*(1.5+Math.random()*2.5)+(Math.random()-.5)*2-1,
        life:1,dec:.015+Math.random()*.01,sz:2.5+Math.random()*3,col:Math.random()>.5?'#fff':'#aaccff'});
      if(sl.special==='power'){const pp=getPowerPoints(),pt=getPowerTime();ccExtraPts+=pp;ccExtraTime+=pt;addPanelMsg('⭐ POWER GEM! +'+pp.toLocaleString()+' +'+pt+'s','#ffdd44',3000);}
      if(sl.special==='curse'){addPanelMsg('💀 Curse cleared!','#66ff66',2000);}
      if(sl.special==='blaze'){addPanelMsg('🔥 Blaze cleared','#888',1500);showTut('lucky_blaze_cc');}
      if(sl.special==='hourglass'){gs.hourglasses++;const ft=getFreezeTime();hourglassFreeze=ft;hourglassFreezeStart=performance.now();addPanelMsg('⏳ TIME FROZEN '+ft+'s!','#88ddff',3000);showTut('lucky_hourglass_cc');}
      if(sl.rainbow)lastRainbowSpawn=performance.now();
      if(sl.special==='power')lastPowerSpawn=performance.now();
      if(sl.special==='curse')lastCurseSpawn=performance.now();
      if(sl.special==='blaze')lastBlazeSpawn=performance.now();
      if(sl.special==='hourglass')lastHourglassSpawn=performance.now();
      sl.ci=-1;sl.holeFade=1;sl.special=null;sl.specialCD=0;sl.specialTick=0;sl.rainbow=false;
    }
    batch++;
    if(batch<total)setTimeout(nextBatch,CFG.CC_WAVE_INTERVAL);
    else{
      if(ccExtraPts>0){const os=score;score+=ccExtraPts;gs.scoreFromColorClear+=ccExtraPts;checkScoreMile(os,score);}
      if(ccExtraTime>0)grantTime(ccExtraTime);
      // Aurora T3: rainbow survives color clears — force respawn
      if(getRainbowSurvivesCC())lastRainbowSpawn=0;
      setTimeout(()=>{pendingColorClear=null;startGravityDrop();},150);
    }
  }
  nextBatch();
}

function spawnP(x,y,ci,n){const p=CFG.PAL[ci];for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:1,dec:.018+Math.random()*.02,sz:1.5+Math.random()*3.5,col:Math.random()>.4?p.hi:p.mid});}}
function tickP(){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=p.dec;if(p.life<=0)particles.splice(i,1);}
  const now=performance.now();panelMsgs=panelMsgs.filter(m=>now-m.addedAt<m.duration);
}

//  TIMER
// ================================================================
// --- Milestone celebration system ---
function triggerCeleb(tier,label){
  const c=CELEB_TIERS[tier];
  const parts=[];
  for(let i=0;i<c.parts;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;
    const ci=Math.floor(Math.random()*CFG.NUM_COLORS),pal=CFG.PAL[ci];
    parts.push({x:bCX,y:bCY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,
      rot:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*0.2,
      sz:4+Math.random()*8,col:pal.hi,life:1});
  }
  const rays=[];
  for(let i=0;i<c.rays;i++){
    rays.push({ang:i*(Math.PI*2/c.rays),w:0.06+Math.random()*0.05,a:c.rayA});
  }
  const obj={tier,label,st:performance.now(),lastTick:performance.now(),dur:c.dur,parts,rays,tsz:c.tsz,flashA:c.flashA};
  if(celeb){celebQ.push(obj);}else{celeb=obj;}
}
function checkChainMile(len){
  // Find the highest milestone this chain qualifies for that hasn't been hit
  const keys=Object.keys(CHAIN_MILES).map(Number).sort((a,b)=>b-a);
  let best=null;
  for(const k of keys){
    if(len>=k&&!hitChainMiles.has(k)){best=k;break;}
  }
  if(best===null)return;
  // Mark ALL milestones at or below 'best' as hit (so lower ones never fire later)
  for(const k of keys){if(k<=best)hitChainMiles.add(k);}
  triggerCeleb(CHAIN_MILES[best].t,CHAIN_MILES[best].l+' ('+len+')');
}
function checkScoreMile(oldS,newS){
  // Find the HIGHEST milestone crossed in this jump (oldS -> newS)
  let best=null;
  for(const m of SCORE_MILES){
    if(newS>=m.v&&oldS<m.v&&!hitScoreMiles.has(m.v)){best=m;}
  }
  if(best){
    // Mark all milestones at or below the best as hit
    for(const m of SCORE_MILES){if(m.v<=best.v)hitScoreMiles.add(m.v);}
    triggerCeleb(best.t,best.l);
  }
  // High score check (independent)
  if(!hsBeaten&&highScores[gameMode]>0&&newS>highScores[gameMode]&&oldS<=highScores[gameMode]){
    hsBeaten=true;
    triggerCeleb(4,'\u2605 NEW HIGH SCORE! \u2605');
  }
}
function tickCeleb(){
  if(!celeb)return;
  const now=performance.now();
  const el=now-celeb.st;
  if(el>=celeb.dur){
    const next=celebQ.shift()||null;
    if(next){next.st=performance.now();next.lastTick=performance.now();celeb=next;}
    else{celeb=null;lastTimerTick=performance.now();lastHeatCoolTick=performance.now();}
    return;
  }
  // Delta-time normalized to 60fps (16.67ms per frame)
  const dt=(now-celeb.lastTick)/16.667;
  celeb.lastTick=now;
  // Particles use absolute time for fade, delta-time for physics
  const partFade=Math.min(1,el/800);
  for(const pt of celeb.parts){
    pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=0.12*dt;pt.rot+=pt.vr*dt;
    const drag=Math.pow(0.99,dt);pt.vx*=drag;pt.vy*=drag;
    pt.life=Math.max(0,1-partFade);
  }
}
function drawCeleb(){
  if(!celeb)return;
  cx.save();
  cx.beginPath();cx.rect(0,0,W,H);cx.clip(); // ensure nothing overflows on mobile
  const f='"SF Pro Display","Segoe UI",system-ui,sans-serif';
  const el=performance.now()-celeb.st;
  const p=Math.min(1,el/celeb.dur);

  // Text alpha: fast in (200ms), hold, fade out last 30%
  const txtIn=Math.min(1,el/200);
  const txtOut=p>0.7?1-(p-0.7)/0.3:1;
  const txtAl=txtIn*txtOut;

  // Burst alpha: fast in (100ms), fade over first 60% of duration
  const burstIn=Math.min(1,el/100);
  const burstOut=Math.max(0,1-el/(celeb.dur*0.6));
  const burstAl=burstIn*burstOut;

  // Flash: first 120ms absolute
  if(celeb.flashA>0&&el<120){
    cx.save();cx.globalAlpha=celeb.flashA*(1-el/120);
    cx.fillStyle='#fff';cx.fillRect(0,0,W,H);cx.restore();
  }

  // Rays — rotate based on absolute time, fade with burstAl, clipped to canvas
  if(burstAl>0.01){
    cx.save();cx.globalAlpha=burstAl;
    for(const r of celeb.rays){
      const ang=r.ang+el*0.001;
      const len=Math.max(W,H)*0.6;
      cx.save();cx.translate(bCX,bCY);cx.rotate(ang);
      const g=cx.createLinearGradient(0,0,len,0);
      g.addColorStop(0,'rgba(255,215,80,'+r.a+')');
      g.addColorStop(0.35,'rgba(255,175,50,'+r.a*0.5+')');
      g.addColorStop(1,'rgba(255,140,20,0)');
      cx.fillStyle=g;cx.beginPath();cx.moveTo(0,0);cx.lineTo(len,len*r.w);cx.lineTo(len,-len*r.w);cx.closePath();cx.fill();
      cx.restore();
    }
    cx.restore();
  }

  // Particles — skip off-screen
  for(const pt of celeb.parts){
    if(pt.life<=0||pt.x<-20||pt.x>W+20||pt.y<-20||pt.y>H+20)continue;
    cx.save();cx.globalAlpha=pt.life;
    cx.translate(pt.x,pt.y);cx.rotate(pt.rot);
    cx.fillStyle=pt.col;cx.shadowColor=pt.col;cx.shadowBlur=6;
    cx.beginPath();cx.moveTo(0,-pt.sz/2);cx.lineTo(pt.sz*0.4,pt.sz*0.3);cx.lineTo(-pt.sz*0.3,pt.sz*0.4);cx.closePath();cx.fill();
    cx.shadowBlur=0;cx.restore();
  }

  // Text — auto-split to two lines if too wide for screen
  const sc=1+Math.min(el/1000,0.2)*0.8;
  let sz=Math.round(celeb.tsz*sc);
  const txtY=Math.max(sz*0.7+10, Math.min(bCY-cSz*2.5, H-sz*0.7-10));
  cx.save();cx.globalAlpha=txtAl;cx.textAlign='center';cx.textBaseline='middle';
  cx.font='bold '+sz+'px '+f;
  cx.shadowColor='#ffdd44';cx.shadowBlur=25;
  cx.fillStyle='#fff';
  const maxW=W-30;
  const measured=cx.measureText(celeb.label).width;
  if(measured>maxW){
    // Try to split at space nearest middle
    const words=celeb.label.split(' ');
    if(words.length>=2){
      const mid=Math.ceil(words.length/2);
      const line1=words.slice(0,mid).join(' ');
      const line2=words.slice(mid).join(' ');
      const lh=sz*1.15;
      cx.fillText(line1,bCX,txtY-lh/2);cx.shadowBlur=12;cx.fillText(line1,bCX,txtY-lh/2);
      cx.shadowBlur=25;cx.fillText(line2,bCX,txtY+lh/2);cx.shadowBlur=12;cx.fillText(line2,bCX,txtY+lh/2);
    }else{
      // Single word too long — shrink font
      const shrink=Math.floor(sz*maxW/measured);
      cx.font='bold '+shrink+'px '+f;
      cx.fillText(celeb.label,bCX,txtY);cx.shadowBlur=12;cx.fillText(celeb.label,bCX,txtY);
    }
  }else{
    cx.fillText(celeb.label,bCX,txtY);
    cx.shadowBlur=12;cx.fillText(celeb.label,bCX,txtY);
  }
  cx.shadowBlur=0;cx.restore();

  cx.restore(); // pop clip
}
function tickTimer(){
  if(gameOver||timerFrozen||paused||!gameStarted||repaintSelected.length>0||celeb)return;
  const now=performance.now();
  if(now-lastTimerTick>=1000){lastTimerTick=now;
    if(hourglassFreeze>0){elapsedPlaySec++;}
    else if(MODES[gameMode].timed){
      timerSec=Math.max(0,timerSec-1);elapsedPlaySec++;
      if(timerSec>0&&timerSec<=CFG.LOW_TIME)SFX.urgencyTick();
      if(timerSec<=0&&!chainOn)triggerGameOver();}
    else{elapsedPlaySec++;} // zen: just count time
  }
  if(hourglassFreeze<=0&&now-lastHeatCoolTick>=CFG.HEAT_COOL_INTERVAL*1000*getHeatCoolMult()){
    lastHeatCoolTick=now;
    if(heat>0){
      heat--;
      if(heat<CFG.HEAT_MAX){fragState.heatMaxSince=0;fragState.emberAwarded=0;heatStreakMs=0;heatStreakAwards=0;}
    }
  }
}

// Real-time clock checks — run during chain resolution/animations, only paused by pause/rules/tutorials
function tickRealClock(){
  if(gameOver||!gameStarted)return;
  const rSec=realElapsedMs()/1000;
  const rMs=realElapsedMs();
  // Staggered intro tutorials for new players (stage 0)
  // Only intro_decay is time-based; heat/repaint fire when actually earned
  if(rSec>=20&&!tutSeen['intro_decay'])showTut('intro_decay');
  // Sustained heat → 2nd and 3rd shatter charges
  if(heat>=CFG.HEAT_MAX&&heatStreakMs>0&&shatterCharges<getShatterMax()){
    const sustained=(rMs-heatStreakMs)/1000;
    if(heatStreakAwards<2&&sustained>=CFG.SHATTER_SUSTAIN_2){
      shatterCharges++;heatStreakAwards=2;gs.shattersEarned++;lastShatterEarnedMs=rMs;
      addPanelMsg('⚡ SUSTAINED SHATTER!','#ffcc44',2500);
    }
    if(heatStreakAwards<3&&sustained>=CFG.SHATTER_SUSTAIN_3&&getShatterMax()>=3){
      shatterCharges++;heatStreakAwards=3;gs.shattersEarned++;lastShatterEarnedMs=rMs;
      addPanelMsg('⚡⚡ SUSTAINED SHATTER!','#ffee44',2500);
    }
  }
  // Ember: +1 per 5 continuous seconds at max heat (the fire keeps burning)
  // Does NOT award on initial reach — only for sustaining past the 5s mark.
  if(heat>=CFG.HEAT_MAX&&fragState.heatMaxSince>0){
    const maxDur=(performance.now()-fragState.heatMaxSince)/1000;
    const shouldHave=Math.floor(maxDur/5);
    if(shouldHave>fragState.emberAwarded){
      gs.frag.ember+=(shouldHave-fragState.emberAwarded);
      fragState.emberAwarded=shouldHave;
    }
  }
  // Twilight: +1 fragment every 30 real seconds survived
  const twMin=Math.floor(rSec/30);
  if(twMin>fragState.lastTwilightMin){
    gs.frag.twilight+=(twMin-fragState.lastTwilightMin);
    fragState.lastTwilightMin=twMin;
  }
  if(!fragState.twilightDecayBonusGiven&&rSec>=CFG.BONUS_DECAY_SECS/2){
    gs.frag.twilight++;fragState.twilightDecayBonusGiven=true;
  }
  // Color clear threshold escalation
  const cct=colorClearThreshold();
  if(cct>lastKnownCCThreshold){lastKnownCCThreshold=cct;showTut('color_clear_up');}
}

function processImport(raw){
